<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KUROGA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;font-family:'Orbitron',monospace;}
#gameWrap{position:fixed;inset:0;background:#000;}
#hud{position:absolute;top:env(safe-area-inset-top,0px);left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:10px 18px 6px;z-index:10;pointer-events:none;}
.hud-item{font-size:11px;letter-spacing:2px;color:#00ffcc;text-shadow:0 0 8px #00ffcc;}
.hud-item span{font-size:15px;font-weight:700;}
#wHud{position:absolute;top:env(safe-area-inset-top,0px);left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;display:flex;gap:6px;padding-top:10px;}
.wi{font-size:9px;letter-spacing:1px;padding:3px 7px;border-radius:10px;border:1px solid #00ffcc33;color:#00ffcc44;}
.wi.on{border-color:#ffdd00;color:#ffdd00;text-shadow:0 0 8px #ffdd00;}
#canvas{position:absolute;inset:0;width:100%;height:100%;}
#fingerDot{position:absolute;width:56px;height:56px;border-radius:50%;border:2px solid #00ffcc55;background:radial-gradient(circle,#00ffcc18,transparent);pointer-events:none;z-index:6;display:none;transform:translate(-50%,-50%);}
#dockBtn{display:none;position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom,0px)+36px);transform:translateX(-50%);z-index:20;width:190px;height:68px;border-radius:34px;background:radial-gradient(circle at 40% 35%,#ffdd0099,#ff880044);border:2.5px solid #ffdd00cc;box-shadow:0 0 30px #ffdd0077;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:22px;font-weight:900;letter-spacing:4px;color:#ffdd00;text-shadow:0 0 14px #ffdd00;touch-action:none;pointer-events:all;animation:dp 0.8s ease-in-out infinite;}
@keyframes dp{0%,100%{box-shadow:0 0 30px #ffdd0077;}50%{box-shadow:0 0 55px #ffdd00cc;}}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:20;background:#000000aa;}
#overlay h1{font-size:clamp(28px,8vw,44px);font-weight:900;letter-spacing:4px;color:#00ffcc;text-shadow:0 0 20px #00ffcc,0 0 50px #00ffcc66;text-align:center;animation:pu 2s ease-in-out infinite;}
.ts{margin-top:6px;padding:14px 36px;border:1.5px solid #00ffcc88;border-radius:50px;color:#00ffcc;font-size:14px;letter-spacing:4px;background:#00ffcc11;animation:pu 1.5s ease-in-out infinite;}
#dm{display:flex;flex-direction:column;gap:10px;width:86%;max-width:290px;}
.db{width:100%;padding:12px 16px;border-radius:12px;border:2px solid;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:2px;background:transparent;display:flex;justify-content:space-between;align-items:center;touch-action:manipulation;cursor:pointer;}
.db.easy{border-color:#00ff88;color:#00ff88;}
.db.easy.sel,.db.easy:active{background:#00ff8822;}
.db.norm{border-color:#00ffcc;color:#00ffcc;}
.db.norm.sel,.db.norm:active{background:#00ffcc22;}
.db.hard{border-color:#ff8800;color:#ff8800;}
.db.hard.sel,.db.hard:active{background:#ff880022;}
.db.ext{border-color:#ff4466;color:#ff4466;}
.db.ext.sel,.db.ext:active{background:#ff446622;}
.ds{font-size:9px;opacity:0.65;}
@keyframes pu{0%,100%{opacity:1;}50%{opacity:0.6;}}
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div class="hud-item">SCORE<br><span id="sc">0</span></div>
    <div class="hud-item" style="text-align:center">LEVEL<br><span id="lv">1</span></div>
    <div class="hud-item" style="text-align:right">LIFE<br><span id="li">❤❤❤</span></div>
  </div>
  <div id="wHud">
    <div class="wi on" id="wN">NORMAL</div>
    <div class="wi" id="wW">WIDE</div>
    <div class="wi" id="wL">LASER</div>
  </div>
  <div id="fingerDot"></div>
  <div id="dockBtn">DOCK!!</div>
  <div id="overlay">
    <h1>KUROGA</h1>
    <div class="hint" style="font-size:11px;color:#00ffcc55;text-align:center;letter-spacing:1px;line-height:2">
      画面をなぞって移動・自動連射<br>パワーアップを取れ！
    </div>
    <div class="tap-start" id="startBtn">TAP TO START</div>
  </div>
</div>
<script>
// ── refs ──
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const scEl=document.getElementById('sc'),lvEl=document.getElementById('lv'),liEl=document.getElementById('li');
const fingerDot=document.getElementById('fingerDot'),dockBtn=document.getElementById('dockBtn');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;if(stars.length){stars.length=0;for(let i=0;i<140;i++)stars.push(mkStar());}}
window.addEventListener('resize',resize);
function mkStar(){return{x:Math.random()*(W||400),y:Math.random()*(H||800),r:Math.random()*1.5+0.3,sp:Math.random()*0.8+0.2,br:Math.random()};}
const stars=[];for(let i=0;i<140;i++)stars.push(mkStar());

// ── Difficulty selection drawn on canvas ──
const DIFFS=[‘easy’,‘normal’,‘hard’,‘extreme’];
const DLABELS=[‘EASY’,‘NORMAL’,‘HARD’,‘EXTREME’];
const DSUBS=[‘ゆっくり遊ぶ’,‘標準的な難易度’,‘手強い敵たち’,‘廃人向け’];
const DCOLS=[’#00ff88’,’#00ffcc’,’#ff8800’,’#ff4466’];
let diffIdx=1;
function getDiffFromIdx(){return DIFFS[diffIdx];}

function drawTitleDiff(){
const cx=W/2,bh=44,gap=10;
const total=DIFFS.length*(bh+gap)-gap;
const startY=H*0.52;
ctx.textAlign=‘center’;
ctx.font=`11px Orbitron`;ctx.fillStyle=’#ffdd00’;ctx.shadowColor=’#ffdd00’;ctx.shadowBlur=8;
ctx.fillText(‘DIFFICULTY’,cx,startY-16);
DIFFS.forEach((d,i)=>{
const y=startY+i*(bh+gap);
const sel=i===diffIdx;
const col=DCOLS[i];
ctx.strokeStyle=col;ctx.lineWidth=sel?2.5:1;
ctx.fillStyle=sel?(col+‘22’):‘transparent’;
ctx.shadowColor=col;ctx.shadowBlur=sel?15:0;
ctx.beginPath();ctx.roundRect(cx-130,y,260,bh,10);ctx.fill();ctx.stroke();
ctx.font=`bold 13px Orbitron`;ctx.fillStyle=col;ctx.shadowBlur=sel?10:3;
ctx.fillText(DLABELS[i],cx-30,y+bh*0.62);
ctx.font=`9px Orbitron`;ctx.fillStyle=col+‘99’;ctx.shadowBlur=0;
ctx.textAlign=‘right’;ctx.fillText(DSUBS[i],cx+120,y+bh*0.62);
ctx.textAlign=‘center’;
});
}

function handleTitleDiffTouch(x,y){
const cx=W/2,bh=44,gap=10,startY=H*0.52;
DIFFS.forEach((d,i)=>{
const by=startY+i*(bh+gap);
if(x>=cx-130&&x<=cx+130&&y>=by&&y<=by+bh){diffIdx=i;diff=DIFFS[i];}
});
}
const DCFG={
easy:   {es:0.8,sr:0.0012,bm:0.6,bs:2.5,lv:5,lb:‘EASY’},
normal: {es:1.0,sr:0.0022,bm:1.0,bs:3.5,lv:3,lb:‘NORMAL’},
hard:   {es:1.4,sr:0.0035,bm:1.4,bs:4.5,lv:3,lb:‘HARD’},
extreme:{es:1.9,sr:0.005, bm:2.0,bs:5.5,lv:2,lb:‘EXTREME’},
};
let diff=‘normal’,dc=DCFG.normal,loopCount=0;
function rebuildDc(){dc=Object.assign({},DCFG[diff],{es:DCFG[diff].es*Math.pow(1.4,loopCount),sr:Math.min(DCFG[diff].sr*Math.pow(1.4,loopCount),0.035),bm:DCFG[diff].bm*Math.pow(1.4,loopCount),bs:Math.min(DCFG[diff].bs*Math.pow(1.4,loopCount),10)});}
document.querySelectorAll(’.db’).forEach(b=>{
b.addEventListener(‘click’,()=>{document.querySelectorAll(’.db’).forEach(x=>x.classList.remove(‘sel’));b.classList.add(‘sel’);diff=b.dataset.d;});
b.addEventListener(‘touchstart’,e=>{e.preventDefault();b.click();},{passive:false});
});

// ── Input ──
const inp={tx:null,ty:null};
let sCool=0,dockPressed=false;
const touches={};
function handleTouchStart(e){
e.preventDefault();
if(state===‘title’||state===‘gameover’){unlockAudio();startGame();return;}
if(state===‘ending’){unlockAudio();nextLoop();return;}
if(state===‘nameentry’){handleNameTouch(e);return;}
if(state===‘hsview’){state=‘gameover’;showOverlay(‘GAME OVER’,`SCORE: ${score.toLocaleString()}`,‘TAP TO RETRY’);return;}
for(const t of e.changedTouches){
touches[t.identifier]={x:t.clientX,y:t.clientY};
inp.tx=t.clientX;inp.ty=t.clientY;
fingerDot.style.left=t.clientX+‘px’;fingerDot.style.top=t.clientY+‘px’;fingerDot.style.display=‘block’;
}
}
function handleTouchMove(e){
e.preventDefault();
for(const t of e.changedTouches){
if(!touches[t.identifier])continue;
touches[t.identifier]={x:t.clientX,y:t.clientY};
inp.tx=t.clientX;inp.ty=t.clientY;
fingerDot.style.left=t.clientX+‘px’;fingerDot.style.top=t.clientY+‘px’;
}
}
function handleTouchEnd(e){
e.preventDefault();
for(const t of e.changedTouches){
delete touches[t.identifier];
if(!Object.keys(touches).length){inp.tx=null;inp.ty=null;fingerDot.style.display=‘none’;}
else{const l=Object.values(touches).pop();inp.tx=l.x;inp.ty=l.y;}
}
}
document.addEventListener(‘touchstart’,handleTouchStart,{passive:false});
document.addEventListener(‘touchmove’,handleTouchMove,{passive:false});
document.addEventListener(‘touchend’,handleTouchEnd,{passive:false});
document.addEventListener(‘touchcancel’,handleTouchEnd,{passive:false});
dockBtn.addEventListener(‘touchstart’,e=>{e.preventDefault();e.stopPropagation();if(state===‘docking’){dockPressed=true;dockBtn.style.opacity=‘0.5’;}},{passive:false});
dockBtn.addEventListener(‘touchend’,e=>{e.preventDefault();e.stopPropagation();setTimeout(()=>{dockBtn.style.opacity=‘1’;},80);},{passive:false});
dockBtn.addEventListener(‘click’,()=>{if(state===‘docking’)dockPressed=true;});

// ── Audio ──
let aCtx=null,mNodes=[],mPlay=false;
function getAudio(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();return aCtx;}
function unlockAudio(){const ac=getAudio();if(ac.state===‘suspended’)ac.resume();try{const b=ac.createBuffer(1,1,ac.sampleRate),s=ac.createBufferSource();s.buffer=b;s.connect(ac.destination);s.start(0);}catch(e){}}
function mkMaster(ac){const eq=ac.createBiquadFilter();eq.type=‘peaking’;eq.frequency.value=3000;eq.gain.value=3;eq.Q.value=1;const cp=ac.createDynamicsCompressor();cp.threshold.value=-14;cp.ratio.value=6;cp.attack.value=0.003;cp.release.value=0.15;const lm=ac.createDynamicsCompressor();lm.threshold.value=-1;lm.ratio.value=20;lm.attack.value=0.001;lm.release.value=0.05;const out=ac.createGain();out.gain.value=0.72;eq.connect(cp);cp.connect(lm);lm.connect(out);out.connect(ac.destination);return eq;}
function nf(s){return 130.81*Math.pow(2,s/12);}
function fmNote(ac,dest,cf,mr,mi,vol,dur,ct=‘sine’){const now=ac.currentTime,mf=cf*mr;const mod=ac.createOscillator(),mG=ac.createGain();mod.type=‘sine’;mod.frequency.value=mf;mG.gain.setValueAtTime(mf*mi,now);mG.gain.exponentialRampToValueAtTime(mf*mi*0.3,now+dur*0.3);mG.gain.exponentialRampToValueAtTime(0.001,now+dur);mod.connect(mG);mG.connect(mod.frequency);const car=ac.createOscillator(),env=ac.createGain();car.type=ct;car.frequency.value=cf;mG.connect(car.frequency);env.gain.setValueAtTime(0.001,now);env.gain.linearRampToValueAtTime(vol,now+0.008);env.gain.setValueAtTime(vol*0.8,now+0.03);env.gain.exponentialRampToValueAtTime(vol*0.6,now+dur*0.6);env.gain.exponentialRampToValueAtTime(0.001,now+dur);car.connect(env);env.connect(dest);mod.start(now);mod.stop(now+dur+0.05);car.start(now);car.stop(now+dur+0.05);}
function mkSeq(ac,dest,pat,bpm,fn){const beat=60/bpm;let idx=0,stop=false;const tids=[];function tick(){if(stop)return;const s=pat[idx%pat.length];if(s!==null)fn(ac,dest,s,beat);const d=s?(s.d||0.5)*beat:0.5*beat;idx++;tids.push(setTimeout(tick,d*1000));}tick();return{stop(){stop=true;tids.forEach(clearTimeout);}};}
function fmLead(ac,dest,s,beat){const dur=(s.d||.5)*beat*.9;fmNote(ac,dest,nf(s.n),1,2.8,0.22,dur,‘sine’);const sq=ac.createOscillator(),sg=ac.createGain();sq.type=‘square’;sq.frequency.value=nf(s.n);sq.detune.value=6;sg.gain.setValueAtTime(0.06,ac.currentTime);sg.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur*0.7);sq.connect(sg);sg.connect(dest);sq.start(ac.currentTime);sq.stop(ac.currentTime+dur+0.05);}
function fmBass(ac,dest,s,beat){const dur=(s.d||.5)*beat*.85;fmNote(ac,dest,nf(s.n),0.5,3.5,0.32,dur,‘sine’);const sub=ac.createOscillator(),sg=ac.createGain();sub.type=‘sine’;sub.frequency.value=nf(s.n-12);sg.gain.setValueAtTime(0.18,ac.currentTime);sg.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur*0.6);sub.connect(sg);sg.connect(dest);sub.start(ac.currentTime);sub.stop(ac.currentTime+dur+0.05);}
function fmChord(ac,dest,s,beat){const dur=(s.d||.25)*beat*.6;const ch=s.minor?[s.n,s.n+3,s.n+7]:[s.n,s.n+4,s.n+7];ch.forEach((n,i)=>fmNote(ac,dest,nf(n),2,1.5,0.09-i*0.01,dur,‘sine’));}
function psgC(ac,dest,s,beat){if(!s)return;const dur=(s.d||.5)*beat*.75;const o=ac.createOscillator(),g=ac.createGain();o.type=‘square’;o.frequency.value=nf(s.n);g.gain.setValueAtTime(0.001,ac.currentTime);g.gain.linearRampToValueAtTime(0.07,ac.currentTime+0.005);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);o.connect(g);g.connect(dest);o.start(ac.currentTime);o.stop(ac.currentTime+dur+0.05);}
function dKick(ac,dest,v=1){const now=ac.currentTime;const o=ac.createOscillator(),g=ac.createGain();o.type=‘sine’;o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(36,now+0.15);g.gain.setValueAtTime(0.9*v,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.22);o.connect(g);g.connect(dest);o.start(now);o.stop(now+0.25);const c=ac.createOscillator(),cg=ac.createGain();c.type=‘sine’;c.frequency.value=1200;cg.gain.setValueAtTime(0.4*v,now);cg.gain.exponentialRampToValueAtTime(0.001,now+0.015);c.connect(cg);cg.connect(dest);c.start(now);c.stop(now+0.02);}
function dSnare(ac,dest,v=1){const now=ac.currentTime;const o=ac.createOscillator(),og=ac.createGain();o.type=‘triangle’;o.frequency.value=220;og.gain.setValueAtTime(0.25*v,now);og.gain.exponentialRampToValueAtTime(0.001,now+0.12);o.connect(og);og.connect(dest);o.start(now);o.stop(now+0.14);const len=Math.floor(ac.sampleRate*0.18),buf=ac.createBuffer(1,len,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,0.5);const src=ac.createBufferSource(),ng=ac.createGain(),hp=ac.createBiquadFilter();hp.type=‘highpass’;hp.frequency.value=2000;src.buffer=buf;ng.gain.setValueAtTime(0.35*v,now);ng.gain.exponentialRampToValueAtTime(0.001,now+0.16);src.connect(hp);hp.connect(ng);ng.connect(dest);src.start(now);src.stop(now+0.2);}
function dHat(ac,dest,op=false,v=1){const now=ac.currentTime,len=Math.floor(ac.sampleRate*(op?0.12:0.04)),buf=ac.createBuffer(1,len,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1);const src=ac.createBufferSource(),g=ac.createGain(),hp=ac.createBiquadFilter(),bp=ac.createBiquadFilter();hp.type=‘highpass’;hp.frequency.value=8000;bp.type=‘bandpass’;bp.frequency.value=10000;bp.Q.value=0.5;src.buffer=buf;const df=op?0.1:0.035;g.gain.setValueAtTime(0.15*v,now);g.gain.exponentialRampToValueAtTime(0.001,now+df);src.connect(hp);hp.connect(bp);bp.connect(g);g.connect(dest);src.start(now);src.stop(now+df+0.01);}
function mkDrum(ac,dest,pat,bpm){const s16=60/bpm/4;let i=0,stop=false;const tids=[];function tick(){if(stop)return;const p=pat[i%pat.length];if(p.k)dKick(ac,dest,p.k);if(p.s)dSnare(ac,dest,p.s);if(p.h)dHat(ac,dest,false,p.h);if(p.ho)dHat(ac,dest,true,p.ho);i++;tids.push(setTimeout(tick,s16*1000));}tick();return{stop(){stop=true;tids.forEach(clearTimeout);}};}

// ── Music sequences ──
const SB=[{n:-10,d:.5},{n:-10,d:.25},{n:-10,d:.25},{n:-3,d:.5},{n:-3,d:.5},{n:2,d:.5},{n:2,d:.25},{n:2,d:.25},{n:-5,d:.5},{n:-5,d:.25},{n:-5,d:.25},{n:-10,d:.5},{n:-10,d:.25},{n:-10,d:.25},{n:-3,d:.5},{n:-3,d:.5},{n:0,d:.5},{n:0,d:.25},{n:4,d:.25},{n:2,d:1}];
const SL=[{n:14,d:.5},{n:14,d:.25},null,{n:16,d:.25},{n:14,d:.25},{n:11,d:.25},{n:9,d:.75},null,{n:11,d:.25},{n:9,d:.25},{n:7,d:.5},{n:6,d:.5},{n:7,d:.25},{n:9,d:.25},{n:11,d:.5},{n:9,d:.5},{n:7,d:.5},{n:6,d:.25},{n:4,d:.25},{n:2,d:1}];
const SC=[null,{n:26,d:.25},null,{n:23,d:.25},null,{n:21,d:.25},{n:21,d:.25},null,null,{n:23,d:.25},null,{n:26,d:.25},{n:28,d:.5},null,null,null,null,{n:26,d:.25},null,{n:23,d:.25},null,{n:21,d:.25},{n:19,d:.25},null,{n:18,d:.25},{n:19,d:.25},{n:21,d:.25},{n:23,d:.25},{n:26,d:1}];
const SCHD=[null,null,{n:2,d:.25,minor:false},null,null,null,{n:-3,d:.25,minor:true},null,null,null,{n:7,d:.25,minor:false},null,null,null,{n:5,d:.25,minor:false},null,null,null,{n:2,d:.25,minor:false},null,null,null,{n:-3,d:.25,minor:true},null,null,null,{n:0,d:.25,minor:false},null,null,{n:2,d:.5,minor:false},null,null];
const SDR=[{k:1},{h:.7},{h:.5},{h:.7},{s:.9,h:.6},{h:.6},{h:.5},{h:.8},{k:.9},{h:.7},{k:.5,h:.5},{h:.7},{s:.9,h:.6},{h:.6},{h:.6},{ho:.4},{k:1},{h:.7},{h:.5},{h:.7},{s:.9,h:.6},{h:.6},{h:.5},{h:.8},{k:.9},{h:.7},{h:.5,k:.5},{h:.7},{s:.9,h:.6},{h:.7},{k:.4,h:.5},{h:.8}];
const B2B=[{n:-10,d:.25},{n:-10,d:.25},{n:-4,d:.25},{n:-10,d:.25},{n:-9,d:.25},{n:-10,d:.25},{n:-4,d:.25},{n:-10,d:.25},{n:-7,d:.25},{n:-7,d:.25},{n:-1,d:.25},{n:-7,d:.25},{n:-6,d:.25},{n:-7,d:.25},{n:-1,d:.25},{n:-7,d:.25},{n:-5,d:.25},{n:-5,d:.25},{n:-11,d:.25},{n:-5,d:.25},{n:-4,d:.25},{n:-5,d:.25},{n:-11,d:.25},{n:-5,d:.25},{n:-3,d:.375},{n:-9,d:.375},{n:-3,d:.25},{n:-10,d:.5},{n:-4,d:.25},{n:-10,d:.25}];
const B2L=[{n:14,d:.25},null,{n:20,d:.25},{n:14,d:.25},null,{n:13,d:.25},{n:19,d:.375},null,{n:11,d:.25},null,{n:17,d:.25},{n:11,d:.25},null,{n:10,d:.25},{n:11,d:.25},null,{n:16,d:.375},{n:10,d:.25},null,{n:15,d:.25},{n:9,d:.25},null,null,{n:8,d:.25},{n:14,d:.25},{n:8,d:.25},null,{n:7,d:.5},{n:13,d:.5}];

// Name entry touch handler
function handleNameTouch(e){
if(state!==‘nameentry’)return;
for(const t of e.changedTouches){
const x=t.clientX,y=t.clientY;
// Check which button was tapped based on position
// Buttons are drawn on canvas — check regions
const cx=W/2;
const baseY=H/2;
// Letter slots: 3 slots centered
const slotW=60,slotH=72,slotGap=16;
const slotsX=cx-(slotW*3+slotGap*2)/2;
for(let i=0;i<3;i++){
const sx=slotsX+i*(slotW+slotGap);
if(x>=sx&&x<=sx+slotW&&y>=baseY-100&&y<=baseY-28){neCursor=i;break;}
}
// Up/Down buttons
const upX=cx-30,dnX=cx+30,arY=baseY+10;
if(Math.abs(x-upX)<35&&Math.abs(y-arY)<30){neCurChars[neCursor]=(neCurChars[neCursor]-1+CHARS.length)%CHARS.length;}
if(Math.abs(x-dnX)<35&&Math.abs(y-arY)<30){neCurChars[neCursor]=(neCurChars[neCursor]+1)%CHARS.length;}
// Prev/Next
if(x<cx-60&&Math.abs(y-(arY+60))<30){neCursor=Math.max(0,neCursor-1);}
if(x>cx+60&&Math.abs(y-(arY+60))<30){neCursor=Math.min(2,neCursor+1);}
// OK button
if(Math.abs(x-cx)<70&&Math.abs(y-(arY+120))<36){submitName();}
}
}

function startBonusStage(){

function updateBonus(){
bonus.timer++;for(const s of stars){s.y+=s.sp*2;if(s.y>H){s.y=-2;s.x=Math.random()*W;}}

applyKB();if(sCool<=0)fireWeapon();if(sCool>0)sCool–;
bullets=bullets.filter(b=>{b.y+=b.vy;if(b.vx)b.x+=b.vx;if(b.type===‘laser’)b.len=(b.len||0)+2;return b.y>-400;});
if(bonus.done){bonus.rTimer++;if(bonus.rTimer>180){state=‘playing’;lTimer=0;sTimer=0;midSpawned=false;lvMsg=120;startMusic(‘stage’);}parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.94;p.vy*=0.94;p.life-=p.decay;return p.life>0;});return;}
if(bonus.wave<BWAVES.length&&bonus.wTimer>=110){const wc=BWAVES[bonus.wave];wc.forEach(cfg=>{bonus.total++;bonus.enemies.push({t:-cfg.delay,pts:cfg.path,color:cfg.color,hp:1,points:100,x:cfg.path[0].x*W,y:cfg.path[0].y*H,angle:0});});bonus.wave++;bonus.wTimer=0;}
bonus.wTimer++;
bonus.enemies=bonus.enemies.filter(e=>{
e.t+=0.008;if(e.t<0)return true;
const t01=Math.min(e.t,1.0),pos=pathAt(e.pts,t01),prevPos=pathAt(e.pts,Math.max(0,t01-0.008));
e.angle=Math.atan2(pos.y-prevPos.y,pos.x-prevPos.x);e.x=pos.x*W;e.y=pos.y*H;
if(e.t>=1.0)return false;
bullets=bullets.filter(b=>{const hit=(b.type===‘laser’)?Math.abs(b.x-e.x)<15&&b.y<e.y&&b.y>e.y-40:dist(b.x,b.y,e.x,e.y)<22;if(hit){e.hp-=(b.type===‘laser’?0.3:1);spawnParts(b.x,b.y,e.color,5);return b.type===‘laser’;}return true;});
if(e.hp<=0){bonus.killed++;score+=e.points;updateUI();sfxExp();spawnParts(e.x,e.y,e.color,16);return false;}
return true;
});
const allS=bonus.wave>=BWAVES.length,allK=bonus.enemies.length===0&&allS,tu=bonus.timer>=bonus.maxTime;
if(allK||tu){bonus.done=true;bonus.perfect=allK&&bonus.killed===bonus.total;if(bonus.perfect){score+=10000;updateUI();sfxFanfare();for(let i=0;i<8;i++)spawnParts(W/2,H/2,’#ffdd00’,10);}}
parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.94;p.vy*=0.94;p.life-=p.decay;return p.life>0;});
}

function draw(){
ctx.clearRect(0,0,W,H);

if(transformFx.active){

}

for(const p of powerups)drawPU(p);

ctx.save();ctx.globalAlpha=fa;ctx.font=`bold ${Math.round(W*0.065)}px Orbitron`;ctx.fillStyle=’#ff4400’;ctx.shadowColor=’#ff4400’;ctx.shadowBlur=25;ctx.textAlign=‘center’;ctx.fillText(‘WARNING…’,W/2,H/2);ctx.restore();

}
if(state===‘intro’){
for(let i=0;i<6;i++){const ty=player.y+20+i*12,ta=(0.5-i*0.08)*(1-intro.timer/80);ctx.save();ctx.globalAlpha=Math.max(0,ta);ctx.fillStyle=`hsl(${160+i*10},100%,70%)`;ctx.shadowColor=’#00ffcc’;ctx.shadowBlur=12;ctx.beginPath();ctx.ellipse(player.x,ty,4-i*0.5,6,0,0,Math.PI*2);ctx.fill();ctx.restore();}

}

if(dk.result===null){

const dp=0.4+0.3*Math.sin(dk.fTimer*0.15);ctx.save();ctx.globalAlpha=dp;ctx.strokeStyle=’#ffdd00’;ctx.lineWidth=2;ctx.shadowColor=’#ffdd00’;ctx.shadowBlur=12;ctx.beginPath();ctx.ellipse(player.x,player.y,34,34,0,0,Math.PI*2);ctx.stroke();ctx.restore();
}

if(dk.result!==null){const fade=Math.min(1,dk.rTimer/20);ctx.save();ctx.globalAlpha=fade;ctx.textAlign=‘center’;if(dk.result===‘success’){drawPlayer(player.x-12,player.y,0.9);drawPlayer(player.x+12,player.y,0.9);ctx.font=`bold ${Math.round(W*0.08)}px Orbitron`;ctx.fillStyle=’#ffdd00’;ctx.shadowColor=’#ffdd00’;ctx.shadowBlur=30;ctx.fillText(‘合体!!’,W/2,H/2-20);ctx.font=`${Math.round(W*0.04)}px Orbitron`;ctx.fillStyle=’#00ffcc’;ctx.fillText(‘DOUBLE SHOT GET!’,W/2,H/2+30);}else{ctx.font=`bold ${Math.round(W*0.07)}px Orbitron`;ctx.fillStyle=’#ff4466’;ctx.shadowColor=’#ff4466’;ctx.shadowBlur=20;ctx.fillText(‘MISSED…’,W/2,H/2);drawPlayer(player.x,player.y,1);}ctx.restore();}
return;
}
for(const p of parts){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
for(const e of enemies)drawEnemy(e);
for(const p of powerups)drawPU(p);
if(midBoss)drawMidBoss(midBoss);
if(boss)drawBoss(boss);
for(const b of bullets)drawBullet(b);
for(const b of eBullets)drawEBullet(b);
const alpha=player.inv>0?(Math.floor(fc/4)%2===0?0.25:0.9):1;
if(merged){drawPlayer(player.x-14,player.y,alpha);drawPlayer(player.x+14,player.y,alpha);ctx.save();ctx.globalAlpha=0.4+0.2*Math.sin(fc*0.1);ctx.strokeStyle=’#00ffcc’;ctx.lineWidth=2;ctx.shadowColor=’#00ffcc’;ctx.shadowBlur=10;ctx.beginPath();ctx.moveTo(player.x-8,player.y+10);ctx.lineTo(player.x+8,player.y+10);ctx.stroke();ctx.restore();}
else drawPlayer(player.x,player.y,alpha);

if(lvMsg>0){ctx.save();ctx.globalAlpha=Math.min(1,lvMsg/30);ctx.font=`bold ${Math.round(W*0.07)}px Orbitron`;ctx.fillStyle=’#ffdd00’;ctx.shadowColor=’#ffdd00’;ctx.shadowBlur=30;ctx.textAlign=‘center’;ctx.fillText(`LEVEL ${level}!`,W/2,H/2);ctx.restore();lvMsg–;}
if(!midSpawned&&lTimer>MB_THRESH-60&&lTimer<MB_THRESH){const bl=Math.floor(fc/15)%2===0;if(bl){ctx.save();ctx.font=`bold ${Math.round(W*0.04)}px Orbitron`;ctx.fillStyle=’#44aaff’;ctx.shadowColor=’#44aaff’;ctx.shadowBlur=15;ctx.textAlign=‘center’;ctx.fillText(‘⚠ CAUTION ⚠’,W/2,H-100);ctx.restore();}}

ctx.save();ctx.font=`8px Orbitron`;ctx.fillStyle=’#00ffcc22’;ctx.textAlign=‘left’;ctx.fillText(dc.lb+(loopCount>0?` L${loopCount+1}`:’’),12,H-8);ctx.restore();

function drawTransformFx(){
const te=transformFx;
if(te.phase===‘shatter’){
for(const p of te.parts){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=12;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
const fa=Math.max(0,1-te.timer/40);ctx.save();ctx.globalAlpha=fa*0.6;ctx.fillStyle=’#ffffff’;ctx.fillRect(0,0,W,H);ctx.restore();
} else if(te.phase===‘void’){
for(const p of te.parts){ctx.save();ctx.globalAlpha=p.life*0.6;ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
const pr=te.timer/60;for(let i=5;i>=0;i–){const r=(i+1)*20*(1-pr*0.5);ctx.save();ctx.globalAlpha=0.5*(1-pr)*(i/5);ctx.strokeStyle=`hsl(${i*40},100%,50%)`;ctx.lineWidth=3;ctx.shadowColor=`hsl(${i*40},100%,50%)`;ctx.shadowBlur=15;ctx.beginPath();ctx.arc(te.bx,te.by,r,0,Math.PI*2);ctx.stroke();ctx.restore();}
const grad=ctx.createRadialGradient(te.bx,te.by,0,te.bx,te.by,Math.max(W,H)*0.8);grad.addColorStop(0,’#00000000’);grad.addColorStop(pr*0.7,’#00000044’);grad.addColorStop(1,’#000000cc’);ctx.save();ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);ctx.restore();
} else if(te.phase===‘reform’){

for(let i=0;i<20;i++){const a=Math.PI*2*i/20+pr*2,rd=60+i*5;const px=te.bx+Math.cos(a)*rd*(1-pr),py=te.by+Math.sin(a)*rd*(1-pr);ctx.save();ctx.globalAlpha=(1-pr)*0.9;const hue=i*18;ctx.fillStyle=`hsl(${hue},100%,60%)`;ctx.shadowColor=`hsl(${hue},100%,60%)`;ctx.shadowBlur=14;ctx.beginPath();ctx.arc(px,py,4+i*0.3,0,Math.PI*2);ctx.fill();ctx.restore();}
ctx.save();ctx.globalAlpha=pr;ctx.shadowColor=’#ff0000’;ctx.shadowBlur=40;ctx.fillStyle=’#ff000044’;ctx.beginPath();ctx.arc(te.bx,te.by,30*pr,0,Math.PI*2);ctx.fill();ctx.restore();
if(te.timer>40){const fa=((te.timer-40)/30)*(0.5+0.5*Math.sin(fc*0.4));ctx.save();ctx.globalAlpha=fa;ctx.font=`bold ${Math.round(W*0.08)}px Orbitron`;ctx.fillStyle=’#ff0000’;ctx.shadowColor=’#ff0000’;ctx.shadowBlur=30;ctx.textAlign=‘center’;ctx.fillText(‘FINAL FORM!’,W/2,H/2-10);ctx.restore();}
}
}

for(const e of bonus.enemies){if(e.t<0)continue;ctx.save();ctx.translate(e.x,e.y);ctx.rotate(e.angle+Math.PI/2);ctx.strokeStyle=e.color;ctx.fillStyle=’#0a0010’;ctx.shadowColor=e.color;ctx.shadowBlur=16;ctx.lineWidth=2;const s=1.15;ctx.beginPath();ctx.moveTo(0,-13*s);ctx.lineTo(-18*s,-4*s);ctx.lineTo(-10*s,2*s);ctx.lineTo(-6*s,11*s);ctx.lineTo(0,7*s);ctx.lineTo(6*s,11*s);ctx.lineTo(10*s,2*s);ctx.lineTo(18*s,-4*s);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle=e.color;ctx.beginPath();ctx.arc(-4,-3,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(4,-3,2.5,0,Math.PI*2);ctx.fill();ctx.restore();}

ctx.save();const bl=Math.floor(fc/20)%2===0;ctx.globalAlpha=bl?1:0.5;ctx.font=`bold ${Math.round(W*0.055)}px Orbitron`;ctx.fillStyle=’#ffdd00’;ctx.shadowColor=’#ffdd00’;ctx.shadowBlur=18;ctx.textAlign=‘center’;ctx.fillText(‘★ BONUS STAGE ★’,W/2,75);ctx.restore();

ctx.save();ctx.font=`${Math.round(W*0.038)}px Orbitron`;ctx.fillStyle=’#00ffcc’;ctx.textAlign=‘center’;ctx.shadowColor=’#00ffcc’;ctx.shadowBlur=8;ctx.fillText(`${bonus.killed} / ${bonus.total}`,W/2,112);ctx.restore();

ctx.fillStyle=line.col||’#ffffff’;ctx.shadowColor=line.col||’#ffffff’;ctx.shadowBlur=line.big?18:6;ctx.fillText(line.t,W/2,y);
});ctx.restore();
if(pl.active&&!pl.gone){drawShadow(pl.x,H-108,18);drawPilot(pl.x,H-155,pl.saluteAngle,0.9);}

if(ending.phase===‘fin’){
const fadeIn=Math.min(1,ending.timer/80)*0.55;ctx.save();ctx.globalAlpha=fadeIn;ctx.fillStyle=’#000’;ctx.fillRect(0,0,W,H);ctx.restore();
const ep=0.85+0.15*Math.sin(fc*0.25),ea=Math.min(1,ending.timer/20);
ctx.save();ctx.globalAlpha=ea*(0.6+0.4*Math.abs(Math.sin(fc*0.18)));ctx.font=`bold ${Math.round(W*0.22*ep)}px serif`;ctx.fillStyle=’#ff0000’;ctx.shadowColor=’#ff0000’;ctx.shadowBlur=40;ctx.textAlign=‘center’;ctx.fillText(’！’,W/2,H*0.38);ctx.restore();
if(ending.timer>10){
const wobX=W/2+Math.sin(fc*0.12)*18+Math.sin(fc*0.07)*8,wobY=H*0.62+Math.cos(fc*0.09)*12;
const ba=Math.min(1,(ending.timer-10)/40);ctx.save();ctx.globalAlpha=ba;
const spinA=fc*0.055,OR=60+Math.sin(fc*0.08)*5;
ctx.shadowColor=’#ff0000’;ctx.shadowBlur=40;ctx.fillStyle=’#330000’;ctx.strokeStyle=’#ff0000’;ctx.lineWidth=3;ctx.beginPath();ctx.arc(wobX,wobY,26,0,Math.PI*2);ctx.fill();ctx.stroke();
for(let i=0;i<20;i++){const a=spinA+Math.PI*2*i/20,a2=spinA+Math.PI*2*(i+0.5)/20;const op=OR*(1+0.08*Math.sin(fc*0.08+i));const ix=wobX+Math.cos(a)*26,iy=wobY+Math.sin(a)*26;const ox=wobX+Math.cos(a)*op,oy=wobY+Math.sin(a)*op;const mx=wobX+Math.cos(a2)*22,my=wobY+Math.sin(a2)*22;ctx.fillStyle=`hsl(${i*18},100%,55%)`;ctx.strokeStyle=`hsl(${i*18},100%,70%)`;ctx.lineWidth=1.5;ctx.shadowBlur=20;ctx.beginPath();ctx.moveTo(ix,iy);ctx.lineTo(ox,oy);ctx.lineTo(mx,my);ctx.closePath();ctx.fill();ctx.stroke();}
ctx.fillStyle=’#ff0000’;ctx.shadowBlur=25;ctx.beginPath();ctx.arc(wobX,wobY,9,0,Math.PI*2);ctx.fill();ctx.fillStyle=’#fff’;ctx.beginPath();ctx.arc(wobX,wobY,3.5,0,Math.PI*2);ctx.fill();ctx.restore();
}
if(ending.timer>30){const ha=Math.min(1,(ending.timer-30)/30)*(0.5+0.5*Math.sin(fc*0.22));ctx.save();ctx.globalAlpha=ha;ctx.font=`bold ${Math.round(W*0.065)}px Orbitron`;ctx.fillStyle=’#ff0000’;ctx.shadowColor=’#ff0000’;ctx.shadowBlur=25;ctx.textAlign=‘center’;ctx.fillText(‘Ｈａ　Ｈａ　Ｈａ…’,W/2,H*0.82);ctx.restore();}
}
if(ending.phase===‘warp’||warp.active){
const a=warp.alpha;if(a<0.8){for(let i=0;i<14;i++){const angle=warp.timer*0.1+Math.PI*2*i/14,r=Math.max(W,H)*(1-a)*0.9;ctx.save();ctx.globalAlpha=a*0.7;ctx.strokeStyle=`hsl(${280+i*8},100%,60%)`;ctx.lineWidth=4;ctx.shadowColor=`hsl(${280+i*8},100%,60%)`;ctx.shadowBlur=15;ctx.beginPath();ctx.moveTo(W/2,H/2);ctx.lineTo(W/2+Math.cos(angle)*r,H/2+Math.sin(angle)*r);ctx.stroke();ctx.restore();}}
ctx.save();ctx.globalAlpha=a;ctx.fillStyle=’#000’;ctx.fillRect(0,0,W,H);ctx.restore();
}
}

// ── Name Entry (canvas-based) ──
function drawNameEntry(){
ctx.fillStyle=’#000000cc’;ctx.fillRect(0,0,W,H);
const cx=W/2,baseY=H/2;
ctx.textAlign=‘center’;
ctx.font=`bold ${Math.round(W*0.065)}px Orbitron`;ctx.fillStyle=’#ffdd00’;ctx.shadowColor=’#ffdd00’;ctx.shadowBlur=20;ctx.fillText(‘HIGH SCORE!’,cx,baseY-160);
ctx.font=`${Math.round(W*0.04)}px Orbitron`;ctx.fillStyle=’#ff8800’;ctx.shadowBlur=8;ctx.fillText(`SCORE: ${score.toLocaleString()}`,cx,baseY-120);
// Letter slots
const slotW=60,slotH=72,slotGap=16;
const slotsX=cx-(slotW*3+slotGap*2)/2;
for(let i=0;i<3;i++){
const sx=slotsX+i*(slotW+slotGap),sy=baseY-100;
const active=i===neCursor;
ctx.strokeStyle=active?’#ffdd00’:’#00ffcc88’;ctx.lineWidth=active?2.5:1.5;
ctx.fillStyle=active?’#ffdd0011’:’#00ffcc08’;
ctx.shadowColor=active?’#ffdd00’:’#00ffcc’;ctx.shadowBlur=active?15:5;
ctx.beginPath();ctx.roundRect(sx,sy,slotW,slotH,8);ctx.fill();ctx.stroke();
ctx.font=`bold ${Math.round(slotW*0.6)}px Orbitron`;ctx.fillStyle=active?’#ffdd00’:’#00ffcc’;ctx.shadowColor=active?’#ffdd00’:’#00ffcc’;ctx.shadowBlur=active?12:4;
ctx.fillText(CHARS[neCurChars[i]],sx+slotW/2,sy+slotH*0.7);
}
// Arrows
const arY=baseY+10;
ctx.shadowBlur=8;
// UP
ctx.fillStyle=’#00ffcc22’;ctx.strokeStyle=’#00ffcc88’;ctx.lineWidth=1.5;
ctx.beginPath();ctx.roundRect(cx-60,arY-25,56,50,8);ctx.fill();ctx.stroke();
ctx.font=`22px Orbitron`;ctx.fillStyle=’#00ffcc’;ctx.shadowColor=’#00ffcc’;ctx.fillText(‘▲’,cx-32,arY+8);
// DOWN
ctx.fillStyle=’#00ffcc22’;ctx.strokeStyle=’#00ffcc88’;
ctx.beginPath();ctx.roundRect(cx+4,arY-25,56,50,8);ctx.fill();ctx.stroke();
ctx.fillText(‘▼’,cx+32,arY+8);
// PREV
const pnY=arY+60;
ctx.font=`${Math.round(W*0.032)}px Orbitron`;
ctx.fillStyle=’#aaaaaa22’;ctx.strokeStyle=’#aaaaaa66’;ctx.lineWidth=1.5;
ctx.beginPath();ctx.roundRect(cx-120,pnY-22,80,44,8);ctx.fill();ctx.stroke();
ctx.fillStyle=’#aaaaaa’;ctx.shadowColor=’#aaaaaa’;ctx.shadowBlur=4;ctx.fillText(‘◀ PREV’,cx-80,pnY+7);
// NEXT
ctx.fillStyle=’#aaaaaa22’;ctx.strokeStyle=’#aaaaaa66’;ctx.beginPath();ctx.roundRect(cx+40,pnY-22,80,44,8);ctx.fill();ctx.stroke();
ctx.fillText(‘NEXT ▶’,cx+80,pnY+7);
// OK
const okY=arY+120;
ctx.fillStyle=’#00ffcc22’;ctx.strokeStyle=’#00ffcc’;ctx.lineWidth=2;ctx.shadowColor=’#00ffcc’;ctx.shadowBlur=15;
ctx.beginPath();ctx.roundRect(cx-65,okY-28,130,56,28);ctx.fill();ctx.stroke();
ctx.font=`bold ${Math.round(W*0.05)}px Orbitron`;ctx.fillStyle=’#00ffcc’;ctx.shadowBlur=12;
const okPulse=0.7+0.3*Math.abs(Math.sin(fc*0.08));ctx.globalAlpha=okPulse;ctx.fillText(‘OK’,cx,okY+9);ctx.globalAlpha=1;
// Instruction
ctx.font=`9px Orbitron`;ctx.fillStyle=’#00ffcc44’;ctx.shadowBlur=0;ctx.fillText(‘▲▼で文字選択　◀▶でカーソル移動　OKで決定’,cx,H-30);
}

function drawHsView(){
ctx.fillStyle=’#000000dd’;ctx.fillRect(0,0,W,H);
const cx=W/2;
ctx.textAlign=‘center’;
ctx.font=`bold ${Math.round(W*0.06)}px Orbitron`;ctx.fillStyle=’#ffdd00’;ctx.shadowColor=’#ffdd00’;ctx.shadowBlur=20;ctx.fillText(‘🏆 HIGH SCORES’,cx,H*0.15);
const list=loadHS();
if(list.length===0){ctx.font=`${Math.round(W*0.04)}px Orbitron`;ctx.fillStyle=’#00ffcc66’;ctx.shadowBlur=5;ctx.fillText(‘NO SCORES YET’,cx,H/2);}
else{
list.forEach((entry,i)=>{
const y=H*0.25+i*52;
const isNew=entry.score===score&&i===list.findIndex(e=>e.score===score);
ctx.font=`${Math.round(W*0.042)}px Orbitron`;
const rankColor=[’#ffdd00’,’#aaaaaa’,’#ff8800’][i]||’#00ffcc88’;
ctx.fillStyle=rankColor;ctx.shadowColor=rankColor;ctx.shadowBlur=isNew?12:4;
ctx.fillText(`${i+1}.`,cx-120,y);
ctx.fillStyle=isNew?’#ffdd00’:’#00ffcc’;ctx.shadowColor=isNew?’#ffdd00’:’#00ffcc’;
ctx.fillText(entry.name,cx-50,y);
ctx.fillStyle=’#ffffff’;ctx.shadowColor=’#ffffff’;ctx.shadowBlur=4;
ctx.fillText(entry.score.toLocaleString(),cx+80,y);
if(entry.loop>1){ctx.font=`${Math.round(W*0.025)}px Orbitron`;ctx.fillStyle=’#ff8800’;ctx.fillText(`L${entry.loop}`,cx+130,y);}
if(isNew){ctx.font=`bold ${Math.round(W*0.03)}px Orbitron`;ctx.fillStyle=’#ffdd00’;ctx.shadowColor=’#ffdd00’;ctx.shadowBlur=15;const pulse=0.6+0.4*Math.abs(Math.sin(fc*0.1));ctx.globalAlpha=pulse;ctx.fillText(‘NEW!’,cx+160,y);ctx.globalAlpha=1;}
});
}
const tp=0.5+0.5*Math.abs(Math.sin(fc*0.06));ctx.save();ctx.globalAlpha=tp;ctx.font=`${Math.round(W*0.035)}px Orbitron`;ctx.fillStyle=’#00ffcc66’;ctx.shadowBlur=0;ctx.fillText(‘TAP TO CONTINUE’,cx,H*0.9);ctx.restore();
}

// ── Keyboard ──
const kbs={};
document.addEventListener(‘keydown’,e=>{
kbs[e.key]=true;
if(state===‘nameentry’){
if(e.key===‘ArrowUp’)neCurChars[neCursor]=(neCurChars[neCursor]-1+CHARS.length)%CHARS.length;
else if(e.key===‘ArrowDown’)neCurChars[neCursor]=(neCurChars[neCursor]+1)%CHARS.length;
else if(e.key===‘ArrowLeft’)neCursor=Math.max(0,neCursor-1);
else if(e.key===‘ArrowRight’)neCursor=Math.min(2,neCursor+1);
else if(e.key===‘Enter’||e.key===’ ‘){e.preventDefault();submitName();}
else{const idx=CHARS.indexOf(e.key.toUpperCase());if(idx>=0){neCurChars[neCursor]=idx;if(neCursor<2)neCursor++;}}
return;
}
if(state===‘hsview’){state=‘gameover’;showOverlay(‘GAME OVER’,`SCORE: ${score}`,‘TAP TO RETRY’);return;}
if(e.key===’ ’){e.preventDefault();if(state===‘title’||state===‘gameover’){unlockAudio();startGame();}else if(state===‘ending’){unlockAudio();nextLoop();}}
if(e.key===‘1’)setWeapon(‘normal’);if(e.key===‘2’)setWeapon(‘wide’);if(e.key===‘3’)setWeapon(‘laser’);
});
document.addEventListener(‘keyup’,e=>{kbs[e.key]=false;});
function applyKB(){if(!Object.keys(kbs).length)return;let kx=0,ky=0;if(kbs[‘ArrowLeft’]||kbs[‘a’])kx-=1;if(kbs[‘ArrowRight’]||kbs[‘d’])kx+=1;if(kbs[‘ArrowUp’]||kbs[‘w’])ky-=1;if(kbs[‘ArrowDown’]||kbs[‘s’])ky+=1;if(kx||ky){player.x=Math.max(25,Math.min(W-25,player.x+kx*player.speed));player.y=Math.max(60,Math.min(H-120,player.y+ky*player.speed));}}

// ── Game flow ──
function showOverlay(title,sub,tap){
const hs=loadHS();const top=hs.length?`<div style="font-size:11px;color:#ff880099;letter-spacing:1px;margin-top:4px">BEST: ${hs[0].name} ${hs[0].score.toLocaleString()}</div>`:’’;
overlay.innerHTML=`<h1>${title}</h1><div style="font-size:18px;color:#00ffcc;letter-spacing:2px">${sub}</div>${top}<div class="ts" id="startBtn">${tap}</div>`;
overlay.style.display=‘flex’;
document.getElementById(‘startBtn’).addEventListener(‘touchstart’,e=>{e.preventDefault();unlockAudio();startGame();},{passive:false});
document.getElementById(‘startBtn’).addEventListener(‘click’,()=>{unlockAudio();startGame();});
}
function endGame(){
state=‘gameover’;stopMusic();dockBtn.style.display=‘none’;
// Check hi-score then show overlay or name entry
if(isHiScore(score)){
neCursor=0;neCurChars=[0,0,0];
state=‘nameentry’;
} else {
showOverlay(‘GAME OVER’,`SCORE: ${score.toLocaleString()}`,‘TAP TO RETRY’);
}
}
// Handle hsview tap
document.addEventListener(‘touchstart’,e=>{
// This is already handled by main touchstart handler
// Extra check for hsview
},{passive:false});

function nextLoop(){loopCount++;rebuildDc();initGame(true);overlay.style.display=‘none’;startMusic(‘title’);startIntro();}
function startGame(){loopCount=0;rebuildDc();initGame(false);overlay.style.display=‘none’;startMusic(‘title’);startIntro();}
function startIntro(){
state=‘intro’;player={x:W/2,y:H-160,w:40,h:40,speed:7,inv:0};
bullets=[];enemies=[];eBullets=[];parts=[];powerups=[];
intro={shipY:-120,targetY:H-160,phase:‘fly’,timer:0};updateUI();
}

// Difficulty buttons
document.querySelectorAll(’.db’).forEach(b=>{
b.addEventListener(‘touchstart’,e=>{e.preventDefault();b.click();},{passive:false});
});
// Start button
document.getElementById(‘startBtn’).addEventListener(‘touchstart’,e=>{e.preventDefault();unlockAudio();startGame();},{passive:false});
document.getElementById(‘startBtn’).addEventListener(‘click’,()=>{unlockAudio();startGame();});

resize();
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
