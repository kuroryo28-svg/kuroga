<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');	∙	{ margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
width: 100%; height: 100%;
background: #000;
overflow: hidden;
touch-action: none;
font-family: ‘Orbitron’, monospace;
}
#gameWrap {
position: fixed;
inset: 0;
display: flex;
flex-direction: column;
background: #000;
}
/* HUD */
#hud {
position: absolute;
top: env(safe-area-inset-top, 0px);
left: 0; right: 0;
display: flex;
justify-content: space-between;
align-items: center;
padding: 10px 18px 6px;
z-index: 10;
pointer-events: none;
}
.hud-item {
font-size: 11px;
letter-spacing: 2px;
color: #00ffcc;
text-shadow: 0 0 8px #00ffcc;
}
.hud-item span { font-size: 15px; font-weight: 700; }
/* Canvas */
#canvas {
position: absolute;
inset: 0;
width: 100%;
height: 100%;
}
/* Controls /
/ finger tracker dot */
#fingerDot {
position: absolute;
width: 60px; height: 60px;
border-radius: 50%;
border: 2px solid #00ffcc66;
background: radial-gradient(circle, #00ffcc22, transparent);
pointer-events: none;
z-index: 6;
display: none;
transform: translate(-50%, -50%);
transition: opacity 0.1s;
}
#zoneLine {
position: absolute;
top: 0; bottom: 0; left: 50%;
width: 1px;
background: linear-gradient(to bottom, transparent 5%, #00ffcc12 50%, transparent 95%);
pointer-events: none;
z-index: 5;
}
#hintLeft, #hintRight {
position: absolute;
bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
font-size: 9px; letter-spacing: 2px;
color: #00ffcc28; font-family: ‘Orbitron’, monospace;
pointer-events: none; z-index: 5;
}
#hintLeft  { left: 16px; }
#hintRight { right: 16px; text-align: right; }
#dockBtn {
display: none;
position: absolute;
left: 50%;
bottom: calc(env(safe-area-inset-bottom, 0px) + 28px);
transform: translateX(-50%);
z-index: 20;
width: 190px; height: 72px;
border-radius: 36px;
background: radial-gradient(circle at 40% 35%, #ffdd0099, #ff880044);
border: 2.5px solid #ffdd00cc;

<body><div id="gameWrap">
  <canvas id="canvas"></canvas><div id="hud">
    <div class="hud-item">SCORE<br><span id="score">0</span></div>
    <div class="hud-item" style="text-align:center">LEVEL<br><span id="level">1</span></div>

  </div><div id="fingerDot"></div>

    <h1>KUROGA</h1>

      左側をなぞる：移動<br>

</div><script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const lifeEl = document.getElementById('lifeText');
const fingerDot = document.getElementById('fingerDot');
const dockBtn = document.getElementById('dockBtn');

let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (stars) {
    stars.length = 0;
    for (let i = 0; i < 140; i++) stars.push(makeStar());
  }
}
window.addEventListener('resize', resize);

// Stars
function makeStar() {
  return {
    x: Math.random() * (W || 400),
    y: Math.random() * (H || 800),
    r: Math.random() * 1.5 + 0.3,
    speed: Math.random() * 0.8 + 0.2,
    brightness: Math.random()
  };
}
const stars = [];
for (let i = 0; i < 140; i++) stars.push(makeStar());

// Input state — drag-to-follow + right-side fire
const input = { targetX: null, targetY: null };
let shootCooldown = 0;
let autoShoot = false;
let dockBtnPressed = false;

// Multi-touch: left half = move, right half = fire
const activeTouches = {}; // id -> { side, x, y }

function handleTouchStart(e) {
  e.preventDefault();
  if (state === 'title' || state === 'gameover') {
    unlockAudio();
    startGame();
    return;
  }
  if (state === 'ending') {
    unlockAudio();
    startNewLoop();
    return;
  }
  for (const t of e.changedTouches) {
    const side = t.clientX < W / 2 ? 'move' : 'fire';
    activeTouches[t.identifier] = { side, x: t.clientX, y: t.clientY };
    if (side === 'move') {
      input.targetX = t.clientX;
      input.targetY = t.clientY;
      fingerDot.style.left = t.clientX + 'px';
      fingerDot.style.top  = t.clientY + 'px';
      fingerDot.style.display = 'block';
    } else {
      autoShoot = true;
    }
  }
}
function handleTouchMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const info = activeTouches[t.identifier];
    if (!info) continue;
    info.x = t.clientX; info.y = t.clientY;
    if (info.side === 'move') {
      input.targetX = t.clientX;
      input.targetY = t.clientY;
      fingerDot.style.left = t.clientX + 'px';
      fingerDot.style.top  = t.clientY + 'px';
    }
  }
}
function handleTouchEnd(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const info = activeTouches[t.identifier];
    if (!info) continue;
    if (info.side === 'move') {
      input.targetX = null; input.targetY = null;
      fingerDot.style.display = 'none';
    } else {
      // check no other fire touches remain
      delete activeTouches[t.identifier];
      const stillFiring = Object.values(activeTouches).some(i => i.side === 'fire');
      if (!stillFiring) autoShoot = false;
      continue;
    }
    delete activeTouches[t.identifier];
  }
}

document.addEventListener('touchstart',  handleTouchStart,  { passive: false });
document.addEventListener('touchmove',   handleTouchMove,   { passive: false });
document.addEventListener('touchend',    handleTouchEnd,    { passive: false });
document.addEventListener('touchcancel', handleTouchEnd,    { passive: false });

dockBtn.addEventListener('touchstart', e => {
  e.preventDefault(); e.stopPropagation();
  if (state === 'docking') { dockBtnPressed = true; dockBtn.style.opacity = '0.5'; }
}, { passive: false });
dockBtn.addEventListener('touchend', e => {
  e.preventDefault(); e.stopPropagation();
  setTimeout(() => { dockBtn.style.opacity = '1'; }, 80);
}, { passive: false });
dockBtn.addEventListener('click', () => { if (state === 'docking') dockBtnPressed = true; });

// ══════════════════════════════════════════════════════════════
// FM SOUND ENGINE — Gradius / TwinBee style
// ══════════════════════════════════════════════════════════════
let audioCtx = null;
let musicNodes = [];
let musicPlaying = false;
let bossMusic = false;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Must be called synchronously inside a user gesture handler (iOS requirement)
function unlockAudio() {
  const ac = getAudio();
  if (ac.state === 'suspended') {
    ac.resume();
  }
  // Play a silent buffer to truly unlock on iOS Safari
  try {
    const buf = ac.createBuffer(1, 1, ac.sampleRate);
    const src = ac.createBufferSource();
    src.buffer = buf;
    src.connect(ac.destination);
    src.start(0);
  } catch(e) {}
}

// ── Master chain: EQ → Compressor → Limiter → Out ──────────
function makeMaster(ac) {
  const eq = ac.createBiquadFilter();
  eq.type = 'peaking'; eq.frequency.value = 3000; eq.gain.value = 3; eq.Q.value = 1;
  const comp = ac.createDynamicsCompressor();
  comp.threshold.value = -14; comp.ratio.value = 6; comp.attack.value = 0.003; comp.release.value = 0.15;
  const limiter = ac.createDynamicsCompressor();
  limiter.threshold.value = -1; limiter.ratio.value = 20; limiter.attack.value = 0.001; limiter.release.value = 0.05;
  const out = ac.createGain(); out.gain.value = 0.72;
  eq.connect(comp); comp.connect(limiter); limiter.connect(out); out.connect(ac.destination);
  return eq; // input node
}

// ── FM synthesis: carrier modulated by modulator ────────────
function fmNote(ac, dest, carrierFreq, modRatio, modIdx, vol, dur, carrierType='sine') {
  const now = ac.currentTime;
  const modFreq = carrierFreq * modRatio;

  // Modulator
  const mod = ac.createOscillator();
  const modGain = ac.createGain();
  mod.type = 'sine';
  mod.frequency.value = modFreq;
  modGain.gain.setValueAtTime(modFreq * modIdx, now);
  modGain.gain.exponentialRampToValueAtTime(modFreq * modIdx * 0.3, now + dur * 0.3);
  modGain.gain.exponentialRampToValueAtTime(0.001, now + dur);
  mod.connect(modGain); modGain.connect(mod.frequency); // FM feedback-ish? No — to carrier freq

  // Carrier
  const car = ac.createOscillator();
  const env = ac.createGain();
  car.type = carrierType;
  car.frequency.value = carrierFreq;
  modGain.connect(car.frequency); // FM modulation
  // ADSR envelope
  env.gain.setValueAtTime(0.001, now);
  env.gain.linearRampToValueAtTime(vol, now + 0.008);       // attack
  env.gain.setValueAtTime(vol * 0.8, now + 0.03);           // decay
  env.gain.exponentialRampToValueAtTime(vol * 0.6, now + dur * 0.6); // sustain
  env.gain.exponentialRampToValueAtTime(0.001, now + dur);  // release
  car.connect(env); env.connect(dest);

  mod.start(now); mod.stop(now + dur + 0.05);
  car.start(now); car.stop(now + dur + 0.05);
  return { stop() { try { mod.stop(); car.stop(); } catch(e){} } };
}

// ── Note frequency helper (semitones from C3) ───────────────
function nf(semi) { return 130.81 * Math.pow(2, semi / 12); }

// ── Sequencer engine ─────────────────────────────────────────
// pattern = array of {n:semitone, d:duration_beats} or null
function makeSeq(ac, dest, pattern, bpm, instrFn) {
  const beat = 60 / bpm;
  let idx = 0, stopped = false;
  const tids = [];
  function tick() {
    if (stopped) return;
    const step = pattern[idx % pattern.length];
    if (step !== null) instrFn(ac, dest, step, beat);
    const dur = step ? (step.d || 0.5) * beat : 0.5 * beat;
    idx++;
    const id = setTimeout(tick, dur * 1000);
    tids.push(id);
  }
  tick();
  return { stop() { stopped = true; tids.forEach(clearTimeout); } };
}

// ── Instruments ──────────────────────────────────────────────

// FM Lead — bright metallic like OPN2 Gradius lead
function fmLead(ac, dest, step, beat) {
  const dur = (step.d || 0.5) * beat * 0.9;
  const n = fmNote(ac, dest, nf(step.n), 1, 2.8, 0.22, dur, 'sine');
  // Add a detuned square layer for edge
  const sq = ac.createOscillator();
  const sg = ac.createGain();
  sq.type = 'square'; sq.frequency.value = nf(step.n); sq.detune.value = 6;
  sg.gain.setValueAtTime(0.06, ac.currentTime);
  sg.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur * 0.7);
  sq.connect(sg); sg.connect(dest);
  sq.start(ac.currentTime); sq.stop(ac.currentTime + dur + 0.05);
}

// FM Bass — punchy Gradius bass
function fmBass(ac, dest, step, beat) {
  const dur = (step.d || 0.5) * beat * 0.85;
  fmNote(ac, dest, nf(step.n), 0.5, 3.5, 0.32, dur, 'sine');
  // Sub sine one octave down
  const sub = ac.createOscillator();
  const sg = ac.createGain();
  sub.type = 'sine'; sub.frequency.value = nf(step.n - 12);
  sg.gain.setValueAtTime(0.18, ac.currentTime);
  sg.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur * 0.6);
  sub.connect(sg); sg.connect(dest);
  sub.start(ac.currentTime); sub.stop(ac.currentTime + dur + 0.05);
}

// FM Chord stab — TwinBee-style bright chord hits
function fmChord(ac, dest, step, beat) {
  const dur = (step.d || 0.25) * beat * 0.6;
  const root = step.n;
  // Major chord: root, major 3rd (+4), 5th (+7)
  const chord = step.minor ? [root, root+3, root+7] : [root, root+4, root+7];
  chord.forEach((n, i) => {
    fmNote(ac, dest, nf(n), 2, 1.5, 0.09 - i*0.01, dur, 'sine');
  });
}

// Countermelody — PSG square wave like TwinBee bells
function psgCounter(ac, dest, step, beat) {
  const dur = (step.d || 0.5) * beat * 0.75;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = 'square'; o.frequency.value = nf(step.n);
  g.gain.setValueAtTime(0.001, ac.currentTime);
  g.gain.linearRampToValueAtTime(0.07, ac.currentTime + 0.005);
  g.gain.exponentialRampToValueAtTime(0.04, ac.currentTime + 0.05);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(dest);
  o.start(ac.currentTime); o.stop(ac.currentTime + dur + 0.05);
}

// ── Drums ─────────────────────────────────────────────────────
function drumKick(ac, dest, vol=1) {
  const now = ac.currentTime;
  const o = ac.createOscillator(); const g = ac.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(200, now);
  o.frequency.exponentialRampToValueAtTime(42, now + 0.07);
  o.frequency.exponentialRampToValueAtTime(36, now + 0.15);
  g.gain.setValueAtTime(0.9 * vol, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
  o.connect(g); g.connect(dest);
  o.start(now); o.stop(now + 0.25);
  // Click transient
  const c = ac.createOscillator(); const cg = ac.createGain();
  c.type = 'sine'; c.frequency.value = 1200;
  cg.gain.setValueAtTime(0.4 * vol, now);
  cg.gain.exponentialRampToValueAtTime(0.001, now + 0.015);
  c.connect(cg); cg.connect(dest);
  c.start(now); c.stop(now + 0.02);
}

function drumSnare(ac, dest, vol=1) {
  const now = ac.currentTime;
  // Tone
  const o = ac.createOscillator(); const og = ac.createGain();
  o.type = 'triangle'; o.frequency.value = 220;
  og.gain.setValueAtTime(0.25 * vol, now);
  og.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
  o.connect(og); og.connect(dest);
  o.start(now); o.stop(now + 0.14);
  // Noise
  const len = Math.floor(ac.sampleRate * 0.18);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0; i<len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 0.5);
  const src = ac.createBufferSource(); const ng = ac.createGain();
  const hp = ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=2000;
  src.buffer = buf;
  ng.gain.setValueAtTime(0.35 * vol, now);
  ng.gain.exponentialRampToValueAtTime(0.001, now + 0.16);
  src.connect(hp); hp.connect(ng); ng.connect(dest);
  src.start(now); src.stop(now + 0.2);
}

function drumHat(ac, dest, open=false, vol=1) {
  const now = ac.currentTime;
  const len = Math.floor(ac.sampleRate * (open ? 0.12 : 0.04));
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0; i<len; i++) d[i] = (Math.random()*2-1);
  const src = ac.createBufferSource(); const g = ac.createGain();
  const hp = ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=8000;
  const bp = ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=10000; bp.Q.value=0.5;
  src.buffer = buf;
  const durFade = open ? 0.1 : 0.035;
  g.gain.setValueAtTime(0.15 * vol, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + durFade);
  src.connect(hp); hp.connect(bp); bp.connect(g); g.connect(dest);
  src.start(now); src.stop(now + durFade + 0.01);
}

function makeDrumSeq(ac, dest, pattern, bpm) {
  // pattern: array of {k,s,h,ho} per 16th note
  const step16 = 60 / bpm / 4;
  let i = 0, stopped = false;
  const tids = [];
  function tick() {
    if (stopped) return;
    const p = pattern[i % pattern.length];
    if (p.k) drumKick(ac, dest, p.k);
    if (p.s) drumSnare(ac, dest, p.s);
    if (p.h) drumHat(ac, dest, false, p.h);
    if (p.ho) drumHat(ac, dest, true, p.ho);
    i++;
    const id = setTimeout(tick, step16 * 1000);
    tids.push(id);
  }
  tick();
  return { stop() { stopped = true; tids.forEach(clearTimeout); } };
}

// ══════════════════════════════════════════════════════════════
// STAGE MUSIC — "SCRAMBLE FORCE" (Gradius Stage 1 vibes)
// Key: D major  BPM: 148
// ══════════════════════════════════════════════════════════════
// Semitones from C3. D3=2, E=4, F#=6, G=7, A=9, B=11, C#=13, D4=14
const STAGE_BPM = 148;

// Bass: driving 8th-note root movement
const STAGE_BASS = [
  {n:-10,d:.5},{n:-10,d:.25},{n:-10,d:.25},
  {n:-3,d:.5},{n:-3,d:.5},
  {n:2,d:.5},{n:2,d:.25},{n:2,d:.25},
  {n:-5,d:.5},{n:-5,d:.25},{n:-5,d:.25},
  // bar 2
  {n:-10,d:.5},{n:-10,d:.25},{n:-10,d:.25},
  {n:-3,d:.5},{n:-3,d:.5},
  {n:0,d:.5},{n:0,d:.25},{n:4,d:.25},
  {n:2,d:1},
];

// Lead melody — heroic Gradius-style
const STAGE_LEAD = [
  // Phrase A
  {n:14,d:.5},{n:14,d:.25},null,
  {n:16,d:.25},{n:14,d:.25},{n:11,d:.25},
  {n:9,d:.75},null,
  {n:11,d:.25},{n:9,d:.25},{n:7,d:.5},
  // Phrase B
  {n:6,d:.5},{n:7,d:.25},{n:9,d:.25},
  {n:11,d:.5},{n:9,d:.5},
  {n:7,d:.5},{n:6,d:.25},{n:4,d:.25},
  {n:2,d:1},
];

// Counter-melody (PSG bells)
const STAGE_CTR = [
  null,{n:26,d:.25},null,{n:23,d:.25},
  null,{n:21,d:.25},{n:21,d:.25},null,
  null,{n:23,d:.25},null,{n:26,d:.25},
  {n:28,d:.5},null,null,null,
  null,{n:26,d:.25},null,{n:23,d:.25},
  null,{n:21,d:.25},{n:19,d:.25},null,
  {n:18,d:.25},{n:19,d:.25},{n:21,d:.25},{n:23,d:.25},
  {n:26,d:1},
];

// Chord stabs on backbeat
const STAGE_CHORD = [
  null,null,{n:2,d:.25,minor:false},null,
  null,null,{n:-3,d:.25,minor:true},null,
  null,null,{n:7,d:.25,minor:false},null,
  null,null,{n:5,d:.25,minor:false},null,
  null,null,{n:2,d:.25,minor:false},null,
  null,null,{n:-3,d:.25,minor:true},null,
  null,null,{n:0,d:.25,minor:false},null,
  null,{n:2,d:.5,minor:false},null,null,
];

// Drums: 16 steps per bar, 2 bars loop
const STAGE_DRUMS = [
  {k:1},    {h:.7},   {h:.5},   {h:.7},   // 1
  {s:.9,h:.6},{h:.6}, {h:.5},   {h:.8},   // 2
  {k:.9},   {h:.7},   {k:.5,h:.5},{h:.7}, // 3
  {s:.9,h:.6},{h:.6}, {h:.6},   {ho:.4},  // 4
  {k:1},    {h:.7},   {h:.5},   {h:.7},   // 5
  {s:.9,h:.6},{h:.6}, {h:.5},   {h:.8},   // 6
  {k:.9},   {h:.7},   {h:.5,k:.5},{h:.7}, // 7
  {s:.9,h:.6},{h:.7}, {k:.4,h:.5},{h:.8}, // 8

function startTitleMusic(ac, master) {
  // Drone: stacked detuned sines — eerie & organic
  const droneFreqs = [55, 82.4, 110, 138.6, 164.8];
  const droneNodes = droneFreqs.map((f, i) => {
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'sine';
    o.frequency.value = f + i * 0.13;
    g.gain.value = 0.052 - i * 0.008;
    o.connect(g); g.connect(master);
    o.start();
    return { stop() { try { o.stop(); } catch(e){} } };
  });
  musicNodes.push(...droneNodes);

  // Bell-like FM tones — sparse, random-ish, Xevious atmosphere
  let bellStopped = false;
  const BELL_NOTES = [55, 61.7, 73.4, 82.4, 98, 110, 123.5, 146.8, 164.8, 185];
  function schedBell() {
    if (bellStopped) return;
    const now = ac.currentTime;
    const f = BELL_NOTES[Math.floor(Math.random() * BELL_NOTES.length)];
    // FM bell: high modulation index for inharmonic partials
    const mod = ac.createOscillator();
    const modG = ac.createGain();
    const car = ac.createOscillator();
    const env = ac.createGain();
    mod.type = 'sine'; mod.frequency.value = f * 2.756;
    modG.gain.setValueAtTime(f * 8, now);
    modG.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
    mod.connect(modG); modG.connect(car.frequency);
    car.type = 'sine'; car.frequency.value = f;
    env.gain.setValueAtTime(0.001, now);
    env.gain.linearRampToValueAtTime(0.12, now + 0.01);
    env.gain.exponentialRampToValueAtTime(0.001, now + 2.8);
    car.connect(env); env.connect(master);
    mod.start(now); mod.stop(now + 2.9);
    car.start(now); car.stop(now + 2.9);
    const delay = 1200 + Math.random() * 2800;
    const tid = setTimeout(schedBell, delay);
    musicNodes.push({ stop() { bellStopped = true; clearTimeout(tid); try { mod.stop(); car.stop(); } catch(e){} } });
  }
  schedBell();

  // Slow atonal melody — chromatic, mysterious
  const XEVIOUS_MELODY = [
    {n:3,d:2},{n:null,d:1},{n:8,d:1.5},{n:null,d:0.5},
    {n:6,d:2},{n:null,d:1},{n:1,d:1},{n:null,d:1},
    {n:10,d:2.5},{n:null,d:0.5},{n:5,d:1.5},{n:null,d:1},
    {n:3,d:1},{n:null,d:1},{n:11,d:2},{n:null,d:2},
  ];
  // Slow tempo, high octave, sine-based
  function xevMelody(ac2, dest2, step2, beat2) {
    if (step2 === null || step2.n === null) return;
    const dur = (step2.d || 1) * beat2 * 0.85;
    const freq = 261.63 * Math.pow(2, (step2.n + 12) / 12);
    const mod2 = ac2.createOscillator();
    const mG2 = ac2.createGain();
    const car2 = ac2.createOscillator();
    const env2 = ac2.createGain();
    mod2.type = 'sine'; mod2.frequency.value = freq * 1.414;
    mG2.gain.setValueAtTime(freq * 1.5, ac2.currentTime);
    mG2.gain.exponentialRampToValueAtTime(0.001, ac2.currentTime + dur);
    mod2.connect(mG2); mG2.connect(car2.frequency);
    car2.type = 'sine'; car2.frequency.value = freq;
    env2.gain.setValueAtTime(0.001, ac2.currentTime);
    env2.gain.linearRampToValueAtTime(0.09, ac2.currentTime + 0.04);
    env2.gain.exponentialRampToValueAtTime(0.001, ac2.currentTime + dur);
    car2.connect(env2); env2.connect(dest2);
    mod2.start(ac2.currentTime); mod2.stop(ac2.currentTime + dur + 0.1);
    car2.start(ac2.currentTime); car2.stop(ac2.currentTime + dur + 0.1);
  }
  musicNodes.push(makeSeq(ac, master, XEVIOUS_MELODY, 38, xevMelody));

  // Sub-bass pulse — deep heartbeat
  let pulseStopped = false;
  function pulse() {
    if (pulseStopped) return;
    const now = ac.currentTime;
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type = 'sine'; o.frequency.value = 36;
    g.gain.setValueAtTime(0.28, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
    o.connect(g); g.connect(master);
    o.start(now); o.stop(now + 0.65);
    const tid = setTimeout(pulse, 1800 + Math.random() * 600);
    musicNodes.push({ stop() { pulseStopped = true; clearTimeout(tid); try { o.stop(); } catch(e){} } });
  }
  pulse();
}

function startMusic(mode) {
  stopMusic();
  const ac = getAudio();
  if (ac.state === 'suspended') ac.resume().catch(() => {});
  const master = makeMaster(ac);

  if (mode === 'ending') {
    startEndingMusic(ac, master);
    return;
  } else if (mode === 'title' || mode === true && false) {
    startTitleMusic(ac, master);
  } else if (mode === 'boss') {
    musicNodes.push(
      makeSeq(ac, master, BOSS2_BASS,  BOSS2_BPM, fmBass),
      makeSeq(ac, master, BOSS2_LEAD,  BOSS2_BPM, fmLead),
      makeSeq(ac, master, BOSS2_CTR,   BOSS2_BPM, psgCounter),
      makeSeq(ac, master, BOSS2_CHORD, BOSS2_BPM, fmChord),
      makeDrumSeq(ac, master, BOSS2_DRUMS, BOSS2_BPM),
    );
  } else {
    musicNodes.push(
      makeSeq(ac, master, STAGE_BASS,  STAGE_BPM, fmBass),
      makeSeq(ac, master, STAGE_LEAD,  STAGE_BPM, fmLead),
      makeSeq(ac, master, STAGE_CTR,   STAGE_BPM, psgCounter),
      makeSeq(ac, master, STAGE_CHORD, STAGE_BPM, fmChord),
      makeDrumSeq(ac, master, STAGE_DRUMS, STAGE_BPM),
    );
  }
  musicPlaying = true;
  bossMusic = (mode === 'boss');
}

function stopMusic() {
  musicNodes.forEach(n => { try { n.stop(); } catch(e){} });
  musicNodes = [];
  musicPlaying = false;
}

function sfxShoot() {
  try {
    const ac = getAudio(); const now = ac.currentTime;
    // Two-tone laser ping (FM)
    [880, 1200].forEach((f, i) => {
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'square'; o.frequency.setValueAtTime(f, now);
      o.frequency.exponentialRampToValueAtTime(f * 0.4, now + 0.06);
      g.gain.setValueAtTime(0.05, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.07);
      o.connect(g); g.connect(ac.destination);
      o.start(now + i * 0.01); o.stop(now + 0.09);
    });
  } catch(e) {}
}

function sfxExplosion() {
  try {
    const ac = getAudio(); const now = ac.currentTime;
    // Layered noise burst
    [0.4, 0.25].forEach((dur, i) => {
      const len = Math.floor(ac.sampleRate * dur);
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let j=0; j<len; j++) d[j] = (Math.random()*2-1) * Math.pow(1 - j/len, i === 0 ? 1.2 : 2);
      const src = ac.createBufferSource();
      const g = ac.createGain();
      const lp = ac.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = i === 0 ? 600 : 1800;
      src.buffer = buf;
      g.gain.value = i === 0 ? 0.45 : 0.2;
      src.connect(lp); lp.connect(g); g.connect(ac.destination);
      src.start(now + i * 0.02); src.stop(now + dur + 0.05);
    });
    // Pitch-drop boom
    const o = ac.createOscillator(); const og = ac.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(120, now);
    o.frequency.exponentialRampToValueAtTime(28, now + 0.25);
    og.gain.setValueAtTime(0.5, now);
    og.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    o.connect(og); og.connect(ac.destination);
    o.start(now); o.stop(now + 0.32);
  } catch(e) {}
}

function sfxHit() {
  try {
    const ac = getAudio(); const now = ac.currentTime;
    // Warning alarm blip
    [400, 320].forEach((f, i) => {
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'square'; o.frequency.value = f;
      g.gain.setValueAtTime(0.18, now + i * 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.08);
      o.connect(g); g.connect(ac.destination);
      o.start(now + i * 0.05); o.stop(now + i * 0.05 + 0.1);
    });
  } catch(e) {}
}

// Each path is a list of [x,y] waypoints (0-1 normalized).
// Enemies follow the path in order, spacing offset by index.
// x/y are fractions of W/H.
function buildPath(pts) {
  // pts: [[x,y],...] normalized 0-1
  return pts.map(p => ({ x: p[0], y: p[1] }));
}

// Catmull-Rom spline interpolation along waypoints
function pathAt(pts, t) {
  // t: 0..1 over entire path
  const n = pts.length - 1;
  const seg = Math.min(Math.floor(t * n), n - 1);
  const lt = (t * n) - seg;

  const p0 = pts[Math.max(seg-1, 0)];
  const p1 = pts[seg];
  const p2 = pts[Math.min(seg+1, n)];
  const p3 = pts[Math.min(seg+2, n)];

  // Catmull-Rom
  const t2 = lt*lt, t3 = lt*lt*lt;
  return {
    x: 0.5*((2*p1.x)+(-p0.x+p2.x)*lt+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    y: 0.5*((2*p1.y)+(-p0.y+p2.y)*lt+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3),
  };
}

// Drawing
function drawPlayer(x, y, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  const s = 1.2;
  ctx.strokeStyle = '#00ffcc';
  ctx.fillStyle = '#001a15';
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 18;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x, y - 22*s);
  ctx.lineTo(x - 18*s, y + 18*s);
  ctx.lineTo(x - 7*s, y + 12*s);
  ctx.lineTo(x, y + 16*s);
  ctx.lineTo(x + 7*s, y + 12*s);
  ctx.lineTo(x + 18*s, y + 18*s);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#00ffcc44';
  ctx.beginPath();
  ctx.ellipse(x, y - 5*s, 6, 10, 0, 0, Math.PI*2);
  ctx.fill();
  const flicker = 4 + Math.sin(frameCount * 0.5) * 2;
  ctx.shadowBlur = 22;
  ctx.fillStyle = `hsl(${160 + Math.sin(frameCount*0.3)*20},100%,70%)`;
  ctx.beginPath(); ctx.ellipse(x - 6*s, y + 18*s, 3.5, flicker, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + 6*s, y + 18*s, 3.5, flicker, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.strokeStyle = e.color;
  ctx.fillStyle = '#1a0010';
  ctx.shadowColor = e.color;
  ctx.shadowBlur = 14;
  ctx.lineWidth = 2;
  const x = e.x, y = e.y, s = e.scale || 1;
  if (e.type === 'basic') {
    ctx.beginPath();
    ctx.moveTo(x, y+14*s); ctx.lineTo(x-14*s, y-10*s);
    ctx.lineTo(x-6*s, y-4*s); ctx.lineTo(x, y-12*s);
    ctx.lineTo(x+6*s, y-4*s); ctx.lineTo(x+14*s, y-10*s);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  } else if (e.type === 'zigzag') {
    ctx.beginPath();
    ctx.moveTo(x, y+14*s); ctx.lineTo(x-18*s, y-6*s);
    ctx.lineTo(x-5*s, y-2*s); ctx.lineTo(x, y-14*s);
    ctx.lineTo(x+5*s, y-2*s); ctx.lineTo(x+18*s, y-6*s);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.strokeStyle = e.color+'66';
    ctx.beginPath(); ctx.arc(x, y, 11*s, 0, Math.PI*2); ctx.stroke();
  } else if (e.type === 'tank') {
    ctx.fillStyle = '#1a0505';
    ctx.beginPath(); ctx.roundRect(x-20*s, y-16*s, 40*s, 32*s, 5); ctx.fill(); ctx.stroke();
    ctx.fillStyle = e.color;
    ctx.fillRect(x-15*s, y-12*s, 30*s*(e.hp/e.maxHp), 5);
    ctx.strokeStyle = e.color+'88'; ctx.lineWidth = 1;
    ctx.strokeRect(x-15*s, y-12*s, 30*s, 5);
  }
  ctx.restore();
}

function drawBoss(b) {
  ctx.save();
  const x = b.x, y = b.y;

  if (b.isLast) {
    // ── IGO: spinning spiky sphere ──────────────────────────
    ctx.shadowBlur = 35;
    const hp_ratio = b.hp / b.maxHp;
    const coreHue = 0 + hp_ratio * 30; // red → orange as hp drops
    ctx.shadowColor = `hsl(${coreHue},100%,55%)`;

    // Core pulsing circle
    const pulse = 1 + 0.06 * Math.sin(frameCount * 0.12);
    ctx.fillStyle = `hsl(${coreHue},80%,12%)`;
    ctx.strokeStyle = `hsl(${coreHue},100%,55%)`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(x, y, b.innerR * pulse, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();

    // Spikes
    const n = b.spikes;
    for (let i = 0; i < n; i++) {
      const a = b.spinAngle + (Math.PI*2*i/n);
      const a2 = b.spinAngle + (Math.PI*2*(i+0.5)/n);
      const outerPulse = b.outerR * (1 + 0.08 * Math.sin(frameCount * 0.08 + i));
      const ix = x + Math.cos(a) * b.innerR * 1.05;
      const iy = y + Math.sin(a) * b.innerR * 1.05;
      const ox = x + Math.cos(a) * outerPulse;
      const oy = y + Math.sin(a) * outerPulse;
      const mx = x + Math.cos(a2) * b.innerR * 0.8;
      const my = y + Math.sin(a2) * b.innerR * 0.8;
      ctx.fillStyle = `hsl(${coreHue+i*5},100%,50%)`;
      ctx.strokeStyle = `hsl(${coreHue+i*5},100%,70%)`;
      ctx.lineWidth = 1.5;
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.moveTo(ix, iy);
      ctx.lineTo(ox, oy);
      ctx.lineTo(mx, my);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }

    // Inner glow eye
    ctx.shadowBlur = 25;
    ctx.fillStyle = `hsl(${coreHue},100%,65%)`;
    ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2); ctx.fill();

    // HP bar
    const barW = Math.min(W * 0.72, 300);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#220000';
    ctx.fillRect(x - barW/2, y + b.outerR + 16, barW, 12);
    ctx.fillStyle = `hsl(${hp_ratio*120},100%,50%)`;
    ctx.fillRect(x - barW/2, y + b.outerR + 16, barW * hp_ratio, 12);
    ctx.strokeStyle = `hsl(${coreHue},100%,60%)`; ctx.lineWidth = 1.5;
    ctx.strokeRect(x - barW/2, y + b.outerR + 16, barW, 12);
    ctx.fillStyle = `hsl(${coreHue},100%,70%)`;
    ctx.font = `bold 12px Orbitron`; ctx.textAlign = 'center';
    ctx.fillText('⚠ FINAL BOSS ⚠', x, y + b.outerR + 44);

  } else {
    // ── Normal boss ──────────────────────────────────────────
    ctx.strokeStyle = '#ff8800'; ctx.fillStyle = '#180800';
    ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 28; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x, y+36); ctx.lineTo(x-60, y+12);
    ctx.lineTo(x-48, y-12); ctx.lineTo(x-24, y-6);
    ctx.lineTo(x, y-36); ctx.lineTo(x+24, y-6);
    ctx.lineTo(x+48, y-12); ctx.lineTo(x+60, y+12);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ff880033';
    ctx.beginPath(); ctx.ellipse(x, y-10, 14, 18, 0, 0, Math.PI*2); ctx.fill();
    const barW = Math.min(W * 0.6, 240);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#330000';
    ctx.fillRect(x - barW/2, y+45, barW, 10);
    ctx.fillStyle = `hsl(${(b.hp/b.maxHp)*120},100%,50%)`;
    ctx.fillRect(x - barW/2, y+45, barW*(b.hp/b.maxHp), 10);
    ctx.strokeStyle = '#ff8800'; ctx.lineWidth = 1;
    ctx.strokeRect(x - barW/2, y+45, barW, 10);
    ctx.fillStyle = '#ff8800'; ctx.font = `bold 11px Orbitron`;
    ctx.textAlign = 'center'; ctx.fillText('⚠ BOSS ⚠', x, y+68);
  }
  ctx.restore();
}

}

function spawnFirework() {

      life: 1, decay: 0.018 + Math.random()*0.015,
      r: 1.5 + Math.random()*2.5,
      col: `hsl(${hue+Math.random()*30},100%,65%)`,
    });
  }
}

function updateEnding() {
  ending.timer++;
  ending.fwTimer++;

  // Stars scroll
  for (const s of stars) {
    s.y += s.speed * (ending.phase === 'flyaway' ? 1 : 0.5);
    if (s.y > H) { s.y = -2; s.x = Math.random()*W; }
  }

  if (ending.phase === 'flyaway') {
    // Ship accelerates upward and out
    ending.shipVy -= 0.18;
    ending.shipVx += (W/2 - ending.shipX) * 0.01;
    ending.shipX += ending.shipVx;
    ending.shipY += ending.shipVy;
    // Exhaust particles
    if (frameCount % 2 === 0) spawnParticles(ending.shipX, ending.shipY + 20, '#00ffcc', 2);
    particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.vx*=0.94; p.vy*=0.94; p.life-=p.decay; return p.life>0; });
    if (ending.shipY < -120) {
      ending.phase = 'scroll';
      ending.timer = 0;
    }
    return;
  }

  // Scroll phase
  ending.scrollY -= 1.4;

  // Fireworks
  if (ending.fwTimer % 55 === 0) spawnFirework();
  ending.fireworks = ending.fireworks.filter(f => {
    f.x += f.vx; f.y += f.vy; f.vx *= 0.96; f.vy *= 0.96;
    f.life -= f.decay; return f.life > 0;
  });

  // Check if scroll is done
  const totalH = ending.credits.length * 52 + H;
  if (ending.scrollY < -totalH + H * 0.3) {
    ending.phase = 'fin';
  }
}

function drawEnding() {
  // Black starfield bg already drawn

  // Fireworks
  for (const f of ending.fireworks) {
    ctx.save(); ctx.globalAlpha = f.life;
    ctx.fillStyle = f.col; ctx.shadowColor = f.col; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  if (ending.phase === 'flyaway') {
    // Exhaust trail
    for (const p of particles) {
      ctx.save(); ctx.globalAlpha=p.life;
      ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    if (ending.shipY > -80) {
      if (merged) {
        drawPlayer(ending.shipX-14, ending.shipY, 1);
        drawPlayer(ending.shipX+14, ending.shipY, 1);
      } else {
        drawPlayer(ending.shipX, ending.shipY, 1);

    }
    return;
  }

  // Staff roll
  ctx.save();
  ctx.textAlign = 'center';
  ending.credits.forEach((line, i) => {
    const y = ending.scrollY + i * 52;
    if (y < -60 || y > H + 20) return;
    const alpha = Math.min(1, Math.min(y / 80, (H - y) / 80));
    ctx.globalAlpha = Math.max(0, alpha);
    if (line.big) {
      ctx.font = `bold ${Math.round(W * 0.065)}px Orbitron`;
    } else if (line.sub) {
      ctx.font = `${Math.round(W * 0.036)}px Orbitron`;
    } else {
      ctx.font = `${Math.round(W * 0.048)}px Orbitron`;
    }
    ctx.fillStyle = line.col || '#ffffff';
    ctx.shadowColor = line.col || '#ffffff';
    ctx.shadowBlur = line.big ? 18 : 6;
    ctx.fillText(line.t, W/2, y);
  });
  ctx.restore();

  // "PRESS START" pulse at fin phase
  if (ending.phase === 'fin') {
    const pulse = 0.5 + 0.5 * Math.abs(Math.sin(ending.timer * 0.06));
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.font = `bold ${Math.round(W * 0.06)}px Orbitron`;
    ctx.fillStyle = '#00ffcc'; ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 25;
    ctx.textAlign = 'center';
    ctx.fillText('TAP TO CONTINUE', W/2, H/2);
    ctx.restore();
  }
}

// ── Bonus Stage ──────────────────────────────────────────────
function startBonusStage() {
  state = 'bonus';
  bonus = {
    active: true,
    enemies: [],
    wave: 0,
    waveTimer: 0,
    totalEnemies: 0,
    killed: 0,
    timer: 0,
    maxTime: 60 * 25,
    perfect: false,
    resultTimer: 0,
    done: false,
  };
  bullets = []; enemyBullets = []; particles = [];
  levelTimer = 0; spawnTimer = 0;
  stopMusic();
  // Play bonus fanfare via SFX
  sfxBonusStart();
}

function sfxBonusStart() {
  try {
    const ac = getAudio(); const now = ac.currentTime;
    // Ascending fanfare: C E G C
    const notes = [523, 659, 784, 1047];
    notes.forEach((f, i) => {
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'square'; o.frequency.value = f;
      g.gain.setValueAtTime(0.18, now + i*0.12);
      g.gain.exponentialRampToValueAtTime(0.001, now + i*0.12 + 0.18);
      o.connect(g); g.connect(ac.destination);
      o.start(now + i*0.12); o.stop(now + i*0.12 + 0.2);
    });
  } catch(e) {}
}

function sfxBonusPerfect() {
  try {
    const ac = getAudio(); const now = ac.currentTime;
    const notes = [523,659,784,1047,1319,1568];
    notes.forEach((f,i) => {
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'square'; o.frequency.value = f;
      g.gain.setValueAtTime(0.15, now + i*0.08);
      g.gain.exponentialRampToValueAtTime(0.001, now + i*0.08 + 0.14);
      o.connect(g); g.connect(ac.destination);
      o.start(now + i*0.08); o.stop(now + i*0.08 + 0.18);
    });
  } catch(e) {}
}

function updateBonus() {
  bonus.timer++;

  // Stars still scroll
  for (const s of stars) {
    s.y += s.speed * 2; // faster scroll in bonus
    if (s.y > H) { s.y = -2; s.x = Math.random()*W; }
  }

  // Player can move and shoot
  if (input.targetX !== null) {
    const tx = Math.max(25, Math.min(W-25, input.targetX));
    const ty = Math.max(80, Math.min(H-180, input.targetY));
    player.x += (tx - player.x) * 0.18;
    player.y += (ty - player.y) * 0.18;
  }
  applyKeyboard();
  if (autoShoot && shootCooldown <= 0) {
    if (merged) {
      bullets.push({x:player.x-14,y:player.y-20,vy:-16});
      bullets.push({x:player.x+14,y:player.y-20,vy:-16});
    } else {
      bullets.push({x:player.x,y:player.y-24,vy:-16});
    }
    shootCooldown = 10; sfxShoot();
  }
  if (shootCooldown > 0) shootCooldown--;
  bullets = bullets.filter(b => { b.y += b.vy; return b.y > -15; });

  if (bonus.done) {
    bonus.resultTimer++;
    if (bonus.resultTimer > 180) {
      // Return to normal play
      state = 'playing';
      levelTimer=0; spawnTimer=0; levelUpMsg=120;
      startMusic('stage');
    }
    // Particles still update
    particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.vx*=0.94; p.vy*=0.94; p.life-=p.decay; return p.life>0; });
    return;
  }

  // Spawn waves
  // Spawn waves: launch each enemy with a staggered start time
  const WAVE_INTERVAL = 110;
  if (bonus.wave < BONUS_WAVES.length && bonus.waveTimer >= WAVE_INTERVAL) {
    const waveCfgs = BONUS_WAVES[bonus.wave];
    waveCfgs.forEach((cfg) => {
      bonus.totalEnemies++;
      bonus.enemies.push({
        t: -cfg.delay,   // negative = waiting to start (delay offset)
        pts: cfg.path,
        color: cfg.color,
        hp: 1, points: 100,
        x: cfg.path[0].x * W,
        y: cfg.path[0].y * H,
        angle: 0,
      });
    });
    bonus.wave++;
    bonus.waveTimer = 0;
  }
  bonus.waveTimer++;

  // Update bonus enemies along Catmull-Rom paths
  bonus.enemies = bonus.enemies.filter(e => {
    e.t += 0.008; // path speed — controls how fast they travel
    if (e.t < 0) return true; // still in delay, hold at start
    const t01 = Math.min(e.t, 1.0);
    const pos = pathAt(e.pts, t01);
    const prevPos = pathAt(e.pts, Math.max(0, t01 - 0.008));
    e.angle = Math.atan2(pos.y - prevPos.y, pos.x - prevPos.x);
    e.x = pos.x * W;
    e.y = pos.y * H;
    if (e.t >= 1.0) return false; // exited

    // Bullet hits
    bullets = bullets.filter(b => {
      if (dist(b.x,b.y,e.x,e.y) < 22) {
        e.hp--; spawnParticles(b.x,b.y,e.color,5); return false;
      }
      return true;
    });
    if (e.hp <= 0) {
      bonus.killed++; score += e.points; updateUI();
      sfxExplosion(); spawnParticles(e.x,e.y,e.color,16);
      return false;
    }
    return true;
  });

  // Check done: all waves spawned and all killed, or time up
  const allSpawned = bonus.wave >= BONUS_WAVES.length;
  const allKilled = bonus.enemies.length === 0 && allSpawned;
  const timeUp = bonus.timer >= bonus.maxTime;

  if (allKilled || timeUp) {
    bonus.done = true;
    bonus.perfect = allKilled && bonus.killed === bonus.totalEnemies;
    if (bonus.perfect) {
      score += 10000; updateUI();
      sfxBonusPerfect();
      for(let i=0;i<8;i++) spawnParticles(W/2, H/2, '#ffdd00', 10);
    }
  }

  particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.vx*=0.94; p.vy*=0.94; p.life-=p.decay; return p.life>0; });
}

function drawBonus() {
  // Fast-scrolling stars already drawn in main draw()

  // Particles
  for (const p of particles) {
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Bonus enemies — Galaga-style colored bugs, rotated to face direction of travel
  for (const e of bonus.enemies) {
    if (e.t < 0) continue; // still in delay
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(e.angle + Math.PI / 2); // nose forward
    ctx.strokeStyle = e.color; ctx.fillStyle = '#0a0010';
    ctx.shadowColor = e.color; ctx.shadowBlur = 16; ctx.lineWidth = 2;
    const s = 1.15;
    ctx.beginPath();
    ctx.moveTo(0, -13*s);
    ctx.lineTo(-18*s, -4*s); ctx.lineTo(-10*s, 2*s);
    ctx.lineTo(-6*s, 11*s); ctx.lineTo(0, 7*s);
    ctx.lineTo(6*s, 11*s); ctx.lineTo(10*s, 2*s);
    ctx.lineTo(18*s, -4*s);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Eyes (always upright relative to body)
    ctx.fillStyle = e.color;
    ctx.beginPath(); ctx.arc(-4, -3, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, -3, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Player bullets
  for (const b of bullets) drawBullet(b);

  // Player
  const alpha = player.invincible>0?(Math.floor(frameCount/4)%2===0?0.25:0.9):1;
  if (merged) {
    drawPlayer(player.x-14,player.y,alpha); drawPlayer(player.x+14,player.y,alpha);
  } else {
    drawPlayer(player.x,player.y,alpha);
  }

  // HUD: BONUS STAGE banner
  ctx.save();
  const blink = Math.floor(frameCount/20)%2===0;
  ctx.globalAlpha = blink ? 1 : 0.5;
  ctx.font = `bold ${Math.round(W*0.055)}px Orbitron`;
  ctx.fillStyle='#ffdd00'; ctx.shadowColor='#ffdd00'; ctx.shadowBlur=18;
  ctx.textAlign='center';
  ctx.fillText('★ BONUS STAGE ★', W/2, 75);
  ctx.restore();

  // Timer bar
  const timeLeft = Math.max(0, 1 - bonus.timer / bonus.maxTime);
  ctx.fillStyle = '#111';
  ctx.fillRect(20, 88, W-40, 8);
  ctx.fillStyle = `hsl(${timeLeft*120},100%,55%)`;
  ctx.fillRect(20, 88, (W-40)*timeLeft, 8);

  // Kill count
  ctx.save();
  ctx.font = `${Math.round(W*0.038)}px Orbitron`;
  ctx.fillStyle='#00ffcc'; ctx.textAlign='center'; ctx.shadowColor='#00ffcc'; ctx.shadowBlur=8;
  ctx.fillText(`${bonus.killed} / ${bonus.totalEnemies}`, W/2, 112);
  ctx.restore();

  // Result screen
  if (bonus.done) {
    const fade = Math.min(1, bonus.resultTimer/25);
    ctx.save(); ctx.globalAlpha=fade; ctx.textAlign='center';
    if (bonus.perfect) {
      ctx.font=`bold ${Math.round(W*0.1)}px Orbitron`;
      ctx.fillStyle='#ffdd00'; ctx.shadowColor='#ffdd00'; ctx.shadowBlur=35;
      ctx.fillText('PERFECT!!', W/2, H/2-30);
      ctx.font=`bold ${Math.round(W*0.05)}px Orbitron`;
      ctx.fillStyle='#ff8800';
      ctx.fillText('+10000 pts', W/2, H/2+20);
    } else {
      ctx.font=`bold ${Math.round(W*0.07)}px Orbitron`;
      ctx.fillStyle='#00ffcc'; ctx.shadowColor='#00ffcc'; ctx.shadowBlur=20;
      ctx.fillText(`HIT ${bonus.killed}`, W/2, H/2-20);
      ctx.font=`${Math.round(W*0.04)}px Orbitron`;
      ctx.fillStyle='#00ffcc88';
      ctx.fillText('BONUS STAGE END', W/2, H/2+25);
    }
    ctx.restore();
  }
}

function update() {
  frameCount++;

  if (state === 'bonus') { updateBonus(); return; }
  if (state === 'ending') { updateEnding(); return; }

  for (const s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = -2; s.x = Math.random()*W; }
  }

  // ── INTRO FLYBY ──────────────────────────────────────────────
  if (state === 'intro') {
    intro.timer++;
    if (intro.phase === 'fly') {
      // Ship flies down from top
      intro.shipY += (intro.targetY - intro.shipY) * 0.04 + 2;
      player.x = W / 2;
      player.y = intro.shipY;
      spawnParticles(player.x, player.y + 20, '#00ffcc', 1);
      if (Math.abs(intro.shipY - intro.targetY) < 4 && intro.timer > 60) {
        intro.phase = 'settle';
        intro.timer = 0;
      }
    } else if (intro.phase === 'settle') {
      // Brief pause, engine flicker
      intro.timer++;
      if (intro.timer > 80) {
        // Transition to playing
        state = 'playing';
        startMusic('stage');
      }
    }
    return;
  }

  // ── DOCKING EVENT ─────────────────────────────────────────────
  if (state === 'docking') {
    const dk = dockEvent;
    dk.flashTimer++;
    if (dk.result !== null) {
      dk.resultTimer++;
      if (dk.resultTimer > 150) {
        if (dk.result === 'success') merged = true;
        level++; levelEl.textContent = level;
        bossActive = false; boss = null;
        levelTimer = 0; spawnTimer = 0;
        enemies = []; enemyBullets = [];
        dockBtn.style.display = 'none';
        state = 'playing'; startMusic('stage'); levelUpMsg = 120;
      }
      return;
    }
    // Move second ship down toward dock zone
    dk.ship2y += dk.ship2vy;
    dk.ship2vy += 0.018; // very gentle acceleration
    if (dk.ship2vy > 1.2) dk.ship2vy = 1.2; // slow max speed

    // Player can nudge left/right only
    if (input.targetX !== null) {
      const tx = Math.max(25, Math.min(W-25, input.targetX));
      player.x += (tx - player.x) * 0.12;
    }
    applyKeyboard();

    // DOCK button only — no accidental fire trigger
    if (dockBtnPressed && !dk.locked) {
      dockBtnPressed = false;
      dk.locked = true;
      const ddx = Math.abs(dk.ship2x - player.x);
      const ddy = Math.abs(dk.ship2y - player.y);
      if (ddx < 80 && ddy < 120) {
        dk.result = 'success'; sfxExplosion();
        for (let i = 0; i < 5; i++) {
          spawnParticles(player.x, player.y - 20, '#00ffcc', 6);
          spawnParticles(player.x, player.y - 20, '#ffdd00', 4);
        }
      } else { dk.result = 'fail'; sfxHit(); }
    }
    // Auto-fail if ship flies past without docking
    if (!dk.locked && dk.ship2y > player.y + 180) { dk.result = 'fail'; sfxHit(); }
    return;
  }

  if (state !== 'playing') return;

  // Move player — smoothly follow finger
  if (input.targetX !== null) {
    const tx = Math.max(25, Math.min(W-25, input.targetX));
    const ty = Math.max(80, Math.min(H - 180, input.targetY));
    player.x += (tx - player.x) * 0.18;
    player.y += (ty - player.y) * 0.18;
  }

  applyKeyboard();

  // Auto shoot
  if (autoShoot && shootCooldown <= 0) {
    if (merged) {
      bullets.push({ x: player.x - 14, y: player.y - 20, vy: -16 });
      bullets.push({ x: player.x + 14, y: player.y - 20, vy: -16 });
    } else {
      bullets.push({ x: player.x, y: player.y - 24, vy: -16 });
    }
    shootCooldown = 10;
    sfxShoot();
  }
  if (shootCooldown > 0) shootCooldown--;

  // Player bullets
  bullets = bullets.filter(b => { b.y += b.vy; return b.y > -15; });

  // Enemy bullets
  if (player.invincible > 0) player.invincible--;
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    if (b.x < -10 || b.x > W+10 || b.y > H+10) return false;
    if (player.invincible <= 0 && dist(b.x, b.y, player.x, player.y) < 22) {
      lives--; updateUI();
      spawnParticles(player.x, player.y, '#00ffcc', 10);
      player.invincible = 80;
      sfxHit();
      if (lives <= 0) endGame();
      return false;
    }
    return true;
  });

  // Spawn
  levelTimer++;
  if (!bossActive) {
    spawnTimer++;
    if (spawnTimer >= Math.max(28, 75 - level*8)) { spawnEnemy(); spawnTimer = 0; }
    if (levelTimer > 500 + level*80) {
      // Level 6 = LAST BOSS
      if (level >= 6 && !lastBossActive) {
        lastBossActive = true;
        bossActive = true;
        boss = {
          x: W/2, y: 120, isLast: true,
          hp: 70, maxHp: 70,
          vx: 0.9, vy: 0, shootTimer: 0,
          spinAngle: 0, spikes: 16, outerR: 68, innerR: 30,
          phase: 0, phaseTimer: 0,
        };
      } else {
        bossActive = true;
        boss = { x:W/2, y:100, hp:25+level*12, maxHp:25+level*12, vx:2, shootTimer:0 };
      }
      enemies = []; enemyBullets = [];
      startMusic('boss');
    }
  }

  // Enemies
  enemies = enemies.filter(e => {
    e.y += e.speed;
    if (e.zigzag) { e.angle += 0.05; e.x += Math.sin(e.angle)*2.5; }
    if (e.y > H+30) return false;
    if (Math.random() < e.shootRate) {
      const dx=player.x-e.x, dy=player.y-e.y, d=Math.sqrt(dx*dx+dy*dy);
      enemyBullets.push({ x:e.x, y:e.y, vx:dx/d*3.5, vy:dy/d*3.5 });
    }
    if (player.invincible<=0 && dist(e.x,e.y,player.x,player.y)<30) {
      lives--; updateUI(); spawnParticles(player.x,player.y,'#00ffcc',8);
      player.invincible=80; if(lives<=0) endGame();
    }
    bullets = bullets.filter(b => {
      if (dist(b.x,b.y,e.x,e.y)<22) {
        e.hp--; spawnParticles(b.x,b.y,e.color,5); return false;
      }
      return true;
    });
    if (e.hp<=0) { score+=e.points*level; updateUI(); spawnParticles(e.x,e.y,e.color,18); sfxExplosion(); return false; }
    return true;
  });

  // Boss
  if (boss) {
    if (boss.isLast) {
      // ── LAST BOSS: IGO (spiky sphere) ──
      boss.spinAngle += 0.018;
      boss.phaseTimer++;
      // Drift side to side, occasionally lunge
      boss.x += boss.vx;
      if (boss.x < 80 || boss.x > W-80) boss.vx *= -1;
      // Phase-based attack patterns
      if (boss.phaseTimer % 90 === 0) {
        // Ring shot: bullets in all directions
        const shots = 8 + Math.floor(boss.phaseTimer/400);
        for (let i=0; i<shots; i++) {
          const a = (Math.PI*2*i/shots) + boss.spinAngle;
          enemyBullets.push({ x:boss.x, y:boss.y, vx:Math.cos(a)*2.8, vy:Math.sin(a)*2.8 });
        }
      }
      if (boss.phaseTimer % 240 === 0) {
        // Aimed triple shot
        const dx=player.x-boss.x, dy=player.y-boss.y, d=Math.sqrt(dx*dx+dy*dy);
        for (let i=-1;i<=1;i+=2) {
          enemyBullets.push({ x:boss.x, y:boss.y, vx:dx/d*4+i*1.0, vy:dy/d*4 });
        }
      }
      // Hit detection: spiky circle
      bullets = bullets.filter(b => {
        if (dist(b.x,b.y,boss.x,boss.y) < boss.outerR) {
          boss.hp--; spawnParticles(b.x,b.y,'#ff4400',3); return false;
        }
        return true;
      });
      if (player.invincible<=0 && dist(boss.x,boss.y,player.x,player.y) < boss.outerR-10) {
        lives=0; updateUI(); endGame();
      }
    } else {
      boss.x += boss.vx;
      if (boss.x < 70 || boss.x > W-70) boss.vx *= -1;
      boss.shootTimer++;
      if (boss.shootTimer%105===0) {
        for (let a=-1; a<=1; a++) enemyBullets.push({ x:boss.x, y:boss.y+38, vx:a*1.5, vy:4 });
      }
      if (boss.shootTimer%300===0) {
        const dx=player.x-boss.x, dy=player.y-boss.y, d=Math.sqrt(dx*dx+dy*dy);
        enemyBullets.push({ x:boss.x, y:boss.y+38, vx:dx/d*5, vy:dy/d*5 });
      }
      bullets = bullets.filter(b => {
        if (Math.abs(b.x-boss.x)<64 && Math.abs(b.y-boss.y)<40) {
          boss.hp--; spawnParticles(b.x,b.y,'#ff8800',4); return false;
        }
        return true;
      });
      if (player.invincible<=0 && dist(boss.x,boss.y,player.x,player.y)<60) {
        lives=0; updateUI(); endGame();
      }
    }
    if (boss.hp<=0) {
      score+=600*level; updateUI();
      spawnParticles(boss.x,boss.y,'#ff8800',50);
      sfxExplosion();
      const wasLast = boss.isLast;
      bossKillCount++;
      boss=null; bossActive=false;
      enemies=[]; enemyBullets=[];

      if (wasLast) {
        // ── ENDING ──
        startEnding();
      } else if (bossKillCount % 4 === 0) {
        // ── BONUS STAGE every 4th boss ──
        level++; levelEl.textContent=level;
        startBonusStage();
      } else if (bossKillCount % 2 === 0 && !merged) {
        // ── DOCKING EVENT every 2nd boss ──
        state = 'docking';
        dockEvent = {
          active: true,
          ship2x: W/2 + (Math.random() > 0.5 ? 60 : -60),
          ship2y: -80, ship2vy: 0.3, dockZoneY: player.y,
          result: null, resultTimer: 0, flashTimer: 0, locked: false,
        };
        dockBtn.style.display = 'flex';
      } else {
        level++; levelTimer=0; spawnTimer=0; levelUpMsg=120;
        levelEl.textContent=level;
        startMusic('stage');
      }
    }
  }

  // Particles
  particles = particles.filter(p => {
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.94; p.vy*=0.94; p.life-=p.decay; return p.life>0;
  });
}

function endGame() {
  state = 'gameover';
  stopMusic();
  dockBtn.style.display = 'none';
  showOverlay('GAME OVER', `SCORE: ${score}`, 'TAP TO RETRY');
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    ctx.globalAlpha = 0.3 + s.brightness*0.7;
    ctx.fillStyle = `hsl(${180+s.brightness*40},60%,85%)`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (state === 'title') return;

  if (state === 'bonus') { drawBonus(); return; }
  if (state === 'ending') { drawEnding(); return; }

  // ── INTRO: draw ship flying in, no enemies ───────────────────
  if (state === 'intro') {
    // Engine trail
    for (let i = 0; i < 6; i++) {
      const ty = player.y + 20 + i * 12;
      const ta = (0.5 - i * 0.08) * (1 - intro.timer / 80);
      ctx.save();
      ctx.globalAlpha = Math.max(0, ta);
      ctx.fillStyle = `hsl(${160 + i*10},100%,70%)`;
      ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.ellipse(player.x, ty, 4 - i*0.5, 6, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    drawPlayer(player.x, player.y, 1);

    // "READY" text when settling
    if (intro.phase === 'settle') {
      const pulse = 0.6 + 0.4 * Math.sin(intro.timer * 0.15);
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.font = `bold ${Math.round(W*0.07)}px Orbitron`;
      ctx.fillStyle = '#00ffcc'; ctx.shadowColor='#00ffcc'; ctx.shadowBlur=20;
      ctx.textAlign = 'center';
      ctx.fillText('READY', W/2, H/2);
      ctx.restore();
    }
    return;
  }

  // ── DOCKING EVENT ─────────────────────────────────────────────
  if (state === 'docking') {
    const dk = dockEvent;

    // Instructions (before lock)
    if (dk.result === null) {
      ctx.save();
      const blink = Math.floor(dk.flashTimer / 18) % 2 === 0;
      ctx.globalAlpha = blink ? 1 : 0.4;
      ctx.font = `bold ${Math.round(W*0.045)}px Orbitron`;
      ctx.fillStyle = '#ffdd00'; ctx.shadowColor='#ffdd00'; ctx.shadowBlur=15;
      ctx.textAlign = 'center';
      ctx.fillText('DOCKING EVENT!', W/2, 80);
      ctx.globalAlpha = 1;
      ctx.font = `${Math.round(W*0.032)}px Orbitron`;
      ctx.fillStyle = '#00ffcc88';
      ctx.fillText('DOCK!!ボタンで合体！', W/2, 110);
      ctx.restore();

      // Dock zone ring on player
      const dzPulse = 0.4 + 0.3 * Math.sin(dk.flashTimer * 0.15);
      ctx.save();
      ctx.globalAlpha = dzPulse;
      ctx.strokeStyle = '#ffdd00'; ctx.lineWidth = 2;
      ctx.shadowColor = '#ffdd00'; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.ellipse(player.x, player.y, 34, 34, 0, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    // Second ship approaching
    if (dk.result === null || dk.result === 'fail') {
      drawPlayer(dk.ship2x, dk.ship2y, 0.85);
    }

    // Player ship
    drawPlayer(player.x, player.y, 1);

    // Result message
    if (dk.result !== null) {
      const fade = Math.min(1, dk.resultTimer / 20);
      ctx.save();
      ctx.globalAlpha = fade;
      ctx.textAlign = 'center';
      if (dk.result === 'success') {
        // Draw merged ship (two ships overlapping)
        drawPlayer(player.x - 12, player.y, 0.9);
        drawPlayer(player.x + 12, player.y, 0.9);
        ctx.font = `bold ${Math.round(W*0.08)}px Orbitron`;
        ctx.fillStyle = '#ffdd00'; ctx.shadowColor='#ffdd00'; ctx.shadowBlur=30;
        ctx.fillText('合体!!', W/2, H/2 - 20);
        ctx.font = `${Math.round(W*0.04)}px Orbitron`;
        ctx.fillStyle = '#00ffcc';
        ctx.fillText('DOUBLE SHOT GET!', W/2, H/2 + 30);
      } else {
        ctx.font = `bold ${Math.round(W*0.07)}px Orbitron`;
        ctx.fillStyle = '#ff4466'; ctx.shadowColor='#ff4466'; ctx.shadowBlur=20;
        ctx.fillText('MISSED...', W/2, H/2);
        drawPlayer(player.x, player.y, 1);
      }
      ctx.restore();
    }
    return;
  }

  for (const p of particles) {
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  for (const e of enemies) drawEnemy(e);
  if (boss) drawBoss(boss);
  for (const b of bullets) drawBullet(b);
  for (const b of enemyBullets) drawEnemyBullet(b);

  const alpha = player.invincible>0 ? (Math.floor(frameCount/4)%2===0?0.25:0.9) : 1;
  if (merged) {
    drawPlayer(player.x - 14, player.y, alpha);
    drawPlayer(player.x + 14, player.y, alpha);
    // Glow link between the two ships
    ctx.save();
    ctx.globalAlpha = 0.4 + 0.2 * Math.sin(frameCount * 0.1);
    ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 2; ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.moveTo(player.x - 8, player.y + 10); ctx.lineTo(player.x + 8, player.y + 10); ctx.stroke();
    ctx.restore();
  } else {
    drawPlayer(player.x, player.y, alpha);
  }

  if (levelUpMsg > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, levelUpMsg/30);
    ctx.font = `bold ${Math.round(W*0.07)}px Orbitron`;
    ctx.fillStyle = '#ffdd00'; ctx.shadowColor='#ffdd00'; ctx.shadowBlur=30;
    ctx.textAlign = 'center';
    ctx.fillText(`LEVEL ${level}!`, W/2, H/2);
    ctx.restore();
    levelUpMsg--;
  }
}

function showOverlay(title, sub, tap) {
  overlay.innerHTML = `
    <h1>${title}</h1>
    <div class="sub" style="font-size:18px;animation:none;color:#00ffcc;letter-spacing:2px">${sub}</div>
    <div class="tap-start" id="startBtn">${tap}</div>
  `;
  overlay.style.display = 'flex';
  document.getElementById('startBtn').addEventListener('touchstart', e => {
    e.preventDefault();
    unlockAudio(); // iOS: must unlock AudioContext synchronously in touch handler
    startGame();
  }, { passive: false });
  document.getElementById('startBtn').addEventListener('click', e => {
    unlockAudio();
    startGame();
  });
}

function startNewLoop() {
  loopCount++;
  initGame();
  // Difficulty boost: enemies are faster and shoot more
  overlay.style.display = 'none';
  startMusic('title');
  startIntro();
}

function startGame() {
  loopCount = 0;
  initGame();
  overlay.style.display = 'none';
  startMusic('title');
  startIntro();
}

// Keyboard support (for testing on desktop)
const kbState = {};
document.addEventListener('keydown', e => {
  kbState[e.key] = true;
  if (e.key===' ') { e.preventDefault(); autoShoot=true; if(state==='title'||state==='gameover'){unlockAudio(); startGame();} else if(state==='ending'){unlockAudio(); startNewLoop();} }
});
document.addEventListener('keyup', e => {
  kbState[e.key] = false;
  if (e.key===' ') autoShoot=false;
});
function applyKeyboard() {
  if (!Object.keys(kbState).length) return;
  let kx = 0, ky = 0;
  if (kbState['ArrowLeft']||kbState['a'])  kx -= 1;
  if (kbState['ArrowRight']||kbState['d']) kx += 1;
  if (kbState['ArrowUp']||kbState['w'])    ky -= 1;
  if (kbState['ArrowDown']||kbState['s'])  ky += 1;
  if (kx||ky) {
    player.x = Math.max(25, Math.min(W-25, player.x + kx * player.speed));
    player.y = Math.max(80, Math.min(H-180, player.y + ky * player.speed));
  }
}

// Start button — attached dynamically via showOverlay()

resize();
// Start title music immediately on load (triggered by first user gesture via AudioContext resume)
// We store it to call on first tap


// Attach to first interaction on overlay



function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
