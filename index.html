<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KUROGA v4</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;font-family:'Orbitron',monospace;}
#gameWrap{position:fixed;inset:0;display:flex;flex-direction:column;background:#000;}
#hud{position:absolute;top:env(safe-area-inset-top,0px);left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:10px 18px 6px;z-index:10;pointer-events:none;}
.hud-item{font-size:11px;letter-spacing:2px;color:#00ffcc;text-shadow:0 0 8px #00ffcc;}
.hud-item span{font-size:15px;font-weight:700;}
#weaponHud{position:absolute;top:env(safe-area-inset-top,0px);left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;display:flex;gap:8px;align-items:center;padding-top:10px;}
.weapon-icon{font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:10px;border:1px solid #00ffcc44;color:#00ffcc66;}
.weapon-icon.active{border-color:#ffdd00;color:#ffdd00;text-shadow:0 0 8px #ffdd00;box-shadow:0 0 10px #ffdd0044;}
#canvas{position:absolute;inset:0;width:100%;height:100%;}
#fingerDot{position:absolute;width:60px;height:60px;border-radius:50%;border:2px solid #00ffcc66;background:radial-gradient(circle,#00ffcc22,transparent);pointer-events:none;z-index:6;display:none;transform:translate(-50%,-50%);}
/* ── DOCK BUTTON: bottom center ── */
#dockBtn{display:none;position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom,0px)+36px);transform:translateX(-50%);z-index:20;width:200px;height:68px;border-radius:34px;background:radial-gradient(circle at 40% 35%,#ffdd0099,#ff880044);border:2.5px solid #ffdd00cc;box-shadow:0 0 30px #ffdd0077;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:22px;font-weight:900;letter-spacing:4px;color:#ffdd00;text-shadow:0 0 14px #ffdd00;touch-action:none;pointer-events:all;animation:dockPulse 0.8s ease-in-out infinite;}
@keyframes dockPulse{0%,100%{box-shadow:0 0 30px #ffdd0077;}50%{box-shadow:0 0 55px #ffdd00cc;}}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:20;background:#00000088;}
#overlay h1{font-size:clamp(28px,8vw,44px);font-weight:900;letter-spacing:4px;color:#00ffcc;text-shadow:0 0 20px #00ffcc,0 0 50px #00ffcc66;text-align:center;animation:pulse 2s ease-in-out infinite;}
.tap-start{margin-top:6px;padding:14px 36px;border:1.5px solid #00ffcc88;border-radius:50px;color:#00ffcc;font-size:14px;letter-spacing:4px;background:#00ffcc11;pointer-events:all;animation:pulse 1.5s ease-in-out infinite;cursor:pointer;}
#diffMenu{display:flex;flex-direction:column;gap:10px;align-items:center;width:88%;max-width:300px;}
.diff-btn{width:100%;padding:12px 18px;border-radius:12px;border:2px solid;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:3px;cursor:pointer;background:transparent;transition:all 0.15s;display:flex;justify-content:space-between;align-items:center;touch-action:manipulation;}
.diff-btn.easy{border-color:#00ff88;color:#00ff88;}
.diff-btn.easy.selected,.diff-btn.easy:active{background:#00ff8822;box-shadow:0 0 20px #00ff8855;}
.diff-btn.normal{border-color:#00ffcc;color:#00ffcc;}
.diff-btn.normal.selected,.diff-btn.normal:active{background:#00ffcc22;box-shadow:0 0 20px #00ffcc55;}
.diff-btn.hard{border-color:#ff8800;color:#ff8800;}
.diff-btn.hard.selected,.diff-btn.hard:active{background:#ff880022;box-shadow:0 0 20px #ff880055;}
.diff-btn.extreme{border-color:#ff4466;color:#ff4466;}
.diff-btn.extreme.selected,.diff-btn.extreme:active{background:#ff446622;box-shadow:0 0 20px #ff446655;}
.diff-sub{font-size:9px;letter-spacing:1px;opacity:0.7;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div class="hud-item">SCORE<br><span id="score">0</span></div>
    <div class="hud-item" style="text-align:center">LEVEL<br><span id="level">1</span></div>
    <div class="hud-item" style="text-align:right">LIFE<br><span id="lifeText">❤❤❤</span></div>
  </div>
  <div id="weaponHud">
    <div class="weapon-icon active" id="wNormal">NORMAL</div>
    <div class="weapon-icon" id="wWide">WIDE</div>
    <div class="weapon-icon" id="wLaser">LASER</div>
  </div>
  <div id="fingerDot"></div>
  <div id="dockBtn">DOCK!!</div>
  <div id="overlay">
    <h1>KUROGA</h1>
    <div style="font-size:10px;letter-spacing:2px;color:#00ffcc44;text-align:center">ver 3.0</div>
    <div style="font-size:11px;color:#00ffcc88;text-align:center;line-height:2;letter-spacing:1px">
      画面をなぞって移動・自動連射<br>パワーアップを取れ！
    </div>
    <div style="font-size:11px;color:#ffdd00;letter-spacing:2px">DIFFICULTY</div>
    <div id="diffMenu">
      <button class="diff-btn easy" data-diff="easy">EASY <span class="diff-sub">ゆっくり遊ぶ</span></button>
      <button class="diff-btn normal selected" data-diff="normal">NORMAL <span class="diff-sub">標準的な難易度</span></button>
      <button class="diff-btn hard" data-diff="hard">HARD <span class="diff-sub">手強い敵たち</span></button>
      <button class="diff-btn extreme" data-diff="extreme">EXTREME <span class="diff-sub">廃人向け</span></button>
    </div>
    <div class="tap-start" id="startBtn">TAP TO START</div>
  </div>
</div>
<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay'),scoreEl=document.getElementById('score'),levelEl=document.getElementById('level'),lifeEl=document.getElementById('lifeText'),fingerDot=document.getElementById('fingerDot'),dockBtn=document.getElementById('dockBtn');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;if(stars.length){stars.length=0;for(let i=0;i<140;i++)stars.push(makeStar());}}
window.addEventListener('resize',resize);
function makeStar(){return{x:Math.random()*(W||400),y:Math.random()*(H||800),r:Math.random()*1.5+0.3,speed:Math.random()*0.8+0.2,brightness:Math.random()};}
const stars=[];for(let i=0;i<140;i++)stars.push(makeStar());

const DIFF={
easy:   {enemySpeed:0.8,shootRate:0.0012,bossHpMul:0.6,bulletSpeed:2.5,lives:5,label:‘EASY’},
normal: {enemySpeed:1.0,shootRate:0.0022,bossHpMul:1.0,bulletSpeed:3.5,lives:3,label:‘NORMAL’},
hard:   {enemySpeed:1.4,shootRate:0.0035,bossHpMul:1.4,bulletSpeed:4.5,lives:3,label:‘HARD’},
extreme:{enemySpeed:1.9,shootRate:0.005, bossHpMul:2.0,bulletSpeed:5.5,lives:2,label:‘EXTREME’},
};
let difficulty=‘normal’,diffCfg=DIFF.normal;
// ループごとに難易度1.5倍乗数を適用
function applyLoopScale(base,lc){return Object.assign({},base,{
enemySpeed: base.enemySpeed * Math.pow(1.5,lc),
shootRate:  Math.min(base.shootRate  * Math.pow(1.5,lc), 0.04),
bossHpMul:  base.bossHpMul * Math.pow(1.5,lc),
bulletSpeed:Math.min(base.bulletSpeed* Math.pow(1.5,lc), 12),
label: base.label + (lc>0?’ ×’+Math.round(Math.pow(1.5,lc)*10)/10:’’),
});}
function rebuildDiffCfg(){diffCfg=applyLoopScale(DIFF[difficulty],loopCount);}
document.querySelectorAll(’.diff-btn’).forEach(btn=>{
btn.addEventListener(‘click’,()=>{document.querySelectorAll(’.diff-btn’).forEach(b=>b.classList.remove(‘selected’));btn.classList.add(‘selected’);difficulty=btn.dataset.diff;rebuildDiffCfg();});
btn.addEventListener(‘touchstart’,e=>{e.preventDefault();btn.click();},{passive:false});
});

// ── Input ──────────────────────────────────────────────────
const input={targetX:null,targetY:null};
let shootCooldown=0,dockBtnPressed=false;
const activeTouches={};
function handleTouchStart(e){
e.preventDefault();
if(state===‘title’||state===‘gameover’){unlockAudio();startGame();return;}
if(state===‘ending’&&ending.phase!==‘warp’){unlockAudio();startNewLoop();return;}
for(const t of e.changedTouches){activeTouches[t.identifier]={x:t.clientX,y:t.clientY};input.targetX=t.clientX;input.targetY=t.clientY;fingerDot.style.left=t.clientX+‘px’;fingerDot.style.top=t.clientY+‘px’;fingerDot.style.display=‘block’;}
}
function handleTouchMove(e){
e.preventDefault();
for(const t of e.changedTouches){if(!activeTouches[t.identifier])continue;activeTouches[t.identifier]={x:t.clientX,y:t.clientY};input.targetX=t.clientX;input.targetY=t.clientY;fingerDot.style.left=t.clientX+‘px’;fingerDot.style.top=t.clientY+‘px’;}
}
function handleTouchEnd(e){
e.preventDefault();
for(const t of e.changedTouches){delete activeTouches[t.identifier];if(!Object.keys(activeTouches).length){input.targetX=null;input.targetY=null;fingerDot.style.display=‘none’;}else{const last=Object.values(activeTouches).pop();input.targetX=last.x;input.targetY=last.y;}}
}
document.addEventListener(‘touchstart’,handleTouchStart,{passive:false});
document.addEventListener(‘touchmove’,handleTouchMove,{passive:false});
document.addEventListener(‘touchend’,handleTouchEnd,{passive:false});
document.addEventListener(‘touchcancel’,handleTouchEnd,{passive:false});
dockBtn.addEventListener(‘touchstart’,e=>{e.preventDefault();e.stopPropagation();if(state===‘docking’){dockBtnPressed=true;dockBtn.style.opacity=‘0.5’;}},{passive:false});
dockBtn.addEventListener(‘touchend’,e=>{e.preventDefault();e.stopPropagation();setTimeout(()=>{dockBtn.style.opacity=‘1’;},80);},{passive:false});
dockBtn.addEventListener(‘click’,()=>{if(state===‘docking’)dockBtnPressed=true;});

// ══════════════════════════════════════════════════════════
// FM SOUND ENGINE
// ══════════════════════════════════════════════════════════
let audioCtx=null,musicNodes=[],musicPlaying=false;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function unlockAudio(){const ac=getAudio();if(ac.state===‘suspended’)ac.resume();try{const b=ac.createBuffer(1,1,ac.sampleRate),s=ac.createBufferSource();s.buffer=b;s.connect(ac.destination);s.start(0);}catch(e){}}
function makeMaster(ac){const eq=ac.createBiquadFilter();eq.type=‘peaking’;eq.frequency.value=3000;eq.gain.value=3;eq.Q.value=1;const comp=ac.createDynamicsCompressor();comp.threshold.value=-14;comp.ratio.value=6;comp.attack.value=0.003;comp.release.value=0.15;const lim=ac.createDynamicsCompressor();lim.threshold.value=-1;lim.ratio.value=20;lim.attack.value=0.001;lim.release.value=0.05;const out=ac.createGain();out.gain.value=0.72;eq.connect(comp);comp.connect(lim);lim.connect(out);out.connect(ac.destination);return eq;}
function nf(semi){return 130.81*Math.pow(2,semi/12);}
function fmNote(ac,dest,cf,mr,mi,vol,dur,ct=‘sine’){const now=ac.currentTime,mf=cf*mr;const mod=ac.createOscillator(),mG=ac.createGain();mod.type=‘sine’;mod.frequency.value=mf;mG.gain.setValueAtTime(mf*mi,now);mG.gain.exponentialRampToValueAtTime(mf*mi*0.3,now+dur*0.3);mG.gain.exponentialRampToValueAtTime(0.001,now+dur);mod.connect(mG);mG.connect(mod.frequency);const car=ac.createOscillator(),env=ac.createGain();car.type=ct;car.frequency.value=cf;mG.connect(car.frequency);env.gain.setValueAtTime(0.001,now);env.gain.linearRampToValueAtTime(vol,now+0.008);env.gain.setValueAtTime(vol*0.8,now+0.03);env.gain.exponentialRampToValueAtTime(vol*0.6,now+dur*0.6);env.gain.exponentialRampToValueAtTime(0.001,now+dur);car.connect(env);env.connect(dest);mod.start(now);mod.stop(now+dur+0.05);car.start(now);car.stop(now+dur+0.05);}
function makeSeq(ac,dest,pat,bpm,fn){const beat=60/bpm;let idx=0,stopped=false;const tids=[];function tick(){if(stopped)return;const step=pat[idx%pat.length];if(step!==null)fn(ac,dest,step,beat);const dur=step?(step.d||0.5)*beat:0.5*beat;idx++;const id=setTimeout(tick,dur*1000);tids.push(id);}tick();return{stop(){stopped=true;tids.forEach(clearTimeout);}};}
function fmLead(ac,dest,step,beat){const dur=(step.d||.5)*beat*.9;fmNote(ac,dest,nf(step.n),1,2.8,0.22,dur,‘sine’);const sq=ac.createOscillator(),sg=ac.createGain();sq.type=‘square’;sq.frequency.value=nf(step.n);sq.detune.value=6;sg.gain.setValueAtTime(0.06,ac.currentTime);sg.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur*0.7);sq.connect(sg);sg.connect(dest);sq.start(ac.currentTime);sq.stop(ac.currentTime+dur+0.05);}
function fmBass(ac,dest,step,beat){const dur=(step.d||.5)*beat*.85;fmNote(ac,dest,nf(step.n),0.5,3.5,0.32,dur,‘sine’);const sub=ac.createOscillator(),sg=ac.createGain();sub.type=‘sine’;sub.frequency.value=nf(step.n-12);sg.gain.setValueAtTime(0.18,ac.currentTime);sg.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur*0.6);sub.connect(sg);sg.connect(dest);sub.start(ac.currentTime);sub.stop(ac.currentTime+dur+0.05);}
function fmChord(ac,dest,step,beat){const dur=(step.d||.25)*beat*.6;const chord=step.minor?[step.n,step.n+3,step.n+7]:[step.n,step.n+4,step.n+7];chord.forEach((n,i)=>fmNote(ac,dest,nf(n),2,1.5,0.09-i*0.01,dur,‘sine’));}
function psgCounter(ac,dest,step,beat){if(!step)return;const dur=(step.d||.5)*beat*.75;const o=ac.createOscillator(),g=ac.createGain();o.type=‘square’;o.frequency.value=nf(step.n);g.gain.setValueAtTime(0.001,ac.currentTime);g.gain.linearRampToValueAtTime(0.07,ac.currentTime+0.005);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);o.connect(g);g.connect(dest);o.start(ac.currentTime);o.stop(ac.currentTime+dur+0.05);}
function drumKick(ac,dest,vol=1){const now=ac.currentTime;const o=ac.createOscillator(),g=ac.createGain();o.type=‘sine’;o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(36,now+0.15);g.gain.setValueAtTime(0.9*vol,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.22);o.connect(g);g.connect(dest);o.start(now);o.stop(now+0.25);const c=ac.createOscillator(),cg=ac.createGain();c.type=‘sine’;c.frequency.value=1200;cg.gain.setValueAtTime(0.4*vol,now);cg.gain.exponentialRampToValueAtTime(0.001,now+0.015);c.connect(cg);cg.connect(dest);c.start(now);c.stop(now+0.02);}
function drumSnare(ac,dest,vol=1){const now=ac.currentTime;const o=ac.createOscillator(),og=ac.createGain();o.type=‘triangle’;o.frequency.value=220;og.gain.setValueAtTime(0.25*vol,now);og.gain.exponentialRampToValueAtTime(0.001,now+0.12);o.connect(og);og.connect(dest);o.start(now);o.stop(now+0.14);const len=Math.floor(ac.sampleRate*0.18),buf=ac.createBuffer(1,len,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,0.5);const src=ac.createBufferSource(),ng=ac.createGain(),hp=ac.createBiquadFilter();hp.type=‘highpass’;hp.frequency.value=2000;src.buffer=buf;ng.gain.setValueAtTime(0.35*vol,now);ng.gain.exponentialRampToValueAtTime(0.001,now+0.16);src.connect(hp);hp.connect(ng);ng.connect(dest);src.start(now);src.stop(now+0.2);}
function drumHat(ac,dest,open=false,vol=1){const now=ac.currentTime,len=Math.floor(ac.sampleRate*(open?0.12:0.04)),buf=ac.createBuffer(1,len,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1);const src=ac.createBufferSource(),g=ac.createGain(),hp=ac.createBiquadFilter(),bp=ac.createBiquadFilter();hp.type=‘highpass’;hp.frequency.value=8000;bp.type=‘bandpass’;bp.frequency.value=10000;bp.Q.value=0.5;src.buffer=buf;const df=open?0.1:0.035;g.gain.setValueAtTime(0.15*vol,now);g.gain.exponentialRampToValueAtTime(0.001,now+df);src.connect(hp);hp.connect(bp);bp.connect(g);g.connect(dest);src.start(now);src.stop(now+df+0.01);}
function makeDrumSeq(ac,dest,pat,bpm){const s16=60/bpm/4;let i=0,stopped=false;const tids=[];function tick(){if(stopped)return;const p=pat[i%pat.length];if(p.k)drumKick(ac,dest,p.k);if(p.s)drumSnare(ac,dest,p.s);if(p.h)drumHat(ac,dest,false,p.h);if(p.ho)drumHat(ac,dest,true,p.ho);i++;const id=setTimeout(tick,s16*1000);tids.push(id);}tick();return{stop(){stopped=true;tids.forEach(clearTimeout);}};}

// Music sequences
const SBPM=148;
const SB=[{n:-10,d:.5},{n:-10,d:.25},{n:-10,d:.25},{n:-3,d:.5},{n:-3,d:.5},{n:2,d:.5},{n:2,d:.25},{n:2,d:.25},{n:-5,d:.5},{n:-5,d:.25},{n:-5,d:.25},{n:-10,d:.5},{n:-10,d:.25},{n:-10,d:.25},{n:-3,d:.5},{n:-3,d:.5},{n:0,d:.5},{n:0,d:.25},{n:4,d:.25},{n:2,d:1}];
const SL=[{n:14,d:.5},{n:14,d:.25},null,{n:16,d:.25},{n:14,d:.25},{n:11,d:.25},{n:9,d:.75},null,{n:11,d:.25},{n:9,d:.25},{n:7,d:.5},{n:6,d:.5},{n:7,d:.25},{n:9,d:.25},{n:11,d:.5},{n:9,d:.5},{n:7,d:.5},{n:6,d:.25},{n:4,d:.25},{n:2,d:1}];
const SC=[null,{n:26,d:.25},null,{n:23,d:.25},null,{n:21,d:.25},{n:21,d:.25},null,null,{n:23,d:.25},null,{n:26,d:.25},{n:28,d:.5},null,null,null,null,{n:26,d:.25},null,{n:23,d:.25},null,{n:21,d:.25},{n:19,d:.25},null,{n:18,d:.25},{n:19,d:.25},{n:21,d:.25},{n:23,d:.25},{n:26,d:1}];
const SCHD=[null,null,{n:2,d:.25,minor:false},null,null,null,{n:-3,d:.25,minor:true},null,null,null,{n:7,d:.25,minor:false},null,null,null,{n:5,d:.25,minor:false},null,null,null,{n:2,d:.25,minor:false},null,null,null,{n:-3,d:.25,minor:true},null,null,null,{n:0,d:.25,minor:false},null,null,{n:2,d:.5,minor:false},null,null];
const SDR=[{k:1},{h:.7},{h:.5},{h:.7},{s:.9,h:.6},{h:.6},{h:.5},{h:.8},{k:.9},{h:.7},{k:.5,h:.5},{h:.7},{s:.9,h:.6},{h:.6},{h:.6},{ho:.4},{k:1},{h:.7},{h:.5},{h:.7},{s:.9,h:.6},{h:.6},{h:.5},{h:.8},{k:.9},{h:.7},{h:.5,k:.5},{h:.7},{s:.9,h:.6},{h:.7},{k:.4,h:.5},{h:.8}];
// Mid-boss music (faster, tense but less extreme than final boss)
const MBPM=162;
const MB=[{n:-10,d:.25},{n:-10,d:.25},{n:-4,d:.25},{n:-10,d:.25},{n:-7,d:.25},{n:-7,d:.25},{n:-1,d:.25},{n:-7,d:.25},{n:-5,d:.25},{n:-5,d:.25},{n:-11,d:.25},{n:-5,d:.25},{n:-3,d:.5},{n:-9,d:.25},{n:-3,d:.25}];
const ML=[{n:14,d:.25},null,{n:18,d:.25},{n:14,d:.25},null,{n:12,d:.25},{n:11,d:.25},null,{n:9,d:.25},null,{n:15,d:.25},{n:9,d:.25},null,{n:8,d:.5},{n:7,d:.5}];
const MDR=[{k:1},{h:.8},{k:.6,h:.6},{h:.8},{s:1,h:.7},{h:.8},{k:.7,h:.6},{h:.9},{k:1},{h:.8},{h:.6},{h:.8},{s:1,h:.7},{h:.7},{k:.6,h:.6},{ho:.4}];
// Boss music
const B2BPM=184;

for(let i=0;i<8;i++){const a=t+Math.PI/4*i;const r=i%2===0?36:22;ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);}
ctx.closePath();ctx.fill();ctx.stroke();
// Inner rotating square
ctx.strokeStyle=`hsl(${hue},100%,75%)`;ctx.lineWidth=1.5;ctx.save();ctx.translate(x,y);ctx.rotate(-t*1.5);ctx.strokeRect(-14,-14,28,28);ctx.restore();

function drawBoss(b){
ctx.save();const x=b.x,y=b.y;
if(b.isLast){
const hp_ratio=b.hp/b.maxHp,phase2=b.phase2||false;
const coreHue=phase2?0:hp_ratio*30;
const spikeCount=phase2?24:16;
const outerR=b.outerR*(phase2?1.25:1);
ctx.shadowColor=`hsl(${coreHue},100%,55%)`;ctx.shadowBlur=phase2?50:35;
const pulse=1+0.06*Math.sin(frameCount*0.12);
ctx.fillStyle=`hsl(${coreHue},80%,12%)`;ctx.strokeStyle=`hsl(${coreHue},100%,55%)`;ctx.lineWidth=phase2?4:3;
ctx.beginPath();ctx.arc(x,y,b.innerR*pulse,0,Math.PI*2);ctx.fill();ctx.stroke();
if(phase2){ctx.strokeStyle=`hsl(${coreHue+20},100%,40%)`;ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.beginPath();ctx.arc(x,y,b.innerR*pulse*1.4,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
for(let i=0;i<spikeCount;i++){
const a=b.spinAngle+(Math.PI*2*i/spikeCount),a2=b.spinAngle+(Math.PI*2*(i+0.5)/spikeCount);
const outerPulse=outerR*(1+0.08*Math.sin(frameCount*0.08+i));
const ix=x+Math.cos(a)*b.innerR*1.05,iy=y+Math.sin(a)*b.innerR*1.05;
const ox=x+Math.cos(a)*outerPulse,oy=y+Math.sin(a)*outerPulse;
const mx=x+Math.cos(a2)*b.innerR*0.8,my=y+Math.sin(a2)*b.innerR*0.8;
ctx.fillStyle=phase2?`hsl(${i*15},100%,55%)`:`hsl(${coreHue+i*5},100%,50%)`;
ctx.strokeStyle=phase2?`hsl(${i*15},100%,75%)`:`hsl(${coreHue+i*5},100%,70%)`;
ctx.lineWidth=1.5;ctx.shadowBlur=phase2?30:20;
ctx.beginPath();ctx.moveTo(ix,iy);ctx.lineTo(ox,oy);ctx.lineTo(mx,my);ctx.closePath();ctx.fill();ctx.stroke();
}
ctx.shadowBlur=25;ctx.fillStyle=phase2?’#ff0000’:`hsl(${coreHue},100%,65%)`;
ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fill();
ctx.fillStyle=’#fff’;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
const barW=Math.min(W*0.72,300);
ctx.shadowBlur=0;ctx.fillStyle=’#220000’;ctx.fillRect(x-barW/2,y+outerR+16,barW,12);
ctx.fillStyle=phase2?`hsl(0,100%,50%)`:`hsl(${hp_ratio*120},100%,50%)`;ctx.fillRect(x-barW/2,y+outerR+16,barW*hp_ratio,12);
ctx.strokeStyle=`hsl(${coreHue},100%,60%)`;ctx.lineWidth=1.5;ctx.strokeRect(x-barW/2,y+outerR+16,barW,12);
ctx.fillStyle=phase2?’#ff4444’:`hsl(${coreHue},100%,70%)`;ctx.font=`bold 12px Orbitron`;ctx.textAlign=‘center’;
ctx.fillText(phase2?‘⚠ FINAL FORM ⚠’:‘⚠ FINAL BOSS ⚠’,x,y+outerR+44);
} else {
ctx.strokeStyle=’#ff8800’;ctx.fillStyle=’#180800’;ctx.shadowColor=’#ff8800’;ctx.shadowBlur=28;ctx.lineWidth=3;
ctx.beginPath();ctx.moveTo(x,y+36);ctx.lineTo(x-60,y+12);ctx.lineTo(x-48,y-12);ctx.lineTo(x-24,y-6);ctx.lineTo(x,y-36);ctx.lineTo(x+24,y-6);ctx.lineTo(x+48,y-12);ctx.lineTo(x+60,y+12);ctx.closePath();ctx.fill();ctx.stroke();
ctx.fillStyle=’#ff880033’;ctx.beginPath();ctx.ellipse(x,y-10,14,18,0,0,Math.PI*2);ctx.fill();
const barW=Math.min(W*0.6,240);ctx.shadowBlur=0;ctx.fillStyle=’#330000’;ctx.fillRect(x-barW/2,y+45,barW,10);
ctx.fillStyle=`hsl(${(b.hp/b.maxHp)*120},100%,50%)`;ctx.fillRect(x-barW/2,y+45,barW*(b.hp/b.maxHp),10);
ctx.strokeStyle=’#ff8800’;ctx.lineWidth=1;ctx.strokeRect(x-barW/2,y+45,barW,10);
ctx.fillStyle=’#ff8800’;ctx.font=`bold 11px Orbitron`;ctx.textAlign=‘center’;ctx.fillText(‘⚠ BOSS ⚠’,x,y+68);
}
ctx.restore();
}

// ── Mid-boss spawn ────────────────────────────────────────
function spawnMidBoss(){
midBossSpawned=true;midBossActive=true;
const hp=Math.floor((18+level*8)*diffCfg.bossHpMul);
midBoss={x:W/2,y:-60,hp,maxHp:hp,vx:1.5+level*0.2,vy:1.2,spinAngle:0,shootTimer:0,phase:0};
enemies=[];sfxMidBossAlert();startMusic(‘midboss’);
}
function updateMidBoss(){
if(!midBoss)return;
midBoss.spinAngle+=0.04;
// Slide down then bounce horizontally
if(midBoss.y<110){midBoss.y+=midBoss.vy;midBoss.vy*=0.97;}
else{midBoss.vy=0;midBoss.y=110;}
midBoss.x+=midBoss.vx;if(midBoss.x<60||midBoss.x>W-60)midBoss.vx*=-1;
midBoss.shootTimer++;
// Fan shot
if(midBoss.shootTimer%80===0){
for(let i=-2;i<=2;i++){const a=Math.PI/2+i*0.22;enemyBullets.push({x:midBoss.x,y:midBoss.y,vx:Math.cos(a)*diffCfg.bulletSpeed*0.7,vy:Math.sin(a)*diffCfg.bulletSpeed*0.7});}
}
// Aimed shot
if(midBoss.shootTimer%200===0){
const dx=player.x-midBoss.x,dy=player.y-midBoss.y,d=Math.sqrt(dx*dx+dy*dy);
enemyBullets.push({x:midBoss.x,y:midBoss.y,vx:dx/d*diffCfg.bulletSpeed,vy:dy/d*diffCfg.bulletSpeed});
}
// Bullet hits
bullets=bullets.filter(b=>{
const hit=(b.type===‘laser’)?Math.abs(b.x-midBoss.x)<38&&b.y<midBoss.y+40&&b.y>midBoss.y-40:dist(b.x,b.y,midBoss.x,midBoss.y)<38;
if(hit){midBoss.hp-=(b.type===‘laser’?0.3:1);spawnParticles(b.x,b.y,’#44aaff’,4);return b.type===‘laser’;}
return true;
});
if(player.invincible<=0&&dist(midBoss.x,midBoss.y,player.x,player.y)<40){lives–;updateUI();spawnParticles(player.x,player.y,’#00ffcc’,8);player.invincible=80;if(lives<=0)endGame();}
if(midBoss.hp<=0){
score+=300*level;updateUI();sfxExplosion(true);spawnParticles(midBoss.x,midBoss.y,’#44aaff’,40);
// Drop exactly 1 random powerup
const puTypes=[‘wide’,‘laser’,‘life’];
dropPowerup(midBoss.x,midBoss.y,puTypes[Math.floor(Math.random()*puTypes.length)]);
midBoss=null;midBossActive=false;
startMusic(‘stage’);spawnTimer=0;
// Mid-boss alert banner
levelUpMsg=120;
}
}

// ── Transform effect (boss phase change) ─────────────────
let transformParticles=[];
function startTransformEffect(bx,by){
transformEffect={active:true,timer:0,phase:‘shatter’,bx,by};
transformParticles=[];
// Shatter: 60 outward particles
for(let i=0;i<60;i++){
const a=Math.random()*Math.PI*2,sp=3+Math.random()*8;
const hue=Math.random()*360;
transformParticles.push({x:bx,y:by,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.008+Math.random()*0.006,r:3+Math.random()*5,col:`hsl(${hue},100%,65%)`});
}
// Large flash
for(let i=0;i<24;i++){
const a=Math.PI*2*i/24,sp=12+Math.random()*6;
transformParticles.push({x:bx,y:by,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.015,r:8+Math.random()*6,col:’#ffffff’});
}
}
function updateTransformEffect(){
if(!transformEffect.active)return;
transformEffect.timer++;
transformParticles=transformParticles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.93;p.vy*=0.93;p.life-=p.decay;return p.life>0;});
// Phase transitions
if(transformEffect.phase===‘shatter’&&transformEffect.timer>50){
transformEffect.phase=‘void’;transformEffect.timer=0;
} else if(transformEffect.phase===‘void’&&transformEffect.timer>60){
transformEffect.phase=‘reform’;transformEffect.timer=0;
} else if(transformEffect.phase===‘reform’&&transformEffect.timer>70){
transformEffect.active=false;
bossReviving=false;
boss.phase2=true;
// 最終形態: バランス調整版
const p2Hp=Math.floor(110*diffCfg.bossHpMul);
boss.hp=p2Hp;boss.maxHp=p2Hp;
boss.spinSpeed=0.038;boss.outerR=82;boss.spikes=24;boss.reviveFlash=90;
boss.vx=1.6;
bossActive=true;startMusic(‘finalboss’);
enemyBullets=[];
// Dramatic ring of bullets outward
for(let i=0;i<16;i++){const a=Math.PI*2*i/16;enemyBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4});}
}
}
function drawTransformEffect(){
const te=transformEffect;if(!te.active)return;
// Phase: shatter
if(te.phase===‘shatter’){
for(const p of transformParticles){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=12;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
// Screen flash
const fa=Math.max(0,1-te.timer/40);
ctx.save();ctx.globalAlpha=fa*0.6;ctx.fillStyle=’#ffffff’;ctx.fillRect(0,0,W,H);ctx.restore();
} else if(te.phase===‘void’){
// Gravity-pull distortion: concentric dark rings imploding
for(const p of transformParticles){ctx.save();ctx.globalAlpha=p.life*0.6;ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
const pr=te.timer/60;
for(let i=5;i>=0;i–){
const r=(i+1)*20*(1-pr*0.5);ctx.save();ctx.globalAlpha=0.5*(1-pr)*(i/5);
ctx.strokeStyle=`hsl(${i*40},100%,50%)`;ctx.lineWidth=3;ctx.shadowColor=`hsl(${i*40},100%,50%)`;ctx.shadowBlur=15;
ctx.beginPath();ctx.arc(te.bx,te.by,r,0,Math.PI*2);ctx.stroke();ctx.restore();
}
// Darkness vignette
const grad=ctx.createRadialGradient(te.bx,te.by,0,te.bx,te.by,Math.max(W,H)*0.8);
grad.addColorStop(0,’#00000000’);grad.addColorStop(pr*0.7,’#00000044’);grad.addColorStop(1,’#000000cc’);
ctx.save();ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);ctx.restore();
} else if(te.phase===‘reform’){
// Boss reassembles from particles flying inward
const pr=te.timer/70;
// Implosion ring
const r=180*(1-pr);
if(r>0){ctx.save();ctx.globalAlpha=1-pr;ctx.strokeStyle=’#ff4400’;ctx.lineWidth=4;ctx.shadowColor=’#ff4400’;ctx.shadowBlur=30;ctx.beginPath();ctx.arc(te.bx,te.by,r,0,Math.PI*2);ctx.stroke();ctx.restore();}
for(let i=0;i<20;i++){
const a=Math.PI*2*i/20+pr*2,rd=60+i*5;const px=te.bx+Math.cos(a)*rd*(1-pr),py=te.by+Math.sin(a)*rd*(1-pr);
ctx.save();ctx.globalAlpha=(1-pr)*0.9;const hue=i*18;ctx.fillStyle=`hsl(${hue},100%,60%)`;ctx.shadowColor=`hsl(${hue},100%,60%)`;ctx.shadowBlur=14;ctx.beginPath();ctx.arc(px,py,4+i*0.3,0,Math.PI*2);ctx.fill();ctx.restore();
}
// Building core
ctx.save();ctx.globalAlpha=pr;ctx.shadowColor=’#ff0000’;ctx.shadowBlur=40;ctx.fillStyle=’#ff000044’;ctx.beginPath();ctx.arc(te.bx,te.by,30*pr,0,Math.PI*2);ctx.fill();ctx.restore();
// WARNING flash
if(te.timer>40){const fa=((te.timer-40)/30)*(0.5+0.5*Math.sin(frameCount*0.4));ctx.save();ctx.globalAlpha=fa;ctx.font=`bold ${Math.round(W*0.08)}px Orbitron`;ctx.fillStyle=’#ff0000’;ctx.shadowColor=’#ff0000’;ctx.shadowBlur=30;ctx.textAlign=‘center’;ctx.fillText(‘FINAL FORM!’,W/2,H/2-10);ctx.restore();}
}
}

function pathAt(pts,t){const n=pts.length-1,seg=Math.min(Math.floor(t*n),n-1),lt=(t*n)-seg,p0=pts[Math.max(seg-1,0)],p1=pts[seg],p2=pts[Math.min(seg+1,n)],p3=pts[Math.min(seg+2,n)],t2=lt*lt,t3=lt*lt*lt;return{x:0.5*((2*p1.x)+(-p0.x+p2.x)*lt+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),y:0.5*((2*p1.y)+(-p0.y+p2.y)*lt+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)};}

[{path:PATH_D,delay:0,color:’#ff4466’},{path:PATH_D,delay:0.08,color:’#ff3355’},{path:PATH_D,delay:0.16,color:’#ff2244’},{path:PATH_D,delay:0.24,color:’#ff1133’},{path:PATH_E,delay:0,color:’#44aaff’},{path:PATH_E,delay:0.08,color:’#33aaff’},{path:PATH_E,delay:0.16,color:’#2299ff’},{path:PATH_E,delay:0.24,color:’#1188ff’}],

// ══════════════════════════════════════════════════════════
// UPDATE
// ══════════════════════════════════════════════════════════
function update(){
frameCount++;
if(state===‘bonus’){updateBonus();return;}
if(state===‘ending’){updateEnding();return;}
for(const s of stars){s.y+=s.speed;if(s.y>H){s.y=-2;s.x=Math.random()*W;}}

if(state===‘intro’){
intro.timer++;
if(intro.phase===‘fly’){intro.shipY+=(intro.targetY-intro.shipY)*0.04+2;player.x=W/2;player.y=intro.shipY;spawnParticles(player.x,player.y+20,’#00ffcc’,1);if(Math.abs(intro.shipY-intro.targetY)<4&&intro.timer>60){intro.phase=‘settle’;intro.timer=0;}}
else if(intro.phase===‘settle’){if(intro.timer>80){state=‘playing’;startMusic(‘stage’);}}
return;
}
if(state===‘docking’){
const dk=dockEvent;dk.flashTimer++;
if(dk.result!==null){dk.resultTimer++;if(dk.resultTimer>150){if(dk.result===‘success’)merged=true;level++;levelEl.textContent=level;bossActive=false;boss=null;levelTimer=0;spawnTimer=0;enemies=[];enemyBullets=[];midBossSpawned=false;dockBtn.style.display=‘none’;state=‘playing’;startMusic(‘stage’);levelUpMsg=120;}return;}
dk.ship2y+=dk.ship2vy;dk.ship2vy+=0.018;if(dk.ship2vy>1.2)dk.ship2vy=1.2;
if(input.targetX!==null){const tx=Math.max(25,Math.min(W-25,input.targetX));player.x+=(tx-player.x)*0.12;}
applyKeyboard();
if(dockBtnPressed&&!dk.locked){dockBtnPressed=false;dk.locked=true;const ddx=Math.abs(dk.ship2x-player.x),ddy=Math.abs(dk.ship2y-player.y);if(ddx<80&&ddy<120){dk.result=‘success’;sfxExplosion();for(let i=0;i<5;i++){spawnParticles(player.x,player.y-20,’#00ffcc’,6);spawnParticles(player.x,player.y-20,’#ffdd00’,4);}}else{dk.result=‘fail’;sfxHit();}}
if(!dk.locked&&dk.ship2y>player.y+180){dk.result=‘fail’;sfxHit();}
return;
}
if(state!==‘playing’)return;

// ── PLAYING ───────────────────────────────────────────────
if(input.targetX!==null){
const tx=Math.max(25,Math.min(W-25,input.targetX)),ty=Math.max(60,Math.min(H-120,input.targetY));
player.x+=(tx-player.x)*0.18;player.y+=(ty-player.y)*0.18;
}
applyKeyboard();

if(weaponTimer>0){weaponTimer–;if(weaponTimer===0){weapon=‘normal’;updateUI();}}
if(shootCooldown<=0)fireWeapon();
if(shootCooldown>0)shootCooldown–;
bullets=bullets.filter(b=>{b.y+=b.vy;if(b.vx)b.x+=b.vx;if(b.type===‘laser’)b.len=(b.len||0)+2;return b.y>-400;});

powerups=powerups.filter(p=>{
p.y+=p.vy;p.angle+=0.04;p.age++;
if(p.y>H+30)return false;
if(dist(p.x,p.y,player.x,player.y)<30){
if(p.type===‘life’){lives=Math.min(lives+1,9);updateUI();sfxPowerup();}else setWeapon(p.type);
spawnParticles(p.x,p.y,PU_COLORS[p.type],14);return false;
}
return true;
});

if(player.invincible>0)player.invincible–;
enemyBullets=enemyBullets.filter(b=>{
// 追尾弾: 少しずつプレイヤーの方向へ曲がる
if(b.homing&&player){
const dx=player.x-b.x,dy=player.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
if(d>0){b.vx+=(dx/d)*0.04;b.vy+=(dy/d)*0.04;}
// 速度上限
const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);if(spd>2.5){b.vx=b.vx/spd*2.5;b.vy=b.vy/spd*2.5;}
}
b.x+=b.vx;b.y+=b.vy;if(b.x<-10||b.x>W+10||b.y>H+10)return false;
if(player.invincible<=0&&dist(b.x,b.y,player.x,player.y)<22){lives–;updateUI();spawnParticles(player.x,player.y,’#00ffcc’,10);player.invincible=80;sfxHit();if(lives<=0)endGame();return false;}
return true;
});

// Transform effect update
if(transformEffect.active){updateTransformEffect();return;}

// Boss revive holding state (before transform kicks in)
if(bossReviving&&!transformEffect.active){
bossReviveTimer++;
if(bossReviveTimer>60){
// Kick off the visual transform
startTransformEffect(boss.x,boss.y);
bossReviving=false;
}
particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.94;p.vy*=0.94;p.life-=p.decay;return p.life>0;});
return;
}

// Spawn logic
levelTimer++;
if(!bossActive&&!midBossActive){
spawnTimer++;
if(spawnTimer>=Math.max(28,75-level*8)){spawnEnemy();spawnTimer=0;}
// Mid-boss threshold
if(!midBossSpawned&&levelTimer>=MID_BOSS_THRESHOLD){spawnMidBoss();}
// Main boss threshold
if(!midBossSpawned||midBoss===null){
if(levelTimer>1500+level*80){
if(level>=6&&!lastBossActive){
lastBossActive=true;bossActive=true;
const bHp=Math.floor(70*diffCfg.bossHpMul);
boss={x:W/2,y:120,isLast:true,hp:bHp,maxHp:bHp,vx:0.9,vy:0,shootTimer:0,spinAngle:0,spinSpeed:0.018,spikes:16,outerR:68,innerR:30,phase:0,phaseTimer:0,phase2:false,reviveFlash:0};
} else {
bossActive=true;const bHp=Math.floor((25+level*12)*diffCfg.bossHpMul);
boss={x:W/2,y:100,hp:bHp,maxHp:bHp,vx:2,shootTimer:0};
}
enemies=[];enemyBullets=[];startMusic(‘boss’);
}
}
}
if(midBossActive)updateMidBoss();

// Enemies
enemies=enemies.filter(e=>{
e.y+=e.speed;if(e.zigzag){e.angle+=0.05;e.x+=Math.sin(e.angle)*2.5;}if(e.y>H+30)return false;
if(Math.random()<e.shootRate){const dx=player.x-e.x,dy=player.y-e.y,d=Math.sqrt(dx*dx+dy*dy);enemyBullets.push({x:e.x,y:e.y,vx:dx/d*diffCfg.bulletSpeed*0.8,vy:dy/d*diffCfg.bulletSpeed*0.8});}
if(player.invincible<=0&&dist(e.x,e.y,player.x,player.y)<30){lives–;updateUI();spawnParticles(player.x,player.y,’#00ffcc’,8);player.invincible=80;if(lives<=0)endGame();}
const hitR=(e.type===‘tank’?24:20);
bullets=bullets.filter(b=>{const hit=(b.type===‘laser’)?Math.abs(b.x-e.x)<12&&b.y<e.y&&b.y>e.y-40:dist(b.x,b.y,e.x,e.y)<hitR;if(hit){e.hp-=(b.type===‘laser’?0.3:1);spawnParticles(b.x,b.y,e.color,5);return b.type===‘laser’;}return true;});
if(e.hp<=0){score+=e.points*level;updateUI();spawnParticles(e.x,e.y,e.color,18);sfxExplosion();if(Math.random()<0.06)maybeDropPowerup(e.x,e.y);return false;}
return true;
});

// Boss
if(boss){
if(boss.reviveFlash>0)boss.reviveFlash–;
if(boss.isLast){
boss.spinAngle+=boss.spinSpeed||(boss.phase2?0.038:0.018);boss.phaseTimer++;
boss.x+=boss.vx;if(boss.x<80||boss.x>W-80)boss.vx*=-1;
if(boss.phase2){
boss.y=110+Math.sin(frameCount*0.015)*35;
if(boss.phaseTimer%300===0)boss.vx*=-1;
}
// リング弾: 最終形態は55フレームごと14発、弾速4.0
const attackInterval=boss.phase2?55:90;
if(boss.phaseTimer%attackInterval===0){
const shots=boss.phase2?14:(8+Math.floor(boss.phaseTimer/400));
const spd=boss.phase2?4.0:2.8;
for(let i=0;i<shots;i++){const a=(Math.PI*2*i/shots)+boss.spinAngle;enemyBullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd});}
}
// 狙い撃ち: 最終形態は110フレームごと5way
const aimInterval=boss.phase2?110:240;
if(boss.phaseTimer%aimInterval===0){
const dx=player.x-boss.x,dy=player.y-boss.y,d=Math.sqrt(dx*dx+dy*dy);
const ways=boss.phase2?5:2;const spd2=diffCfg.bulletSpeed*(boss.phase2?1.2:1.0);
for(let i=0;i<ways;i++){const spread=(i-(ways-1)/2)*0.3;enemyBullets.push({x:boss.x,y:boss.y,vx:dx/d*spd2+spread,vy:dy/d*spd2});}
}
// スパイラル4方向: 35フレームごと
if(boss.phase2&&boss.phaseTimer%35===0){
const a=boss.spinAngle*3;
for(let j=0;j<4;j++){const aa=a+Math.PI/2*j;enemyBullets.push({x:boss.x,y:boss.y,vx:Math.cos(aa)*2.8,vy:Math.sin(aa)*2.8});}
}
// 追尾弾: 220フレームごと2発
if(boss.phase2&&boss.phaseTimer%220===0){
const dx2=player.x-boss.x,dy2=player.y-boss.y,d2=Math.sqrt(dx2*dx2+dy2*dy2);
for(let k=0;k<2;k++){const spread=(k-0.5)*0.4;enemyBullets.push({x:boss.x,y:boss.y,vx:dx2/d2*1.6+spread,vy:dy2/d2*1.6,homing:true});}
}
const outerR=boss.outerR*(boss.phase2?1.25:1);
bullets=bullets.filter(b=>{const hit=(b.type===‘laser’)?Math.abs(b.x-boss.x)<outerR&&b.y<boss.y+outerR&&b.y>boss.y-outerR:dist(b.x,b.y,boss.x,boss.y)<outerR;if(hit){boss.hp-=(b.type===‘laser’?0.3:1);spawnParticles(b.x,b.y,’#ff4400’,3);return b.type===‘laser’;}return true;});
if(player.invincible<=0&&dist(boss.x,boss.y,player.x,player.y)<outerR-10){lives=0;updateUI();endGame();}
} else {

}

function fireWeapon(){

function updateBonus(){

applyKeyboard();if(shootCooldown<=0)fireWeapon();if(shootCooldown>0)shootCooldown–;
bullets=bullets.filter(b=>{b.y+=b.vy;if(b.vx)b.x+=b.vx;if(b.type===‘laser’)b.len=(b.len||0)+2;return b.y>-400;});
if(bonus.done){bonus.resultTimer++;if(bonus.resultTimer>180){state=‘playing’;levelTimer=0;spawnTimer=0;midBossSpawned=false;levelUpMsg=120;startMusic(‘stage’);}particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.94;p.vy*=0.94;p.life-=p.decay;return p.life>0;});return;}
const WAVE_INTERVAL=110;
if(bonus.wave<BONUS_WAVES.length&&bonus.waveTimer>=WAVE_INTERVAL){const wc=BONUS_WAVES[bonus.wave];wc.forEach(cfg=>{bonus.totalEnemies++;bonus.enemies.push({t:-cfg.delay,pts:cfg.path,color:cfg.color,hp:1,points:100,x:cfg.path[0].x*W,y:cfg.path[0].y*H,angle:0});});bonus.wave++;bonus.waveTimer=0;}
bonus.waveTimer++;
bonus.enemies=bonus.enemies.filter(e=>{
e.t+=0.008;if(e.t<0)return true;
const t01=Math.min(e.t,1.0),pos=pathAt(e.pts,t01),prevPos=pathAt(e.pts,Math.max(0,t01-0.008));
e.angle=Math.atan2(pos.y-prevPos.y,pos.x-prevPos.x);e.x=pos.x*W;e.y=pos.y*H;
if(e.t>=1.0)return false;
bullets=bullets.filter(b=>{const hit=(b.type===‘laser’)?Math.abs(b.x-e.x)<15&&b.y<e.y&&b.y>e.y-40:dist(b.x,b.y,e.x,e.y)<22;if(hit){e.hp-=(b.type===‘laser’?0.3:1);spawnParticles(b.x,b.y,e.color,5);return b.type===‘laser’;}return true;});
if(e.hp<=0){bonus.killed++;score+=e.points;updateUI();sfxExplosion();spawnParticles(e.x,e.y,e.color,16);return false;}
return true;
});
const allSpawned=bonus.wave>=BONUS_WAVES.length,allKilled=bonus.enemies.length===0&&allSpawned,timeUp=bonus.timer>=bonus.maxTime;
if(allKilled||timeUp){bonus.done=true;bonus.perfect=allKilled&&bonus.killed===bonus.totalEnemies;if(bonus.perfect){score+=10000;updateUI();sfxBonusPerfect();for(let i=0;i<8;i++)spawnParticles(W/2,H/2,’#ffdd00’,10);}}
particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.94;p.vy*=0.94;p.life-=p.decay;return p.life>0;});
}

function spawnFirework(){const x=40+Math.random()*(W-80),y=80+Math.random()*(H*0.6),hue=Math.random()*360;for(let i=0;i<28;i++){const a=(Math.PI*2*i/28)+Math.random()*0.3,sp=2+Math.random()*4;ending.fireworks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.018+Math.random()*0.015,r:1.5+Math.random()*2.5,col:`hsl(${hue+Math.random()*30},100%,65%)`});}}

if(pl.timer>25)pl.saluteAngle=Math.max(-Math.PI*0.12,-Math.PI/2+(pl.timer-25)*0.03);

qu.timer++;
const qTargetY=H-165;
if(qu.y>qTargetY){qu.y+=(qTargetY-qu.y)*0.1;}else qu.y=qTargetY;

if(dist2<70&&qu.timer>40&&!qu.kissing){

pl.saluteAngle=-Math.PI*0.6; // pilot arm around queen
}

}

}

// Characters wave and exit
const pl=ending.pilot,qu=ending.queen;
if(pl.active&&!pl.gone){
pl.timer++;qu.timer++;
if(pl.timer>160){
pl.saluteAngle=Math.sin(pl.timer*0.15)*0.5-0.3; // wave
qu.armAngle=Math.sin(qu.timer*0.15+1)*0.4-0.5; // wave

}

function draw(){
ctx.clearRect(0,0,W,H);
for(const s of stars){ctx.globalAlpha=0.3+s.brightness*0.7;ctx.fillStyle=`hsl(${180+s.brightness*40},60%,85%)`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}
ctx.globalAlpha=1;
if(state===‘title’)return;
if(state===‘bonus’){drawBonus();return;}
if(state===‘ending’){drawEnding();return;}

// Transform effect overlay
if(transformEffect.active){
for(const p of particles){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
if(boss)drawBoss(boss);
drawTransformEffect();
drawPlayer(player.x,player.y,1);
return;
}

// Boss reviving pre-transform
if(bossReviving){
const flash=Math.floor(bossReviveTimer/6)%2===0;
if(flash){ctx.fillStyle=’#ff000022’;ctx.fillRect(0,0,W,H);}
for(const p of particles){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
for(const p of powerups)drawPowerup(p);
drawPlayer(player.x,player.y,1);
// WARNING text
const fa=(0.5+0.5*Math.abs(Math.sin(frameCount*0.25)));
ctx.save();ctx.globalAlpha=fa;ctx.font=`bold ${Math.round(W*0.065)}px Orbitron`;ctx.fillStyle=’#ff4400’;ctx.shadowColor=’#ff4400’;ctx.shadowBlur=25;ctx.textAlign=‘center’;ctx.fillText(‘WARNING…’,W/2,H/2);ctx.restore();
return;
}

if(state===‘intro’){
for(let i=0;i<6;i++){const ty=player.y+20+i*12,ta=(0.5-i*0.08)*(1-intro.timer/80);ctx.save();ctx.globalAlpha=Math.max(0,ta);ctx.fillStyle=`hsl(${160+i*10},100%,70%)`;ctx.shadowColor=’#00ffcc’;ctx.shadowBlur=12;ctx.beginPath();ctx.ellipse(player.x,ty,4-i*0.5,6,0,0,Math.PI*2);ctx.fill();ctx.restore();}
drawPlayer(player.x,player.y,1);
if(intro.phase===‘settle’){const pulse=0.6+0.4*Math.sin(intro.timer*0.15);ctx.save();ctx.globalAlpha=pulse;ctx.font=`bold ${Math.round(W*0.07)}px Orbitron`;ctx.fillStyle=’#00ffcc’;ctx.shadowColor=’#00ffcc’;ctx.shadowBlur=20;ctx.textAlign=‘center’;ctx.fillText(‘READY’,W/2,H/2);ctx.restore();}

}

if(state===‘docking’){

if(dk.result===null){ctx.save();const blink=Math.floor(dk.flashTimer/18)%2===0;ctx.globalAlpha=blink?1:0.4;ctx.font=`bold ${Math.round(W*0.045)}px Orbitron`;ctx.fillStyle=’#ffdd00’;ctx.shadowColor=’#ffdd00’;ctx.shadowBlur=15;ctx.textAlign=‘center’;ctx.fillText(‘DOCKING EVENT!’,W/2,80);ctx.globalAlpha=1;ctx.font=`${Math.round(W*0.032)}px Orbitron`;ctx.fillStyle=’#00ffcc88’;ctx.fillText(‘DOCK!!ボタンで合体！’,W/2,110);ctx.restore();const dzPulse=0.4+0.3*Math.sin(dk.flashTimer*0.15);ctx.save();ctx.globalAlpha=dzPulse;ctx.strokeStyle=’#ffdd00’;ctx.lineWidth=2;ctx.shadowColor=’#ffdd00’;ctx.shadowBlur=12;ctx.beginPath();ctx.ellipse(player.x,player.y,34,34,0,0,Math.PI*2);ctx.stroke();ctx.restore();}

drawPlayer(player.x,player.y,1);
if(dk.result!==null){const fade=Math.min(1,dk.resultTimer/20);ctx.save();ctx.globalAlpha=fade;ctx.textAlign=‘center’;if(dk.result===‘success’){drawPlayer(player.x-12,player.y,0.9);drawPlayer(player.x+12,player.y,0.9);ctx.font=`bold ${Math.round(W*0.08)}px Orbitron`;ctx.fillStyle=’#ffdd00’;ctx.shadowColor=’#ffdd00’;ctx.shadowBlur=30;ctx.fillText(‘合体!!’,W/2,H/2-20);ctx.font=`${Math.round(W*0.04)}px Orbitron`;ctx.fillStyle=’#00ffcc’;ctx.fillText(‘DOUBLE SHOT GET!’,W/2,H/2+30);}else{ctx.font=`bold ${Math.round(W*0.07)}px Orbitron`;ctx.fillStyle=’#ff4466’;ctx.shadowColor=’#ff4466’;ctx.shadowBlur=20;ctx.fillText(‘MISSED…’,W/2,H/2);drawPlayer(player.x,player.y,1);}ctx.restore();}

}

// Main play draw
for(const p of particles){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}

else drawPlayer(player.x,player.y,alpha);

// Weapon timer bar

}

ctx.fillText(diffCfg.label+(loopCount>0?`  LOOP ${loopCount+1}`:’’),W-14,H-14);ctx.restore();

const blink=Math.floor(frameCount/15)%2===0;if(blink){ctx.save();ctx.font=`bold ${Math.round(W*0.04)}px Orbitron`;ctx.fillStyle=’#44aaff’;ctx.shadowColor=’#44aaff’;ctx.shadowBlur=15;ctx.textAlign=‘center’;ctx.fillText(‘⚠ CAUTION ⚠’,W/2,H-95);ctx.restore();}
}
}

function drawBonus(){
for(const p of particles){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
for(const e of bonus.enemies){if(e.t<0)continue;ctx.save();ctx.translate(e.x,e.y);ctx.rotate(e.angle+Math.PI/2);ctx.strokeStyle=e.color;ctx.fillStyle=’#0a0010’;ctx.shadowColor=e.color;ctx.shadowBlur=16;ctx.lineWidth=2;const s=1.15;ctx.beginPath();ctx.moveTo(0,-13*s);ctx.lineTo(-18*s,-4*s);ctx.lineTo(-10*s,2*s);ctx.lineTo(-6*s,11*s);ctx.lineTo(0,7*s);ctx.lineTo(6*s,11*s);ctx.lineTo(10*s,2*s);ctx.lineTo(18*s,-4*s);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle=e.color;ctx.beginPath();ctx.arc(-4,-3,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(4,-3,2.5,0,Math.PI*2);ctx.fill();ctx.restore();}
for(const b of bullets)drawBullet(b);
const alpha=player.invincible>0?(Math.floor(frameCount/4)%2===0?0.25:0.9):1;
if(merged){drawPlayer(player.x-14,player.y,alpha);drawPlayer(player.x+14,player.y,alpha);}else drawPlayer(player.x,player.y,alpha);
ctx.save();const blink=Math.floor(frameCount/20)%2===0;ctx.globalAlpha=blink?1:0.5;ctx.font=`bold ${Math.round(W*0.055)}px Orbitron`;ctx.fillStyle=’#ffdd00’;ctx.shadowColor=’#ffdd00’;ctx.shadowBlur=18;ctx.textAlign=‘center’;ctx.fillText(‘★ BONUS STAGE ★’,W/2,75);ctx.restore();
const timeLeft=Math.max(0,1-bonus.timer/bonus.maxTime);ctx.fillStyle=’#111’;ctx.fillRect(20,88,W-40,8);ctx.fillStyle=`hsl(${timeLeft*120},100%,55%)`;ctx.fillRect(20,88,(W-40)*timeLeft,8);
ctx.save();ctx.font=`${Math.round(W*0.038)}px Orbitron`;ctx.fillStyle=’#00ffcc’;ctx.textAlign=‘center’;ctx.shadowColor=’#00ffcc’;ctx.shadowBlur=8;ctx.fillText(`${bonus.killed} / ${bonus.totalEnemies}`,W/2,112);ctx.restore();
if(bonus.done){const fade=Math.min(1,bonus.resultTimer/25);ctx.save();ctx.globalAlpha=fade;ctx.textAlign=‘center’;if(bonus.perfect){ctx.font=`bold ${Math.round(W*0.1)}px Orbitron`;ctx.fillStyle=’#ffdd00’;ctx.shadowColor=’#ffdd00’;ctx.shadowBlur=35;ctx.fillText(‘PERFECT!!’,W/2,H/2-30);ctx.font=`bold ${Math.round(W*0.05)}px Orbitron`;ctx.fillStyle=’#ff8800’;ctx.fillText(’+10000 pts’,W/2,H/2+20);}else{ctx.font=`bold ${Math.round(W*0.07)}px Orbitron`;ctx.fillStyle=’#00ffcc’;ctx.shadowColor=’#00ffcc’;ctx.shadowBlur=20;ctx.fillText(`HIT ${bonus.killed}`,W/2,H/2-20);ctx.font=`${Math.round(W*0.04)}px Orbitron`;ctx.fillStyle=’#00ffcc88’;ctx.fillText(‘BONUS STAGE END’,W/2,H/2+25);}ctx.restore();}
}

function drawEnding(){
for(const f of ending.fireworks){ctx.save();ctx.globalAlpha=f.life;ctx.fillStyle=f.col;ctx.shadowColor=f.col;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fill();ctx.restore();}
if(ending.phase===‘flyaway’){
for(const p of particles){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
if(ending.shipY>-80)drawPlayer(ending.shipX,ending.shipY,1);
return;
}
const pl=ending.pilot,qu=ending.queen;
// Helper: draw floor shadow
function drawShadow(sx,sy,w){ctx.save();ctx.globalAlpha=0.18;ctx.fillStyle=’#00ffcc’;ctx.beginPath();ctx.ellipse(sx,sy,w,4,0,0,Math.PI*2);ctx.fill();ctx.restore();}

if(ending.phase===‘pilot’){
// Kiss scene
if(!pl.gone)drawShadow(pl.x,H-108,18);
if(qu.active&&!qu.gone)drawShadow(qu.x,H-105,18);
if(!pl.gone)drawPilot(pl.x,pl.y,pl.saluteAngle,1);
if(qu.active&&!qu.gone)drawQueen(qu.x,qu.y,1,{kissing:qu.kissing,armAngle:qu.armAngle,leanAngle:qu.leanAngle});
// Kiss effect
if(qu.kissing){
const kissX=(pl.x+qu.x)/2,kissY=pl.y-38;
drawKissEffect(kissX,kissY,qu.kissTimer);
// Heart particles rising
if(qu.kissTimer%12===0){particles.push({x:kissX+(Math.random()-0.5)*20,y:kissY,vx:(Math.random()-0.5)*0.5,vy:-1-Math.random()*0.5,life:1,decay:0.012,color:’#ff88cc’,r:4+Math.random()*4});}
}
particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.98;p.vy*=0.98;p.life-=p.decay;return p.life>0;});
for(const p of particles){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
// MISSION COMPLETE text
const fade=Math.min(1,(pl.timer-60)/30);
if(fade>0){
ctx.save();ctx.globalAlpha=fade;
ctx.font=`bold ${Math.round(W*0.055)}px Orbitron`;ctx.fillStyle=’#ffdd00’;ctx.shadowColor=’#ffdd00’;ctx.shadowBlur=22;ctx.textAlign=‘center’;
ctx.fillText(‘MISSION COMPLETE’,W/2,H*0.3);
if(qu.kissing){
ctx.globalAlpha=fade*Math.abs(Math.sin(frameCount*0.08));
ctx.font=`bold ${Math.round(W*0.04)}px Orbitron`;ctx.fillStyle=’#ff88cc’;ctx.shadowColor=’#ff88cc’;ctx.shadowBlur=15;
ctx.fillText(‘★ GALAXY QUEEN'S KISS ★’,W/2,H*0.3+44);
}
ctx.restore();
}
return;
}
// Scroll credits
ctx.save();ctx.textAlign=‘center’;
ending.credits.forEach((line,i)=>{
const y=ending.scrollY+i*52;if(y<-60||y>H+20)return;
const al=Math.min(1,Math.min(y/80,(H-y)/80));ctx.globalAlpha=Math.max(0,al);
if(line.big)ctx.font=`bold ${Math.round(W*0.065)}px Orbitron`;
else if(line.sub)ctx.font=`${Math.round(W*0.036)}px Orbitron`;
else ctx.font=`${Math.round(W*0.048)}px Orbitron`;
ctx.fillStyle=line.col||’#ffffff’;ctx.shadowColor=line.col||’#ffffff’;ctx.shadowBlur=line.big?18:6;ctx.fillText(line.t,W/2,y);
});
ctx.restore();
// Characters visible during scroll
if(pl.active&&!pl.gone){drawShadow(pl.x,H-108,18);drawPilot(pl.x,H-155,pl.saluteAngle,0.9);}
if(qu.active&&!qu.gone){drawShadow(qu.x,H-105,18);drawQueen(qu.x,H-165,0.9,{kissing:false,armAngle:qu.armAngle,leanAngle:0});}
// Particles from scroll phase
for(const p of particles){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
if(ending.phase===‘fin’){
// 笑い声が鳴り始めるまでのわずかな間だけ表示
const pulse=0.5+0.5*Math.abs(Math.sin(ending.timer*0.06));
ctx.save();ctx.globalAlpha=pulse*0.6;
ctx.font=`bold ${Math.round(W*0.045)}px Orbitron`;
ctx.fillStyle=’#ff4466’;ctx.shadowColor=’#ff4466’;ctx.shadowBlur=20;
ctx.textAlign=‘center’;ctx.fillText(’…’,W/2,H/2);
ctx.restore();
}
if(ending.phase===‘warp’||warp.active){
// ワープ: 画面が渦を巻きながら暗転
const a=warp.alpha;
// 紫の渦エフェクト
if(a<0.7){
const spokeCount=12;
for(let i=0;i<spokeCount;i++){
const angle=warp.timer*0.08+Math.PI*2*i/spokeCount;
const r=Math.max(W,H)*(1-a)*0.8;
ctx.save();ctx.globalAlpha=a*0.6;
ctx.strokeStyle=`hsl(${270+i*10},100%,60%)`;ctx.lineWidth=3;ctx.shadowColor=`hsl(${270+i*10},100%,60%)`;ctx.shadowBlur=12;
ctx.beginPath();ctx.moveTo(W/2,H/2);ctx.lineTo(W/2+Math.cos(angle)*r,H/2+Math.sin(angle)*r);ctx.stroke();
ctx.restore();
}
}
// 暗転オーバーレイ
ctx.save();ctx.globalAlpha=a;ctx.fillStyle=’#000’;ctx.fillRect(0,0,W,H);ctx.restore();
// 「WARNING」テキスト
if(a>0.3&&a<0.85){
ctx.save();ctx.globalAlpha=(a-0.3)/0.55*(0.5+0.5*Math.sin(warp.timer*0.4));
ctx.font=`bold ${Math.round(W*0.07)}px Orbitron`;
ctx.fillStyle=’#ff0000’;ctx.shadowColor=’#ff0000’;ctx.shadowBlur=30;
ctx.textAlign=‘center’;ctx.fillText(‘Ｈｅｈｅｈｅ…’,W/2,H/2);
ctx.restore();
}
}
}

// ── Keyboard ──────────────────────────────────────────────
const kbState={};
document.addEventListener(‘keydown’,e=>{kbState[e.key]=true;if(e.key===’ ’){e.preventDefault();if(state===‘title’||state===‘gameover’){unlockAudio();startGame();}else if(state===‘ending’&&ending.phase!==‘warp’){unlockAudio();startNewLoop();}}if(e.key===‘1’)setWeapon(‘normal’);if(e.key===‘2’)setWeapon(‘wide’);if(e.key===‘3’)setWeapon(‘laser’);});
document.addEventListener(‘keyup’,e=>{kbState[e.key]=false;});
function applyKeyboard(){if(!Object.keys(kbState).length)return;let kx=0,ky=0;if(kbState[‘ArrowLeft’]||kbState[‘a’])kx-=1;if(kbState[‘ArrowRight’]||kbState[‘d’])kx+=1;if(kbState[‘ArrowUp’]||kbState[‘w’])ky-=1;if(kbState[‘ArrowDown’]||kbState[‘s’])ky+=1;if(kx||ky){player.x=Math.max(25,Math.min(W-25,player.x+kx*player.speed));player.y=Math.max(60,Math.min(H-120,player.y+ky*player.speed));}}

// ── Game flow ─────────────────────────────────────────────
function showOverlay(title,sub,tap){overlay.innerHTML=`<h1>${title}</h1><div style="font-size:18px;color:#00ffcc;letter-spacing:2px">${sub}</div><div class="tap-start" id="startBtn">${tap}</div>`;overlay.style.display=‘flex’;document.getElementById(‘startBtn’).addEventListener(‘touchstart’,e=>{e.preventDefault();unlockAudio();startGame();},{passive:false});document.getElementById(‘startBtn’).addEventListener(‘click’,()=>{unlockAudio();startGame();});}
function endGame(){state=‘gameover’;stopMusic();dockBtn.style.display=‘none’;showOverlay(‘GAME OVER’,`SCORE: ${score}`,‘TAP TO RETRY’);}
function startNewLoop(){loopCount++;initGame();overlay.style.display=‘none’;startMusic(‘title’);startIntro();}
function startGame(){loopCount=0;initGame();overlay.style.display=‘none’;startMusic(‘title’);startIntro();}
function startIntro(){state=‘intro’;player={x:W/2,y:H-160,w:40,h:40,speed:7,invincible:0};bullets=[];enemies=[];enemyBullets=[];particles=[];powerups=[];intro={active:true,shipY:-120,targetY:H-160,phase:‘fly’,timer:0};updateUI();}

document.getElementById(‘startBtn’).addEventListener(‘touchstart’,e=>{e.preventDefault();unlockAudio();startGame();},{passive:false});
document.getElementById(‘startBtn’).addEventListener(‘click’,()=>{unlockAudio();startGame();});

resize();
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>

</body>
</html>
