<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KUROGA v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;font-family:'Orbitron',monospace;}
#gameWrap{position:fixed;inset:0;display:flex;flex-direction:column;background:#000;}
#hud{position:absolute;top:env(safe-area-inset-top,0px);left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:10px 18px 6px;z-index:10;pointer-events:none;}
.hud-item{font-size:11px;letter-spacing:2px;color:#00ffcc;text-shadow:0 0 8px #00ffcc;}
.hud-item span{font-size:15px;font-weight:700;}
#weaponHud{position:absolute;top:env(safe-area-inset-top,0px);left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;display:flex;gap:8px;align-items:center;padding-top:10px;}
.weapon-icon{font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:10px;border:1px solid #00ffcc44;color:#00ffcc66;}
.weapon-icon.active{border-color:#ffdd00;color:#ffdd00;text-shadow:0 0 8px #ffdd00;box-shadow:0 0 10px #ffdd0044;}
#canvas{position:absolute;inset:0;width:100%;height:100%;}
#fingerDot{position:absolute;width:60px;height:60px;border-radius:50%;border:2px solid #00ffcc66;background:radial-gradient(circle,#00ffcc22,transparent);pointer-events:none;z-index:6;display:none;transform:translate(-50%,-50%);transition:opacity 0.1s;}
#dockBtn{display:none;position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom,0px)+28px);transform:translateX(-50%);z-index:20;width:190px;height:72px;border-radius:36px;background:radial-gradient(circle at 40% 35%,#ffdd0099,#ff880044);border:2.5px solid #ffdd00cc;box-shadow:0 0 30px #ffdd0077;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:22px;font-weight:900;letter-spacing:4px;color:#ffdd00;text-shadow:0 0 14px #ffdd00;touch-action:none;pointer-events:all;animation:dockPulse 0.8s ease-in-out infinite;}
@keyframes dockPulse{0%,100%{box-shadow:0 0 30px #ffdd0077;}50%{box-shadow:0 0 55px #ffdd00cc;}}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:20;background:#00000088;}
#overlay h1{font-size:clamp(28px,8vw,44px);font-weight:900;letter-spacing:4px;color:#00ffcc;text-shadow:0 0 20px #00ffcc,0 0 50px #00ffcc66;text-align:center;animation:pulse 2s ease-in-out infinite;}
.tap-start{margin-top:8px;padding:16px 40px;border:1.5px solid #00ffcc88;border-radius:50px;color:#00ffcc;font-size:14px;letter-spacing:4px;background:#00ffcc11;pointer-events:all;animation:pulse 1.5s ease-in-out infinite;cursor:pointer;}
/* Difficulty menu */
#diffMenu{display:flex;flex-direction:column;gap:12px;align-items:center;width:88%;max-width:320px;}
.diff-btn{width:100%;padding:14px 20px;border-radius:14px;border:2px solid;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:3px;cursor:pointer;background:transparent;transition:all 0.15s;display:flex;justify-content:space-between;align-items:center;touch-action:manipulation;}
.diff-btn.easy{border-color:#00ff88;color:#00ff88;}
.diff-btn.easy.selected,.diff-btn.easy:active{background:#00ff8822;box-shadow:0 0 20px #00ff8855;}
.diff-btn.normal{border-color:#00ffcc;color:#00ffcc;}
.diff-btn.normal.selected,.diff-btn.normal:active{background:#00ffcc22;box-shadow:0 0 20px #00ffcc55;}
.diff-btn.hard{border-color:#ff8800;color:#ff8800;}
.diff-btn.hard.selected,.diff-btn.hard:active{background:#ff880022;box-shadow:0 0 20px #ff880055;}
.diff-btn.extreme{border-color:#ff4466;color:#ff4466;}
.diff-btn.extreme.selected,.diff-btn.extreme:active{background:#ff446622;box-shadow:0 0 20px #ff446655;}
.diff-sub{font-size:9px;letter-spacing:1px;opacity:0.7;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div class="hud-item">SCORE<br><span id="score">0</span></div>
    <div class="hud-item" style="text-align:center">LEVEL<br><span id="level">1</span></div>
    <div class="hud-item" style="text-align:right">LIFE<br><span id="lifeText">❤❤❤</span></div>
  </div>
  <div id="weaponHud">
    <div class="weapon-icon active" id="wNormal">NORMAL</div>
    <div class="weapon-icon" id="wWide">WIDE</div>
    <div class="weapon-icon" id="wLaser">LASER</div>
  </div>
  <div id="fingerDot"></div>
  <div id="dockBtn">DOCK!!</div>
  <div id="overlay">
    <h1>KUROGA</h1>
    <div style="font-size:11px;letter-spacing:2px;color:#00ffcc66;text-align:center">ver 2.0</div>
    <div style="font-size:11px;color:#00ffcc88;text-align:center;line-height:2;letter-spacing:1px">
      画面をなぞって移動・自動連射<br>パワーアップを取れ！
    </div>
    <div style="font-size:12px;color:#ffdd00;letter-spacing:2px;margin-top:4px">DIFFICULTY</div>
    <div id="diffMenu">
      <button class="diff-btn easy" data-diff="easy">EASY <span class="diff-sub">ゆっくり遊ぶ</span></button>
      <button class="diff-btn normal selected" data-diff="normal">NORMAL <span class="diff-sub">標準的な難易度</span></button>
      <button class="diff-btn hard" data-diff="hard">HARD <span class="diff-sub">手強い敵たち</span></button>
      <button class="diff-btn extreme" data-diff="extreme">EXTREME <span class="diff-sub">廃人向け</span></button>
    </div>
    <div class="tap-start" id="startBtn">TAP TO START</div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const lifeEl = document.getElementById('lifeText');
const fingerDot = document.getElementById('fingerDot');
const dockBtn = document.getElementById('dockBtn');

let W, H;
function resize() {
W = canvas.width = window.innerWidth;
H = canvas.height = window.innerHeight;
if (stars.length) { stars.length=0; for(let i=0;i<140;i++) stars.push(makeStar()); }
}
window.addEventListener(‘resize’, resize);

// ── Stars ─────────────────────────────────────────────────
function makeStar() {
return { x:Math.random()*(W||400), y:Math.random()*(H||800), r:Math.random()*1.5+0.3, speed:Math.random()*0.8+0.2, brightness:Math.random() };
}
const stars = [];
for(let i=0;i<140;i++) stars.push(makeStar());

// ── Difficulty config ─────────────────────────────────────
const DIFF = {
easy:    { enemySpeed:0.8, shootRate:0.0012, bossHpMul:0.6, bulletSpeed:2.5, lives:5, label:‘EASY’ },
normal:  { enemySpeed:1.0, shootRate:0.0022, bossHpMul:1.0, bulletSpeed:3.5, lives:3, label:‘NORMAL’ },
hard:    { enemySpeed:1.4, shootRate:0.0035, bossHpMul:1.4, bulletSpeed:4.5, lives:3, label:‘HARD’ },
extreme: { enemySpeed:1.9, shootRate:0.005,  bossHpMul:2.0, bulletSpeed:5.5, lives:2, label:‘EXTREME’ },
};
let difficulty = ‘normal’;
let diffCfg = DIFF.normal;

// Difficulty menu
document.querySelectorAll(’.diff-btn’).forEach(btn => {
btn.addEventListener(‘click’, () => {
document.querySelectorAll(’.diff-btn’).forEach(b => b.classList.remove(‘selected’));
btn.classList.add(‘selected’);
difficulty = btn.dataset.diff;
diffCfg = DIFF[difficulty];
});
btn.addEventListener(‘touchstart’, e => { e.preventDefault(); btn.click(); }, { passive:false });
});

// ── Input: full-screen drag to move ──────────────────────
const input = { targetX:null, targetY:null };
let shootCooldown = 0;
let dockBtnPressed = false;
const activeTouches = {};

function handleTouchStart(e) {
e.preventDefault();
if (state===‘title’||state===‘gameover’) { unlockAudio(); startGame(); return; }
if (state===‘ending’) { unlockAudio(); startNewLoop(); return; }
for(const t of e.changedTouches) {
activeTouches[t.identifier] = { x:t.clientX, y:t.clientY };
input.targetX = t.clientX; input.targetY = t.clientY;
fingerDot.style.left=t.clientX+‘px’; fingerDot.style.top=t.clientY+‘px’; fingerDot.style.display=‘block’;
}
}
function handleTouchMove(e) {
e.preventDefault();
for(const t of e.changedTouches) {
if(!activeTouches[t.identifier]) continue;
activeTouches[t.identifier].x=t.clientX; activeTouches[t.identifier].y=t.clientY;
input.targetX=t.clientX; input.targetY=t.clientY;
fingerDot.style.left=t.clientX+‘px’; fingerDot.style.top=t.clientY+‘px’;
}
}
function handleTouchEnd(e) {
e.preventDefault();
for(const t of e.changedTouches) {
delete activeTouches[t.identifier];
if(!Object.keys(activeTouches).length) {
input.targetX=null; input.targetY=null; fingerDot.style.display=‘none’;
} else {
const last = Object.values(activeTouches).pop();
input.targetX=last.x; input.targetY=last.y;
}
}
}
document.addEventListener(‘touchstart’, handleTouchStart, {passive:false});
document.addEventListener(‘touchmove’,  handleTouchMove,  {passive:false});
document.addEventListener(‘touchend’,   handleTouchEnd,   {passive:false});
document.addEventListener(‘touchcancel’,handleTouchEnd,   {passive:false});

dockBtn.addEventListener(‘touchstart’, e => { e.preventDefault(); e.stopPropagation(); if(state===‘docking’){dockBtnPressed=true;dockBtn.style.opacity=‘0.5’;} }, {passive:false});
dockBtn.addEventListener(‘touchend’,   e => { e.preventDefault(); e.stopPropagation(); setTimeout(()=>{dockBtn.style.opacity=‘1’;},80); }, {passive:false});
dockBtn.addEventListener(‘click’, ()=>{ if(state===‘docking’) dockBtnPressed=true; });

// ══════════════════════════════════════════════════════════
// FM SOUND ENGINE
// ══════════════════════════════════════════════════════════
let audioCtx=null, musicNodes=[], musicPlaying=false;
function getAudio() { if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function unlockAudio() {
const ac=getAudio();
if(ac.state===‘suspended’) ac.resume();
try{ const b=ac.createBuffer(1,1,ac.sampleRate),s=ac.createBufferSource(); s.buffer=b; s.connect(ac.destination); s.start(0); }catch(e){}
}
function makeMaster(ac) {
const eq=ac.createBiquadFilter(); eq.type=‘peaking’; eq.frequency.value=3000; eq.gain.value=3; eq.Q.value=1;
const comp=ac.createDynamicsCompressor(); comp.threshold.value=-14; comp.ratio.value=6; comp.attack.value=0.003; comp.release.value=0.15;
const lim=ac.createDynamicsCompressor(); lim.threshold.value=-1; lim.ratio.value=20; lim.attack.value=0.001; lim.release.value=0.05;
const out=ac.createGain(); out.gain.value=0.72;
eq.connect(comp); comp.connect(lim); lim.connect(out); out.connect(ac.destination);
return eq;
}
function nf(semi){ return 130.81*Math.pow(2,semi/12); }
function fmNote(ac,dest,cf,mr,mi,vol,dur,ct=‘sine’){
const now=ac.currentTime,mf=cf*mr;
const mod=ac.createOscillator(),mG=ac.createGain();
mod.type=‘sine’; mod.frequency.value=mf;
mG.gain.setValueAtTime(mf*mi,now); mG.gain.exponentialRampToValueAtTime(mf*mi*0.3,now+dur*0.3); mG.gain.exponentialRampToValueAtTime(0.001,now+dur);
mod.connect(mG); mG.connect(mod.frequency);
const car=ac.createOscillator(),env=ac.createGain();
car.type=ct; car.frequency.value=cf; mG.connect(car.frequency);
env.gain.setValueAtTime(0.001,now); env.gain.linearRampToValueAtTime(vol,now+0.008); env.gain.setValueAtTime(vol*0.8,now+0.03); env.gain.exponentialRampToValueAtTime(vol*0.6,now+dur*0.6); env.gain.exponentialRampToValueAtTime(0.001,now+dur);
car.connect(env); env.connect(dest);
mod.start(now); mod.stop(now+dur+0.05); car.start(now); car.stop(now+dur+0.05);
}
function makeSeq(ac,dest,pattern,bpm,instrFn){
const beat=60/bpm; let idx=0,stopped=false; const tids=[];
function tick(){ if(stopped)return; const step=pattern[idx%pattern.length]; if(step!==null)instrFn(ac,dest,step,beat); const dur=step?(step.d||0.5)*beat:0.5*beat; idx++; const id=setTimeout(tick,dur*1000); tids.push(id); }
tick(); return {stop(){stopped=true;tids.forEach(clearTimeout);}};
}
function fmLead(ac,dest,step,beat){ const dur=(step.d||.5)*beat*.9; fmNote(ac,dest,nf(step.n),1,2.8,0.22,dur,‘sine’); const sq=ac.createOscillator(),sg=ac.createGain(); sq.type=‘square’; sq.frequency.value=nf(step.n); sq.detune.value=6; sg.gain.setValueAtTime(0.06,ac.currentTime); sg.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur*0.7); sq.connect(sg); sg.connect(dest); sq.start(ac.currentTime); sq.stop(ac.currentTime+dur+0.05); }
function fmBass(ac,dest,step,beat){ const dur=(step.d||.5)*beat*.85; fmNote(ac,dest,nf(step.n),0.5,3.5,0.32,dur,‘sine’); const sub=ac.createOscillator(),sg=ac.createGain(); sub.type=‘sine’; sub.frequency.value=nf(step.n-12); sg.gain.setValueAtTime(0.18,ac.currentTime); sg.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur*0.6); sub.connect(sg); sg.connect(dest); sub.start(ac.currentTime); sub.stop(ac.currentTime+dur+0.05); }
function fmChord(ac,dest,step,beat){ const dur=(step.d||.25)*beat*.6; const root=step.n; const chord=step.minor?[root,root+3,root+7]:[root,root+4,root+7]; chord.forEach((n,i)=>fmNote(ac,dest,nf(n),2,1.5,0.09-i*0.01,dur,‘sine’)); }
function psgCounter(ac,dest,step,beat){ if(!step)return; const dur=(step.d||.5)*beat*.75; const o=ac.createOscillator(),g=ac.createGain(); o.type=‘square’; o.frequency.value=nf(step.n); g.gain.setValueAtTime(0.001,ac.currentTime); g.gain.linearRampToValueAtTime(0.07,ac.currentTime+0.005); g.gain.exponentialRampToValueAtTime(0.04,ac.currentTime+0.05); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur); o.connect(g); g.connect(dest); o.start(ac.currentTime); o.stop(ac.currentTime+dur+0.05); }
function drumKick(ac,dest,vol=1){ const now=ac.currentTime; const o=ac.createOscillator(),g=ac.createGain(); o.type=‘sine’; o.frequency.setValueAtTime(200,now); o.frequency.exponentialRampToValueAtTime(42,now+0.07); o.frequency.exponentialRampToValueAtTime(36,now+0.15); g.gain.setValueAtTime(0.9*vol,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.22); o.connect(g); g.connect(dest); o.start(now); o.stop(now+0.25); const c=ac.createOscillator(),cg=ac.createGain(); c.type=‘sine’; c.frequency.value=1200; cg.gain.setValueAtTime(0.4*vol,now); cg.gain.exponentialRampToValueAtTime(0.001,now+0.015); c.connect(cg); cg.connect(dest); c.start(now); c.stop(now+0.02); }
function drumSnare(ac,dest,vol=1){ const now=ac.currentTime; const o=ac.createOscillator(),og=ac.createGain(); o.type=‘triangle’; o.frequency.value=220; og.gain.setValueAtTime(0.25*vol,now); og.gain.exponentialRampToValueAtTime(0.001,now+0.12); o.connect(og); og.connect(dest); o.start(now); o.stop(now+0.14); const len=Math.floor(ac.sampleRate*0.18),buf=ac.createBuffer(1,len,ac.sampleRate),d=buf.getChannelData(0); for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,0.5); const src=ac.createBufferSource(),ng=ac.createGain(),hp=ac.createBiquadFilter(); hp.type=‘highpass’; hp.frequency.value=2000; src.buffer=buf; ng.gain.setValueAtTime(0.35*vol,now); ng.gain.exponentialRampToValueAtTime(0.001,now+0.16); src.connect(hp); hp.connect(ng); ng.connect(dest); src.start(now); src.stop(now+0.2); }
function drumHat(ac,dest,open=false,vol=1){ const now=ac.currentTime,len=Math.floor(ac.sampleRate*(open?0.12:0.04)),buf=ac.createBuffer(1,len,ac.sampleRate),d=buf.getChannelData(0); for(let i=0;i<len;i++)d[i]=(Math.random()*2-1); const src=ac.createBufferSource(),g=ac.createGain(),hp=ac.createBiquadFilter(),bp=ac.createBiquadFilter(); hp.type=‘highpass’; hp.frequency.value=8000; bp.type=‘bandpass’; bp.frequency.value=10000; bp.Q.value=0.5; src.buffer=buf; const df=open?0.1:0.035; g.gain.setValueAtTime(0.15*vol,now); g.gain.exponentialRampToValueAtTime(0.001,now+df); src.connect(hp); hp.connect(bp); bp.connect(g); g.connect(dest); src.start(now); src.stop(now+df+0.01); }
function makeDrumSeq(ac,dest,pattern,bpm){ const s16=60/bpm/4; let i=0,stopped=false; const tids=[]; function tick(){ if(stopped)return; const p=pattern[i%pattern.length]; if(p.k)drumKick(ac,dest,p.k); if(p.s)drumSnare(ac,dest,p.s); if(p.h)drumHat(ac,dest,false,p.h); if(p.ho)drumHat(ac,dest,true,p.ho); i++; const id=setTimeout(tick,s16*1000); tids.push(id); } tick(); return {stop(){stopped=true;tids.forEach(clearTimeout);}}; }

// Stage music sequences
const SBPM=148;
const SB=[{n:-10,d:.5},{n:-10,d:.25},{n:-10,d:.25},{n:-3,d:.5},{n:-3,d:.5},{n:2,d:.5},{n:2,d:.25},{n:2,d:.25},{n:-5,d:.5},{n:-5,d:.25},{n:-5,d:.25},{n:-10,d:.5},{n:-10,d:.25},{n:-10,d:.25},{n:-3,d:.5},{n:-3,d:.5},{n:0,d:.5},{n:0,d:.25},{n:4,d:.25},{n:2,d:1}];
const SL=[{n:14,d:.5},{n:14,d:.25},null,{n:16,d:.25},{n:14,d:.25},{n:11,d:.25},{n:9,d:.75},null,{n:11,d:.25},{n:9,d:.25},{n:7,d:.5},{n:6,d:.5},{n:7,d:.25},{n:9,d:.25},{n:11,d:.5},{n:9,d:.5},{n:7,d:.5},{n:6,d:.25},{n:4,d:.25},{n:2,d:1}];
const SC=[null,{n:26,d:.25},null,{n:23,d:.25},null,{n:21,d:.25},{n:21,d:.25},null,null,{n:23,d:.25},null,{n:26,d:.25},{n:28,d:.5},null,null,null,null,{n:26,d:.25},null,{n:23,d:.25},null,{n:21,d:.25},{n:19,d:.25},null,{n:18,d:.25},{n:19,d:.25},{n:21,d:.25},{n:23,d:.25},{n:26,d:1}];
const SCHD=[null,null,{n:2,d:.25,minor:false},null,null,null,{n:-3,d:.25,minor:true},null,null,null,{n:7,d:.25,minor:false},null,null,null,{n:5,d:.25,minor:false},null,null,null,{n:2,d:.25,minor:false},null,null,null,{n:-3,d:.25,minor:true},null,null,null,{n:0,d:.25,minor:false},null,null,{n:2,d:.5,minor:false},null,null];
const SDR=[{k:1},{h:.7},{h:.5},{h:.7},{s:.9,h:.6},{h:.6},{h:.5},{h:.8},{k:.9},{h:.7},{k:.5,h:.5},{h:.7},{s:.9,h:.6},{h:.6},{h:.6},{ho:.4},{k:1},{h:.7},{h:.5},{h:.7},{s:.9,h:.6},{h:.6},{h:.5},{h:.8},{k:.9},{h:.7},{h:.5,k:.5},{h:.7},{s:.9,h:.6},{h:.7},{k:.4,h:.5},{h:.8}];

// Boss music sequences (aggressive)
const B2BPM=184;
const B2B=[{n:-10,d:.25},{n:-10,d:.25},{n:-4,d:.25},{n:-10,d:.25},{n:-9,d:.25},{n:-10,d:.25},{n:-4,d:.25},{n:-10,d:.25},{n:-7,d:.25},{n:-7,d:.25},{n:-1,d:.25},{n:-7,d:.25},{n:-6,d:.25},{n:-7,d:.25},{n:-1,d:.25},{n:-7,d:.25},{n:-5,d:.25},{n:-5,d:.25},{n:-11,d:.25},{n:-5,d:.25},{n:-4,d:.25},{n:-5,d:.25},{n:-11,d:.25},{n:-5,d:.25},{n:-3,d:.375},{n:-9,d:.375},{n:-3,d:.25},{n:-10,d:.5},{n:-4,d:.25},{n:-10,d:.25}];
const B2L=[{n:14,d:.25},null,{n:20,d:.25},{n:14,d:.25},null,{n:13,d:.25},{n:19,d:.375},null,{n:11,d:.25},null,{n:17,d:.25},{n:11,d:.25},null,{n:10,d:.25},{n:11,d:.25},null,{n:16,d:.375},{n:10,d:.25},null,{n:15,d:.25},{n:9,d:.25},null,null,{n:8,d:.25},{n:14,d:.25},{n:8,d:.25},null,{n:7,d:.5},{n:13,d:.5}];

function drawPowerup(p){
ctx.save();
ctx.translate(p.x,p.y);
ctx.rotate(p.angle);
const pulse=0.9+0.1*Math.sin(frameCount*0.1+p.age*0.05);
const col=PU_COLORS[p.type];
ctx.shadowColor=col; ctx.shadowBlur=18;
ctx.strokeStyle=col; ctx.lineWidth=2;
ctx.fillStyle=col+‘22’;
// Hexagon shape
ctx.beginPath();
for(let i=0;i<6;i++){ const a=Math.PI/3*i; ctx.lineTo(Math.cos(a)*16*pulse,Math.sin(a)*16*pulse); }
ctx.closePath(); ctx.fill(); ctx.stroke();
ctx.fillStyle=col;
ctx.font=`bold 14px Orbitron`;
ctx.textAlign=‘center’; ctx.textBaseline=‘middle’;
ctx.fillText(PU_LABELS[p.type],0,0);
ctx.restore();
}

function drawBoss(b){
ctx.save();
const x=b.x,y=b.y;
if(b.isLast){
const hp_ratio=b.hp/b.maxHp;
// Final form = red/black spiky sphere, more aggressive visuals
const phase2=b.phase2||false;
const coreHue=phase2?0:0+hp_ratio*30;
const spikeCount=phase2?24:16;
const outerR=b.outerR*(phase2?1.25:1);
ctx.shadowColor=`hsl(${coreHue},100%,55%)`; ctx.shadowBlur=phase2?50:35;
const pulse=1+0.06*Math.sin(frameCount*0.12);
ctx.fillStyle=`hsl(${coreHue},80%,12%)`;
ctx.strokeStyle=`hsl(${coreHue},100%,55%)`;
ctx.lineWidth=phase2?4:3;
ctx.beginPath(); ctx.arc(x,y,b.innerR*pulse,0,Math.PI*2); ctx.fill(); ctx.stroke();
// Second ring for phase 2
if(phase2){
ctx.strokeStyle=`hsl(${coreHue+20},100%,40%)88`; ctx.lineWidth=2;
ctx.beginPath(); ctx.arc(x,y,b.innerR*pulse*1.4,0,Math.PI*2); ctx.stroke();
}
for(let i=0;i<spikeCount;i++){
const a=b.spinAngle+(Math.PI*2*i/spikeCount);
const a2=b.spinAngle+(Math.PI*2*(i+0.5)/spikeCount);
const outerPulse=outerR*(1+0.08*Math.sin(frameCount*0.08+i));
const ix=x+Math.cos(a)*b.innerR*1.05,iy=y+Math.sin(a)*b.innerR*1.05;
const ox=x+Math.cos(a)*outerPulse,oy=y+Math.sin(a)*outerPulse;

ctx.fillStyle=phase2?`hsl(${i*7},100%,55%)`:`hsl(${coreHue+i*5},100%,50%)`;
ctx.strokeStyle=phase2?`hsl(${i*7},100%,75%)`:`hsl(${coreHue+i*5},100%,70%)`;
ctx.lineWidth=1.5; ctx.shadowBlur=phase2?30:20;
ctx.beginPath(); ctx.moveTo(ix,iy); ctx.lineTo(ox,oy); ctx.lineTo(mx,my); ctx.closePath(); ctx.fill(); ctx.stroke();
}
// Eye
ctx.shadowBlur=25; ctx.fillStyle=phase2?’#ff0000’:`hsl(${coreHue},100%,65%)`;
ctx.beginPath(); ctx.arc(x,y,10,0,Math.PI*2); ctx.fill();
ctx.fillStyle=’#fff’; ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill();
// HP bar
const barW=Math.min(W*0.72,300);

ctx.fillRect(x-barW/2,y+outerR+16,barW*hp_ratio,12);
ctx.strokeStyle=`hsl(${coreHue},100%,60%)`; ctx.lineWidth=1.5;
ctx.strokeRect(x-barW/2,y+outerR+16,barW,12);
ctx.fillStyle=phase2?’#ff4444’:`hsl(${coreHue},100%,70%)`;
ctx.font=`bold 12px Orbitron`; ctx.textAlign=‘center’;
ctx.fillText(phase2?‘⚠ FINAL FORM ⚠’:‘⚠ FINAL BOSS ⚠’,x,y+outerR+44);
// Phase 2 warning text
if(phase2&&b.reviveFlash>0){
const fa=Math.min(1,b.reviveFlash/30);
ctx.globalAlpha=fa*(0.5+0.5*Math.sin(frameCount*0.3));
ctx.font=`bold ${Math.round(W*0.07)}px Orbitron`;

}
} else {
ctx.strokeStyle=’#ff8800’; ctx.fillStyle=’#180800’;
ctx.shadowColor=’#ff8800’; ctx.shadowBlur=28; ctx.lineWidth=3;
ctx.beginPath(); ctx.moveTo(x,y+36); ctx.lineTo(x-60,y+12); ctx.lineTo(x-48,y-12); ctx.lineTo(x-24,y-6); ctx.lineTo(x,y-36); ctx.lineTo(x+24,y-6); ctx.lineTo(x+48,y-12); ctx.lineTo(x+60,y+12); ctx.closePath(); ctx.fill(); ctx.stroke();
ctx.fillStyle=’#ff880033’; ctx.beginPath(); ctx.ellipse(x,y-10,14,18,0,0,Math.PI*2); ctx.fill();
const barW=Math.min(W*0.6,240);
ctx.shadowBlur=0; ctx.fillStyle=’#330000’; ctx.fillRect(x-barW/2,y+45,barW,10);

if(ending.phase===‘flyaway’){
for(const p of particles){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
if(ending.shipY>-80) drawPlayer(ending.shipX,ending.shipY,1);
return;
}
ctx.save(); ctx.textAlign=‘center’;
ending.credits.forEach((line,i)=>{
const y=ending.scrollY+i*52;
if(y<-60||y>H+20) return;
const alpha=Math.min(1,Math.min(y/80,(H-y)/80));
ctx.globalAlpha=Math.max(0,alpha);
if(line.big) ctx.font=`bold ${Math.round(W*0.065)}px Orbitron`;
else if(line.sub) ctx.font=`${Math.round(W*0.036)}px Orbitron`;
else ctx.font=`${Math.round(W*0.048)}px Orbitron`;
ctx.fillStyle=line.col||’#ffffff’; ctx.shadowColor=line.col||’#ffffff’; ctx.shadowBlur=line.big?18:6;
ctx.fillText(line.t,W/2,y);
});
ctx.restore();
if(ending.phase===‘fin’){
const pulse=0.5+0.5*Math.abs(Math.sin(ending.timer*0.06));
ctx.save(); ctx.globalAlpha=pulse; ctx.font=`bold ${Math.round(W*0.06)}px Orbitron`;
ctx.fillStyle=’#00ffcc’; ctx.shadowColor=’#00ffcc’; ctx.shadowBlur=25; ctx.textAlign=‘center’; ctx.fillText(‘TAP TO CONTINUE’,W/2,H/2); ctx.restore();
}
}

// ── Keyboard ──────────────────────────────────────────────
const kbState={};
document.addEventListener(‘keydown’,e=>{
kbState[e.key]=true;
if(e.key===’ ’){e.preventDefault();if(state===‘title’||state===‘gameover’){unlockAudio();startGame();}else if(state===‘ending’){unlockAudio();startNewLoop();}}
if(e.key===‘1’) setWeapon(‘normal’);
if(e.key===‘2’) setWeapon(‘wide’);
if(e.key===‘3’) setWeapon(‘laser’);
});
document.addEventListener(‘keyup’,e=>{kbState[e.key]=false;});
function applyKeyboard(){
if(!Object.keys(kbState).length) return;
let kx=0,ky=0;
if(kbState[‘ArrowLeft’]||kbState[‘a’]) kx-=1;
if(kbState[‘ArrowRight’]||kbState[‘d’]) kx+=1;
if(kbState[‘ArrowUp’]||kbState[‘w’]) ky-=1;
if(kbState[‘ArrowDown’]||kbState[‘s’]) ky+=1;
if(kx||ky){player.x=Math.max(25,Math.min(W-25,player.x+kx*player.speed));player.y=Math.max(60,Math.min(H-120,player.y+ky*player.speed));}
}

// ── Game flow ─────────────────────────────────────────────
function showOverlay(title,sub,tap){
overlay.innerHTML=`<h1>${title}</h1> <div style="font-size:18px;color:#00ffcc;letter-spacing:2px">${sub}</div> <div class="tap-start" id="startBtn">${tap}</div>`;
overlay.style.display=‘flex’;
document.getElementById(‘startBtn’).addEventListener(‘touchstart’,e=>{e.preventDefault();unlockAudio();startGame();},{passive:false});
document.getElementById(‘startBtn’).addEventListener(‘click’,()=>{unlockAudio();startGame();});
}
function endGame(){ state=‘gameover’; stopMusic(); dockBtn.style.display=‘none’; showOverlay(‘GAME OVER’,`SCORE: ${score}`,‘TAP TO RETRY’); }
function startNewLoop(){ loopCount++; initGame(); overlay.style.display=‘none’; startMusic(‘title’); startIntro(); }
function startGame(){ loopCount=0; initGame(); overlay.style.display=‘none’; startMusic(‘title’); startIntro(); }
function startIntro(){
state=‘intro’; player={x:W/2,y:H-160,w:40,h:40,speed:7,invincible:0};
bullets=[]; enemies=[]; enemyBullets=[]; particles=[]; powerups=[];
intro={active:true,shipY:-120,targetY:H-160,phase:‘fly’,timer:0};
updateUI();
}

// Start btn from title screen
document.getElementById(‘startBtn’).addEventListener(‘touchstart’,e=>{e.preventDefault();unlockAudio();startGame();},{passive:false});
document.getElementById(‘startBtn’).addEventListener(‘click’,()=>{unlockAudio();startGame();});

resize();
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>

</body>
