<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;}
#btn{
  padding:30px 60px;
  background:#00ffcc22;
  border:3px solid #00ffcc;
  color:#00ffcc;
  font-size:24px;
  border-radius:50px;
  cursor:pointer;
  -webkit-tap-highlight-color: rgba(0,255,204,0.3);
}
#log{position:fixed;top:20px;left:0;right:0;text-align:center;color:#ffdd00;font-size:14px;}
</style>
</head>
<body>
<div id="log">タップしてみて</div>
<button id="btn">TAP ME</button>
<script>
const btn=document.getElementById('btn');
const log=document.getElementById('log');
let count=0;

btn.addEventListener(‘click’,()=>{
count++;
log.textContent=‘click: ‘+count;
btn.style.background=’#00ffcc44’;
setTimeout(()=>btn.style.background=’#00ffcc22’,200);
});

btn.addEventListener(‘touchend’,e=>{
count++;
log.textContent=’touchend: ’+count;
});
</script>

</body>
</html>
